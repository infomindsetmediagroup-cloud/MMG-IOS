name: MMGIOS
options:
  bundleIdPrefix: com.mindsetmediagroup
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  MMGIOS:
    type: application
    platform: iOS
    sources:
      - path: MMGIOS
        excludes:
          - Resources/Info.plist
    resources:
      - path: MMGIOS/Resources/Assets.xcassets
    info:
      path: MMGIOS/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mindsetmediagroup.mmgios
        TARGETED_DEVICE_FAMILY: "1,2"
