name: MMGIOS
options:
  bundleIdPrefix: com.mindsetmediagroup
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    KAIROS_RUNTIME_URL: ""
targets:
  MMGIOS:
    type: application
    platform: iOS
    sources:
      - path: MMGIOS/App
      - path: MMGIOS/Config
      - path: MMGIOS/Features/AssetManagement
      - path: MMGIOS/Features/CommandCenter
      - path: MMGIOS/Features/CustomerPortal
      - path: MMGIOS/Features/Deliverables
        excludes:
          - "*.md"
      - path: MMGIOS/Features/DesignStudio
      - path: MMGIOS/Features/KnowledgeVault
      - path: MMGIOS/Features/ProductionQueue
      - path: MMGIOS/Features/TaskEngine
      - path: MMGIOS/Features/WorkflowRuntime
        excludes:
          - "*.md"
    resources:
      - path: MMGIOS/Resources/Assets.xcassets
    info:
      path: MMGIOS/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mindsetmediagroup.mmgios
        TARGETED_DEVICE_FAMILY: "1,2"

  MMGIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MMGIOSTests
    dependencies:
      - target: MMGIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mindsetmediagroup.mmgios.tests
        GENERATE_INFOPLIST_FILE: YES
