name: Diagnose v43 Dashboard

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-v43-dashboard.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      BASE: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Print only failed live markers
        shell: bash
        run: |
          set -euo pipefail
          nonce="${GITHUB_SHA}-$(date +%s)"
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' "${BASE}/api/health?diag=${nonce}" -o health.json
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' "${BASE}/center/content/website?diag=${nonce}" -o website.html
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' "${BASE}/scripts/homepage-session-reset-v5.js?v=${nonce}" -o reset.js
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' "${BASE}/scripts/homepage-quick-action.js?v=${nonce}" -o quick.js
          node <<'NODE'
          const fs=require('fs');
          const health=JSON.parse(fs.readFileSync('health.json','utf8'));
          const website=fs.readFileSync('website.html','utf8');
          const reset=fs.readFileSync('reset.js','utf8');
          const quick=fs.readFileSync('quick.js','utf8');
          const p=health.homepagePreserveDesign||{};
          const order=Array.isArray(p.sourceOrder)?p.sourceOrder:[];
          const checks={
            build:health.build==='kairos-production-entry-20260717-100',
            contract:p.contract==='published-main-three-source-visible-text-preservation',
            source1:order[0]==='active rendered template text settings',
            source2:order[1]==='active embedded template HTML or Liquid text nodes',
            source3:order[2]==='homepage-specific section Liquid literal text',
            embeddedPlanner:p.templateMarkupPlannerBuild==='kairos-homepage-template-markup-text-planner-20260717-1',
            embeddedCapability:health.capabilities?.homepageEmbeddedTemplateMarkupTextMutation==='operational',
            liquidCapability:health.capabilities?.homepageLiquidLiteralTextFallback==='operational',
            canonicalFallback:health.capabilities?.homepageCanonicalRebuildFallback==='prohibited',
            dashboard:website.includes('kairos-command-center-operational-20260717-19'),
            resetBound:website.includes('/scripts/homepage-session-reset-v5.js?v=operational-20260717-1'),
            quickBound:website.includes('/scripts/homepage-quick-action.js?v=operational-20260717-4'),
            resetScript:reset.includes('kairos.homepage.session-migration.v5')&&reset.includes('kairos.homepage.quick-action.v4'),
            quickAction:quick.includes('Keep my homepage. Change the words.')&&quick.includes('literalLiquidTextFallbackAuthorized: true')
          };
          const failed=Object.entries(checks).filter(([,value])=>value!==true).map(([key])=>key);
          console.log(JSON.stringify({failed,checks,actual:{build:health.build,contract:p.contract,sourceOrder:order,templateMarkupPlannerBuild:p.templateMarkupPlannerBuild,embeddedCapability:health.capabilities?.homepageEmbeddedTemplateMarkupTextMutation,liquidCapability:health.capabilities?.homepageLiquidLiteralTextFallback,canonicalFallback:health.capabilities?.homepageCanonicalRebuildFallback,websiteBuild:/mmg-build[^>]*content="([^"]+)/.exec(website)?.[1]||null,resetLength:reset.length,resetPrefix:reset.slice(0,100),quickLength:quick.length,quickPrefix:quick.slice(0,100)}},null,2));
          if(failed.length) process.exit(1);
          NODE

      - name: Publish diagnostic result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state=$([ "${JOB_STATUS}" = "success" ] && echo success || echo failure)
          payload="$(STATE="${state}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:`v43 dashboard diagnostic ${process.env.STATE}`,context:"kairos-v43-dashboard-diagnostic",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data "${payload}"
