name: iOS Build Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Generate and Build MMGIOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project MMGIOS.xcodeproj \
            -scheme MMGIOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            clean build 2>&1 | tee xcodebuild.log

      - name: Print build errors
        if: failure()
        run: |
          echo "---- Build error summary ----"
          grep -n -E "error:|warning:|BUILD FAILED|SwiftCompile" xcodebuild.log | tail -n 120 || true
