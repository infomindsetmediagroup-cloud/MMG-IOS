name: iOS Build Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Generate and Build MMGIOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project MMGIOS.xcodeproj -scheme MMGIOS -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO clean build
