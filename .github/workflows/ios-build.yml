name: MMG IOS Manual Build Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mmg-ios-build-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xcode-build:
    name: Xcode Build Verification
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: |
          xcodebuild \
            -project MMGIOS.xcodeproj \
            -resolvePackageDependencies

      - name: Build Debug for iOS Simulator
        run: |
          xcodebuild \
            -project MMGIOS.xcodeproj \
            -scheme MMGIOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
