name: Validate MMG Staging Integration

on:
  pull_request:
    paths:
      - ".github/workflows/mmg-commerce-release.yml"
      - ".github/workflows/mmg-commerce-staging-integration.yml"
      - ".github/workflows/mmg-staging-integration-validate.yml"
      - "backend-tests/mmg-live-commerce-deployment.test.ts"
      - "backend-tests/mmg-staging-integration.test.ts"
      - "database/migrations/20260721_011_mmg_staging_integration_execution.sql"
      - "deployment/mmg-commerce-staging.env.example"
      - "docs/operations/MMG-COMMERCE-STAGING-INTEGRATION-v1.0.md"
      - "registry/deployment/mmg-commerce-staging-integration-contract-v1.json"
      - "registry/deployment/mmg-live-commerce-deployment-contract-v1.json"
      - "scripts/mmg-commerce-apply-migrations.sh"
      - "scripts/mmg-commerce-register-staging-release.sh"
      - "server/deployment/live-commerce-deployment.ts"
      - "server/operations/**"
      - "shopify/qa/mmg-commerce-staging-integration-qa.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install validation dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --package-lock=false
      - name: Typecheck
        run: npm run typecheck
      - name: Run staging integration tests
        run: npx vitest run backend-tests/mmg-staging-integration.test.ts backend-tests/mmg-live-commerce-deployment.test.ts
      - name: Validate staging contracts and workflow files
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool registry/deployment/mmg-commerce-staging-integration-contract-v1.json >/dev/null
          python -m json.tool registry/deployment/mmg-live-commerce-deployment-contract-v1.json >/dev/null
          bash -n scripts/mmg-commerce-apply-migrations.sh
          bash -n scripts/mmg-commerce-register-staging-release.sh
          grep -Fq '20260721_011_mmg_staging_integration_execution' server/deployment/live-commerce-deployment.ts
          grep -Fq '/api/internal/commerce/staging-integration' server/deployment/live-commerce-deployment.ts
          grep -Fq 'Register exact staging release' .github/workflows/mmg-commerce-staging-integration.yml
          grep -Fq 'publicationAllowed:false' .github/workflows/mmg-commerce-staging-integration.yml
          grep -Fq 'liveCustomerDataAllowed:false' .github/workflows/mmg-commerce-staging-integration.yml
