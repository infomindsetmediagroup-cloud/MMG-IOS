name: Manual Checkpoint 007 Validation

on:
  workflow_dispatch:
    inputs:
      runtime_base_url:
        description: "Checkpoint 007 preview URL without a trailing slash"
        required: true
        type: string
      expect_session_enforcement:
        description: "Expect gateway-only requests to be rejected"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate-checkpoint-007:
    name: Build and validate authenticated runtime
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      KAIROS_RUNTIME_BASE_URL: ${{ inputs.runtime_base_url }}
      KAIROS_RUNTIME_TOKEN: ${{ secrets.KAIROS_RUNTIME_TOKEN }}
      KAIROS_EXPECT_SESSION_ENFORCEMENT: ${{ inputs.expect_session_enforcement }}

    steps:
      - name: Check out selected commit with native git
        shell: bash
        run: |
          set -euo pipefail
          git init repository
          cd repository
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Verify required validation secret
        working-directory: repository
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${KAIROS_RUNTIME_TOKEN:-}" ]]; then
            echo "Repository secret KAIROS_RUNTIME_TOKEN is not configured."
            exit 1
          fi

      - name: Build Kairos backend
        working-directory: repository/kairos/backend
        shell: bash
        run: |
          set -euo pipefail
          npm install --ignore-scripts
          npm run build

      - name: Validate session lifecycle and authorization
        working-directory: repository
        shell: bash
        run: node scripts/validate-checkpoint-007.mjs