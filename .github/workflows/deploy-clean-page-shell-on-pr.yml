name: Deploy Clean MMG Page Shell on PR

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: deploy-clean-page-shell-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      TARGET_SHA: ${{ github.event.pull_request.head.sha }}
      PAGE_SHELL_BUILD: kairos-page-shell-publisher-20260719-1
    steps:
      - name: Materialize PR head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --no-checkout \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-clean"
          cd "${RUNNER_TEMP}/mmg-clean"
          git checkout --detach "${TARGET_SHA}"
          test "$(git rev-parse HEAD)" = "${TARGET_SHA}"

      - name: Validate clean runtime
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-clean"
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          grep -q 'kairos-page-shell-publisher-v1.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${PAGE_SHELL_BUILD}" cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          ! grep -q '"\* \* \* \* \*"' cloudflare/mmg-ios/wrangler.toml

      - name: Deploy clean Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-clean/cloudflare/mmg-ios"
          npm install --no-audit --no-fund >/dev/null 2>&1
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${TARGET_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for exact Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 -D "${headers}" \
              "${WORKER_URL}/api/deployment/identity?sha=${TARGET_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${TARGET_SHA}\"" "${body}" \
              && grep -qi "x-mmg-page-shell: ${PAGE_SHELL_BUILD}" "${headers}"; then
              exit 0
            fi
            sleep 5
          done
          cat "${RUNNER_TEMP}/identity.json" || true
          cat "${RUNNER_TEMP}/identity.headers" || true
          exit 1

      - name: Publish shared page shell
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/page-shell.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_URL}/api/shopify/page-shell/publish?sha=${TARGET_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_PAGE_SHELL_RECONCILIATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}"
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactThemeFileReadBack":true' "${result}"
          grep -q '"layoutInjectionPresent":true' "${result}"

      - name: Verify live audited pages
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/browser"
          cd "${RUNNER_TEMP}/browser"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright >/dev/null 2>&1
          cat > verify.mjs <<'JS'
          import { chromium } from "playwright";
          const definitions = [
            { path: "/pages/free-creator-toolkit", hero: "The Free Creator Toolkit.", hidden: "main .mmg-page-mini-navigation-hidden" },
            { path: "/pages/publishing-services", hero: "Turn your knowledge into a published book.", hidden: "main .mmg-page-directory-hidden", publishing: true },
          ];
          const browser = await chromium.launch({ channel: "chrome", headless: true });
          const results = [];
          try {
            for (const definition of definitions) {
              for (const viewport of [{ name: "desktop", width: 1440, height: 1000 }, { name: "mobile", width: 390, height: 844 }]) {
                const context = await browser.newContext({ viewport });
                const page = await context.newPage();
                const response = await page.goto(`${process.env.STOREFRONT_URL}${definition.path}?clean_shell=${Date.now()}-${viewport.name}`, { waitUntil: "domcontentloaded", timeout: 60000 });
                await page.waitForFunction((build) => document.documentElement.dataset.mmgPageShell === build, process.env.PAGE_SHELL_BUILD, { timeout: 15000 });
                await page.waitForFunction(() => document.documentElement.dataset.mmgPageShellReady === "true", { timeout: 15000 });
                await page.waitForTimeout(500);
                const visibleH1 = (await page.locator("main h1:visible").allTextContents()).map((value) => value.replace(/\s+/g, " ").trim());
                const titleHidden = await page.locator("main .mmg-native-page-title-hidden").count();
                const normalized = await page.locator(definition.hidden).count();
                const guideLinks = definition.publishing ? await page.locator('main a[href*="/pages/project-guide"]:visible').count() : 0;
                const processTarget = definition.publishing ? await page.locator("#publishing-process").count() : 1;
                const passed = Boolean(response?.ok()) && visibleH1.length === 1 && visibleH1[0] === definition.hero && titleHidden === 1 && normalized === 1 && guideLinks === 0 && processTarget === 1;
                results.push({ path: definition.path, viewport: viewport.name, visibleH1, titleHidden, normalized, guideLinks, processTarget, passed });
                await context.close();
              }
            }
          } finally {
            await browser.close();
          }
          const output = { passed: results.every((item) => item.passed), results };
          console.log(`MMG_CLEAN_PAGE_SHELL_RESULT=${JSON.stringify(output)}`);
          if (!output.passed) process.exit(1);
          JS
          node verify.mjs
