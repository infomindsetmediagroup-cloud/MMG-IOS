name: Verify Website Structural Routing

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/src/kairos-production-entry-v39.js"
      - "cloudflare/mmg-ios/production-baseline.json"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "cloudflare/mmg-ios/scripts/validate-frozen-production-standard.mjs"
      - "web/kairos-dashboard/index.html"
      - "web/kairos-dashboard/scripts/website-structural-intent-guard.js"
      - ".github/workflows/verify-website-structural-routing.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-website-structural-routing
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Wait for structural intent edge
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 72); do
            curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?structural-routing=${GITHUB_SHA}-${attempt}-$(date +%s)" \
              --output health.json || true
            if node -e '
              const fs=require("fs");let h={};try{h=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{}
              const ok=["ready","ok","operational"].includes(String(h.status||"").toLowerCase())
                &&h.build==="kairos-production-entry-20260716-96"
                &&h.websiteIntentRouting?.status==="operational"
                &&h.websiteIntentRouting?.build==="kairos-website-intent-gate-20260716-1"
                &&h.websiteIntentRouting?.structuralPrecedence==="enforced"
                &&h.capabilities?.contentOnlyStructuralFallback==="prohibited";
              process.exit(ok?0:1);
            '; then
              exit 0
            fi
            sleep 5
          done
          echo "The structural website intent edge did not become live." >&2
          cat health.json >&2 || true
          exit 1

      - name: Prove structural prompt overrides stale content-only lock
        shell: bash
        run: |
          set -euo pipefail
          objective='Execute a full structural retool of the Mindset Media Group homepage. Build an Apple-inspired editorial customer journey with Nike-inspired storytelling, a new hero, audience pathways, sections, navigation, responsive mobile and desktop behavior, Shopify Liquid, JSON, CSS, staging preview, verification, and rollback. This is a full structural retool, not a content-only edit.'
          payload="$(OBJECTIVE="${objective}" node -e '
            process.stdout.write(JSON.stringify({
              objective:process.env.OBJECTIVE,
              requestType:"content-only",
              intent:"content-only",
              contentOnlyLocked:true,
              fullRetoolConfirmed:false,
              structuralMutationAuthorized:false,
              styleMutationAuthorized:false,
            }))
          ')"
          http_code="$(curl --silent --show-error --location --max-time 180 \
            -D plan-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data "${payload}" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output plan-submission.json \
            --write-out '%{http_code}' || true)"
          HTTP_CODE="${http_code}" node <<'NODE'
          const fs=require('fs');
          const headers=fs.readFileSync('plan-headers.txt','utf8');
          let body={};try{body=JSON.parse(fs.readFileSync('plan-submission.json','utf8'))}catch{}
          const checks={
            accepted:[200,202].includes(Number(process.env.HTTP_CODE)),
            jobCreated:typeof body.jobID==='string'&&body.jobID.length>4,
            fullRetoolHeader:/x-kairos-website-intent:\s*full-retool/i.test(headers),
            contentLockCleared:/x-kairos-content-only-lock:\s*false/i.test(headers),
            structuralRuntime:/x-kairos-structural-runtime:\s*enabled/i.test(headers),
            gateHeader:/x-kairos-website-intent-gate:\s*kairos-website-intent-gate-20260716-1/i.test(headers),
            structuralReason:/x-kairos-intent-reason:\s*(structural-objective-overrides-content-only-default|explicit-structural-authorization)/i.test(headers),
          };
          console.log(JSON.stringify({checks,jobID:body.jobID||null,pollURL:body.pollURL||null},null,2));
          if(!Object.values(checks).every(Boolean))process.exit(1);
          NODE

          job_id="$(node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync("plan-submission.json","utf8")).jobID)')"
          poll_url="$(node -e 'const x=JSON.parse(require("fs").readFileSync("plan-submission.json","utf8"));process.stdout.write(x.pollURL||`/api/shopify/staging/plan/jobs/${x.jobID}`)')"
          case "${poll_url}" in
            http*) absolute_poll_url="${poll_url}" ;;
            *) absolute_poll_url="${KAIROS_PRODUCTION_URL}${poll_url}" ;;
          esac

          for attempt in $(seq 1 120); do
            curl --silent --show-error --location --max-time 60 \
              -H 'Cache-Control: no-cache' \
              "${absolute_poll_url}?structural-proof=${GITHUB_SHA}-${attempt}" \
              --output plan-result.json || true
            if node -e '
              const fs=require("fs");let x={};try{x=JSON.parse(fs.readFileSync("plan-result.json","utf8"))}catch{}
              if(x.status==="completed"&&x.result)process.exit(0);
              if(["failed","cancelled","blocked","needs-attention"].includes(x.status))process.exit(2);
              process.exit(1);
            '; then
              break
            else
              code=$?
              if [ "${code}" -eq 2 ]; then
                cat plan-result.json >&2
                exit 1
              fi
            fi
            if [ "${attempt}" -eq 120 ]; then
              echo "Structural website proposal did not complete." >&2
              cat plan-result.json >&2 || true
              exit 1
            fi
            sleep 5
          done

          node <<'NODE'
          const fs=require('fs');
          const envelope=JSON.parse(fs.readFileSync('plan-result.json','utf8'));
          const result=envelope.result||{};
          const plan=result.plan||{};
          const fingerprint=JSON.stringify(result).toLowerCase();
          const changes=Array.isArray(plan.changes)?plan.changes:[];
          const checks={
            completed:envelope.status==='completed',
            notContentOnly:!fingerprint.includes('content-only change')&&!fingerprint.includes('content only change'),
            notPhraseInspection:!fingerprint.includes('no exact unique source phrases'),
            notInspectionOnly:String(plan.installationMode||'').toLowerCase()!=='inspection-only',
            notVisibleTextOnly:String(plan.installationMode||'').toLowerCase()!=='existing-liquid-visible-text',
            structuralPackage:Boolean(plan.compositePackage||plan.websiteRetoolExceptions||changes.some(item=>String(item.changeType||'').toLowerCase()!=='no-change')),
          };
          console.log(JSON.stringify({checks,summary:result.summary||null,planID:result.planID||null,changeCount:changes.length},null,2));
          if(!Object.values(checks).every(Boolean))process.exit(1);
          NODE

      - name: Publish structural routing receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos structural homepage routing passed live verification"
          else
            state="failure"
            description="Kairos structural homepage routing failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state:process.env.STATE,
              description:process.env.DESCRIPTION,
              context:"kairos-website-structural-routing",
              target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }))
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
