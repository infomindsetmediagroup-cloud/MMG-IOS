name: Verify Canonical MMG Homepage

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      KAIROS_SKIP_RELEASE_MATCH: "true"

    steps:
      - name: Download verification source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository artifacts/canonical-homepage
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/.github/scripts/run-canonical-homepage-release.mjs

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Build, repair, and verify canonical Shopify staging homepage
        shell: bash
        run: |
          set -euo pipefail
          node repository/.github/scripts/run-canonical-homepage-release.mjs
          echo "--- REVIEW RECEIPT ---"
          cat artifacts/canonical-homepage/review-receipt.json
          echo "--- EVIDENCE FILES ---"
          find artifacts/canonical-homepage -maxdepth 2 -type f -printf '%p %s bytes\n' | sort
