name: Build, Verify, and Publish Canonical MMG Homepage

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-compatibility-v1.js"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-publisher-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-source-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-source-*.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js"
      - ".github/scripts/verify-canonical-homepage.mjs"
      - ".github/workflows/build-verify-canonical-homepage.yml"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: canonical-mmg-homepage-production
  cancel-in-progress: true

jobs:
  build-verify-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      TARGET_SHA: ${{ github.sha }}
      STATUS_CONTEXT: kairos-canonical-homepage-production

    steps:
      - name: Publish pending release status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",description:"Building, verifying, and publishing the canonical MMG homepage",context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            --data "${payload}"

      - name: Download release source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository artifacts/canonical-homepage/staging artifacts/canonical-homepage/live
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${TARGET_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js
          test -f repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Wait for matching Cloudflare release
        shell: bash
        run: |
          set -euo pipefail
          expected_build="$(node -e '
            const fs = require("node:fs");
            const source = fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js", "utf8");
            const match = source.match(/const BUILD = "([^"]+)"/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ')"

          for attempt in $(seq 1 72); do
            headers_file="$(mktemp)"
            if curl --fail --show-error --silent --location --max-time 30 \
              -D "${headers_file}" \
              "${KAIROS_PRODUCTION_URL}/api/health?canonical_release=${TARGET_SHA}" \
              --output /tmp/kairos-health.json; then
              deployed_build="$(awk 'BEGIN{IGNORECASE=1} /^x-mmg-production-entry:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if [ "${deployed_build}" = "${expected_build}" ]; then
                rm -f "${headers_file}"
                echo "Matching Kairos release is live: ${deployed_build}"
                exit 0
              fi
              echo "Release gate ${attempt}/72: expected ${expected_build}; observed ${deployed_build:-none}."
            fi
            rm -f "${headers_file}"
            sleep 5
          done

          echo "::error::The matching Cloudflare homepage release did not become live."
          exit 1

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Install homepage in Kairos Staging
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          payload="$(TARGET_SHA="${TARGET_SHA}" node -e 'process.stdout.write(JSON.stringify({confirmation:"BUILD_CANONICAL_MMG_HOMEPAGE_STAGING",mode:"build",sourceCommit:process.env.TARGET_SHA}))')"
          curl --fail-with-body --show-error --silent --max-time 120 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/canonical-homepage/build" \
            --data "${payload}" \
            --output artifacts/canonical-homepage/staging/build-result.json

          PREVIEW_URL="$(node -e '
            const body=require("./artifacts/canonical-homepage/staging/build-result.json");
            if(body.status!=="completed" || !body.preview?.url || body.verification?.exactReadBack!==true){
              console.error(JSON.stringify(body));
              process.exit(1);
            }
            process.stdout.write(body.preview.url);
          ')"
          echo "preview_url=${PREVIEW_URL}" >> "${GITHUB_OUTPUT}"
          echo "MMG_PREVIEW_URL=${PREVIEW_URL}" >> "${GITHUB_ENV}"

      - name: Run first staging verification
        id: first_pass
        continue-on-error: true
        shell: bash
        env:
          MMG_VERIFICATION_OUTPUT: artifacts/canonical-homepage/staging/pass-1
          MMG_VERIFICATION_ATTEMPT: "1"
        run: node repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Repair staging bundle after failed first pass
        if: steps.first_pass.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          payload="$(TARGET_SHA="${TARGET_SHA}" node -e 'process.stdout.write(JSON.stringify({confirmation:"BUILD_CANONICAL_MMG_HOMEPAGE_STAGING",mode:"repair",sourceCommit:process.env.TARGET_SHA,reason:"Restore exact canonical source after failed browser verification."}))')"
          curl --fail-with-body --show-error --silent --max-time 120 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/canonical-homepage/build" \
            --data "${payload}" \
            --output artifacts/canonical-homepage/staging/repair-result.json
          node -e '
            const body=require("./artifacts/canonical-homepage/staging/repair-result.json");
            if(body.status!=="completed" || body.mode!=="repair" || body.verification?.exactReadBack!==true){
              console.error(JSON.stringify(body));
              process.exit(1);
            }
          '

      - name: Run final staging verification
        shell: bash
        env:
          MMG_VERIFICATION_OUTPUT: artifacts/canonical-homepage/staging/final
          MMG_VERIFICATION_ATTEMPT: "2"
        run: node repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Publish verified bundle to live Shopify theme
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          payload="$(TARGET_SHA="${TARGET_SHA}" node -e 'process.stdout.write(JSON.stringify({confirmation:"PUBLISH_CANONICAL_MMG_HOMEPAGE_LIVE",mode:"publish",sourceCommit:process.env.TARGET_SHA}))')"
          curl --fail-with-body --show-error --silent --max-time 150 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/canonical-homepage/build" \
            --data "${payload}" \
            --output artifacts/canonical-homepage/live/publish-result.json

          LIVE_URL="$(node -e '
            const body=require("./artifacts/canonical-homepage/live/publish-result.json");
            if(
              body.status!=="completed" ||
              body.mode!=="publish" ||
              body.production?.publishedThemeChanged!==true ||
              body.verification?.publishedThemeReadBackVerified!==true ||
              !body.production?.url
            ){
              console.error(JSON.stringify(body));
              process.exit(1);
            }
            process.stdout.write(body.production.url);
          ')"
          echo "live_url=${LIVE_URL}" >> "${GITHUB_OUTPUT}"
          echo "MMG_PREVIEW_URL=${LIVE_URL}/?homepage_release=${TARGET_SHA}" >> "${GITHUB_ENV}"

      - name: Verify live homepage on desktop and mobile
        id: live_verification
        shell: bash
        env:
          MMG_VERIFICATION_OUTPUT: artifacts/canonical-homepage/live/browser
          MMG_VERIFICATION_ATTEMPT: "3"
        run: |
          set -euo pipefail
          sleep 8
          node repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Create release receipt
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const stagePath = 'artifacts/canonical-homepage/staging/build-result.json';
          const publishPath = 'artifacts/canonical-homepage/live/publish-result.json';
          const stagingVerificationPath = 'artifacts/canonical-homepage/staging/final/verification-report.json';
          const liveVerificationPath = 'artifacts/canonical-homepage/live/browser/verification-report.json';

          const read = (path, fallback) => fs.existsSync(path)
            ? JSON.parse(fs.readFileSync(path, 'utf8'))
            : fallback;

          const receipt = {
            sourceCommit: process.env.TARGET_SHA,
            staging: read(stagePath, { status: 'not-produced' }),
            stagingVerification: read(stagingVerificationPath, { passed: false }),
            production: read(publishPath, { status: 'not-produced' }),
            liveVerification: read(liveVerificationPath, { passed: false }),
            generatedAt: new Date().toISOString(),
          };

          fs.writeFileSync(
            'artifacts/canonical-homepage/release-receipt.json',
            JSON.stringify(receipt, null, 2),
          );

          const lines = [
            '# Canonical MMG Homepage Production Release',
            '',
            `- Source commit: ${receipt.sourceCommit}`,
            `- Staging verification: ${receipt.stagingVerification.passed ? 'PASS' : 'FAIL'}`,
            `- Live URL: ${receipt.production.production?.url || 'unavailable'}`,
            `- Published theme changed: ${receipt.production.production?.publishedThemeChanged === true ? 'YES' : 'NO'}`,
            `- Live verification: ${receipt.liveVerification.passed ? 'PASS' : 'FAIL'}`,
          ];
          fs.writeFileSync(
            'artifacts/canonical-homepage/release-receipt.md',
            `${lines.join('\n')}\n`,
          );
          NODE

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-mmg-homepage-production-${{ github.sha }}
          path: artifacts/canonical-homepage
          if-no-files-found: error
          retention-days: 30

      - name: Publish final release status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LIVE_OUTCOME: ${{ steps.live_verification.outcome }}
        run: |
          set -euo pipefail
          if [ "${LIVE_OUTCOME}" = "success" ]; then
            state="success"
            description="Canonical MMG homepage is live and passed desktop/mobile verification"
          else
            state="failure"
            description="Canonical MMG homepage production release failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            --data "${payload}"
