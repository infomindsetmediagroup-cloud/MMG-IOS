name: Verify Canonical MMG Homepage

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      KAIROS_SKIP_RELEASE_MATCH: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Clone observable verification branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/canonical-homepage
          git clone --depth 1 --branch "${HEAD_REF}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repository
          test -f repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js

      - name: Patch semantic Shopify JSON verification
        id: semantic_patch
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js')
          source = path.read_text()
          original = source

          source = source.replace(
              'export const KAIROS_CANONICAL_HOMEPAGE_BUILD = "kairos-canonical-homepage-builder-20260717-1";',
              'export const KAIROS_CANONICAL_HOMEPAGE_BUILD = "kairos-canonical-homepage-builder-20260717-2";',
          )
          source = source.replace(
              '  inspectStagingSource,\n  writeThemeFiles,',
              '  inspectStagingSource,\n  parseShopifyJson,\n  semanticHash,\n  writeThemeFiles,',
          )

          old = '''    for (const candidate of prepared) {
              const actual = readBackMap.get(candidate.filename);
              if (!actual || actual.content !== candidate.content || actual.sha256 !== candidate.afterSha256) {
                throw httpError(502, "canonical_homepage_readback_mismatch", `Shopify did not preserve the canonical source for ${candidate.filename}.`);
              }
            }'''
          new = '''    for (const candidate of prepared) {
              const actual = readBackMap.get(candidate.filename);
              if (!actual) {
                throw httpError(502, "canonical_homepage_readback_missing", `Shopify returned no read-back source for ${candidate.filename}.`);
              }

              if (candidate.filename === TEMPLATE_FILE) {
                let expectedDocument;
                let actualDocument;
                try {
                  expectedDocument = parseShopifyJson(candidate.content);
                  actualDocument = parseShopifyJson(actual.content);
                } catch {
                  throw httpError(502, "canonical_homepage_template_json_invalid", "Shopify returned an invalid canonical homepage JSON template.");
                }
                const expectedSemanticSha256 = await semanticHash(expectedDocument);
                const actualSemanticSha256 = await semanticHash(actualDocument);
                if (actualSemanticSha256 !== expectedSemanticSha256) {
                  throw httpError(502, "canonical_homepage_template_semantic_mismatch", "Shopify changed the canonical homepage template structure during write-back.");
                }
                candidate.expectedSourceSha256 = candidate.afterSha256;
                candidate.afterSha256 = actual.sha256;
                candidate.afterBytes = actual.bytes;
                candidate.semanticSha256 = actualSemanticSha256;
                candidate.readBackVerification = "semantic-json";
                continue;
              }

              if (actual.content !== candidate.content || actual.sha256 !== candidate.afterSha256) {
                throw httpError(502, "canonical_homepage_readback_mismatch", `Shopify did not preserve the canonical source for ${candidate.filename}.`);
              }
              candidate.afterSha256 = actual.sha256;
              candidate.afterBytes = actual.bytes;
              candidate.readBackVerification = "exact-bytes";
            }'''
          if old not in source and 'canonical_homepage_template_semantic_mismatch' not in source:
              raise SystemExit('Expected read-back verification block was not found.')
          source = source.replace(old, new)
          source = source.replace(
              'confirmed exact Shopify read-back.',
              'confirmed semantic JSON read-back for the template and exact byte read-back for Liquid, CSS, and JavaScript.',
          )
          source = source.replace(
              '      exactReadBack: true,\n      templateSections:',
              '      exactReadBack: true,\n      templateReadBack: "semantic-json",\n      exactByteReadBackFiles: [SECTION_FILE, CSS_FILE, JS_FILE],\n      templateSections:',
          )

          if source == original:
              print('Semantic Shopify JSON verification is already present.')
          else:
              path.write_text(source)
              print('Applied semantic Shopify JSON verification patch.')
          PY

          cd repository
          if git diff --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            git config user.name "Kairos Release Automation"
            git config user.email "actions@users.noreply.github.com"
            git add cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js
            git commit -m "Verify Shopify homepage JSON semantically"
            git push origin "HEAD:${HEAD_REF}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate patched Kairos Worker
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --no-package-lock --no-audit --no-fund >/dev/null
          npm run validate:production
          npx wrangler deploy --dry-run

      - name: Resolve Cloudflare deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Cloudflare deployment token is unavailable."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --show-error --silent \
              --connect-timeout 15 \
              --max-time 30 \
              --retry 2 \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e '
              const payload = JSON.parse(process.env.ACCOUNTS_JSON || "{}");
              const accounts = payload.success && Array.isArray(payload.result) ? payload.result : [];
              if (accounts.length !== 1) process.exit(1);
              process.stdout.write(accounts[0].id || "");
            ')"
            test -n "${account_id}"
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Deploy semantic JSON verification release
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Wait for canonical builder release
        shell: bash
        run: |
          set -euo pipefail
          expected="kairos-canonical-homepage-builder-20260717-2"
          for attempt in $(seq 1 24); do
            headers_file="$(mktemp)"
            if curl --fail --show-error --silent --location --max-time 30 \
              -D "${headers_file}" \
              "${KAIROS_PRODUCTION_URL}/api/health?canonical_builder=${attempt}" \
              --output /tmp/kairos-health.json; then
              observed="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-canonical-homepage:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if [ "${observed}" = "${expected}" ]; then
                rm -f "${headers_file}"
                echo "Canonical builder release is live: ${observed}"
                exit 0
              fi
              echo "Release check ${attempt}/24: observed ${observed:-none}."
            fi
            rm -f "${headers_file}"
            sleep 5
          done
          echo "::error::The semantic JSON canonical builder release did not become live."
          exit 1

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright >/dev/null
          npx playwright install --with-deps chromium >/dev/null 2>&1
          echo "Playwright Chromium is ready."

      - name: Build, repair, and verify canonical Shopify staging homepage
        shell: bash
        run: |
          set -o pipefail
          node repository/.github/scripts/run-canonical-homepage-release.mjs 2>&1 | tee artifacts/canonical-homepage/release.log
          status=${PIPESTATUS[0]}
          if [ -f artifacts/canonical-homepage/review-receipt.json ]; then
            echo "--- REVIEW RECEIPT ---"
            cat artifacts/canonical-homepage/review-receipt.json
          fi
          echo "--- EVIDENCE FILES ---"
          find artifacts/canonical-homepage -maxdepth 2 -type f -printf '%p %s bytes\n' | sort
          exit "${status}"
