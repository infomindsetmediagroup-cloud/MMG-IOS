name: Fix Free Creator Toolkit Now

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-free-creator-toolkit-now.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: fix-free-creator-toolkit-now
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      PAGE_SHELL_BUILD: kairos-page-shell-publisher-20260719-1
      STATUS_CONTEXT: mmg-free-creator-toolkit-live
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Mark pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:process.env.STATUS_CONTEXT,description:"Fixing Free Creator Toolkit",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate page-shell source
        run: |
          set -euo pipefail
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${PAGE_SHELL_BUILD}" cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js

      - name: Deploy exact Worker
        working-directory: cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Publish page shell
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            result="${RUNNER_TEMP}/page-shell.json"
            status="$(curl --silent --show-error --max-time 180 \
              "${WORKER_URL}/api/shopify/page-shell/execute-7f3c91b6a2d84e5f?token=MMG_PAGE_SHELL_EXECUTE_7f3c91b6a2d84e5f&sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${result}" -w '%{http_code}' || true)"
            cat "${result}" || true
            if [ "${status}" = "200" ] \
              && grep -q '"status":"completed"' "${result}" \
              && grep -q '"exactThemeFileReadBack":true' "${result}" \
              && grep -q '"layoutInjectionPresent":true' "${result}"; then
              exit 0
            fi
            sleep 4
          done
          exit 1

      - name: Install browser
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/browser"
          cd "${RUNNER_TEMP}/browser"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Verify repaired live page
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/browser"
          cat > verify.mjs <<'JS'
          import { chromium } from "playwright";

          const origin = process.env.STOREFRONT_URL;
          const build = process.env.PAGE_SHELL_BUILD;
          const browser = await chromium.launch({ headless: true });
          try {
            for (const viewport of [
              { name: "desktop", width: 1440, height: 1000 },
              { name: "mobile", width: 390, height: 844 },
            ]) {
              const context = await browser.newContext({ viewport });
              const page = await context.newPage();
              const response = await page.goto(`${origin}/pages/free-creator-toolkit?verify=${Date.now()}-${viewport.name}`, {
                waitUntil: "domcontentloaded",
                timeout: 60000,
              });
              if (!response?.ok()) throw new Error(`${viewport.name}: HTTP ${response?.status()}`);
              await page.waitForFunction((value) => document.documentElement.dataset.mmgPageShell === value, build, { timeout: 20000 });
              await page.waitForFunction(() => document.documentElement.dataset.mmgPageShellReady === "true", { timeout: 20000 });
              await page.waitForTimeout(500);
              const visibleH1 = await page.locator("main h1:visible").allTextContents();
              if (visibleH1.length !== 1) throw new Error(`${viewport.name}: visible H1 ${JSON.stringify(visibleH1)}`);
              if (visibleH1[0].replace(/\s+/g, " ").trim() !== "The Free Creator Toolkit.") throw new Error(`${viewport.name}: wrong H1 ${JSON.stringify(visibleH1)}`);
              if (await page.locator("main .mmg-native-page-title-hidden").count() !== 1) throw new Error(`${viewport.name}: native title not hidden`);
              if (await page.locator("main .mmg-page-mini-navigation-hidden").count() !== 1) throw new Error(`${viewport.name}: mini navigation not hidden`);
              const overflow = await page.evaluate(() => ({ viewport: document.documentElement.clientWidth, document: document.documentElement.scrollWidth, body: document.body.scrollWidth }));
              if (Math.max(overflow.document, overflow.body) > overflow.viewport + 2) throw new Error(`${viewport.name}: overflow ${JSON.stringify(overflow)}`);
              await page.screenshot({ path: `free-creator-toolkit-${viewport.name}.png`, fullPage: true });
              await context.close();
            }
          } finally {
            await browser.close();
          }
          JS
          node verify.mjs

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: free-creator-toolkit-live-${{ github.run_id }}
          path: ${{ runner.temp }}/browser/free-creator-toolkit-*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Report result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Free Creator Toolkit fixed and verified"
          else
            state="failure"
            description="Free Creator Toolkit verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.STATUS_CONTEXT,description:process.env.DESCRIPTION,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
