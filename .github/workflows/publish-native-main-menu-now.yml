name: Publish Corrected Shopify Menu Now
run-name: Live-signature Shopify navigation repair ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js
      - cloudflare/mmg-ios/src/kairos-production-entry-native-main-menu-v1.js
      - cloudflare/mmg-ios/wrangler.toml
      - .github/workflows/publish-native-main-menu-now.yml

permissions:
  contents: read

concurrency:
  group: publish-corrected-shopify-menu-now
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Materialize exact repository commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/mmg-release"
          mkdir -p "$RUNNER_TEMP/mmg-release"
          cd "$RUNNER_TEMP/mmg-release"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js

      - name: Deploy live-signature native-menu Worker
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          npm install --no-save wrangler@latest
          npx wrangler deploy | tee native-main-menu-worker-deploy.txt

      - name: Wait for native-menu v4 endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            headers_file="$RUNNER_TEMP/native-main-menu-headers.txt"
            status="$(curl --silent --show-error --head --max-time 30 -o /dev/null -D "$headers_file" -w '%{http_code}' "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish?release=${GITHUB_SHA}&attempt=${attempt}" || true)"
            echo "Endpoint probe ${attempt}/48 HTTP ${status}"
            if grep -qi "x-mmg-native-main-menu: kairos-native-main-menu-publisher-20260718-4" "$headers_file"; then
              echo "Native main-menu Worker v4 is deployed."
              exit 0
            fi
            sleep 5
          done
          echo "Native main-menu Worker v4 did not become reachable." >&2
          exit 1

      - name: Replace live-signature Shopify navigation menus
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          status="$(curl --silent --show-error --retry 2 --retry-delay 3 -X POST "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish" -H "Content-Type: application/json" --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' -o native-main-menu-result.json -w '%{http_code}' || true)"
          echo "Native main-menu publish HTTP ${status}"
          cat native-main-menu-result.json || true
          test "$status" -ge 200
          test "$status" -lt 300
          grep -q '"status":"completed"' native-main-menu-result.json
          grep -q '"exactNativeMenuReadBack":true' native-main-menu-result.json
          grep -q '"knowledgeLibraryRemoved":true' native-main-menu-result.json
          grep -q '"liveLegacySignatureTargeted":true' native-main-menu-result.json
          grep -Eq '"updatedMenuCount":[1-9][0-9]*' native-main-menu-result.json
          grep -q '"themeOverrideNotUsed":true' native-main-menu-result.json

      - name: Verify live main navigation
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          for attempt in $(seq 1 36); do
            status="$(curl --location --silent --show-error -H 'Cache-Control: no-cache, no-store, max-age=0' "https://themindsetmediagroup.com/?mmg_native_nav=${GITHUB_SHA}&attempt=${attempt}" -o live-home.html -w '%{http_code}' || true)"
            echo "Live navigation verification ${attempt}/36 HTTP ${status}"
            if [ "$status" = "200" ] \
              && grep -q 'Create &amp; Learn' live-home.html \
              && grep -q '>Support<' live-home.html \
              && ! grep -q '>Knowledge Library<' live-home.html \
              && ! grep -q '>Catalog<' live-home.html; then
              echo "Live native main navigation verified."
              exit 0
            fi
            sleep 5
          done
          echo "The live storefront still exposes the obsolete navigation after updating every matching Shopify menu." >&2
          exit 1
