name: Publish Native Shopify Main Menu Now
run-name: Native Shopify menu shell release ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js
      - cloudflare/mmg-ios/src/kairos-production-entry-native-main-menu-v1.js
      - cloudflare/mmg-ios/wrangler.toml
      - .github/workflows/publish-native-main-menu-now.yml

permissions:
  contents: read

concurrency:
  group: publish-native-shopify-main-menu-now
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Materialize repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/mmg-release"
          cd "$RUNNER_TEMP/mmg-release"
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o repo.tar.gz
          tar -xzf repo.tar.gz --strip-components=1
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js

      - name: Deploy native-menu Worker
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          node --version
          npm --version
          npm install --no-save wrangler@latest
          npx wrangler deploy | tee native-main-menu-worker-deploy.txt

      - name: Wait for native-menu endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            headers="$(curl --silent --show-error --head --max-time 30 \
              "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish?release=${GITHUB_SHA}&attempt=${attempt}" || true)"
            if grep -qi "x-mmg-native-main-menu:" <<<"$headers"; then
              echo "Native main-menu Worker is deployed."
              exit 0
            fi
            echo "Worker verification attempt ${attempt}/48."
            sleep 5
          done
          echo "Native main-menu Worker did not become reachable." >&2
          exit 1

      - name: Publish exact native Shopify menu
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          curl --fail-with-body --retry 5 --retry-delay 3 \
            -X POST "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish" \
            -H "Content-Type: application/json" \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            -o native-main-menu-result.json
          cat native-main-menu-result.json
          grep -q '"status":"completed"' native-main-menu-result.json
          grep -q '"exactNativeMenuReadBack":true' native-main-menu-result.json
          grep -q '"knowledgeLibraryRemoved":true' native-main-menu-result.json
          grep -q '"companyScopeRestricted":true' native-main-menu-result.json
          grep -q '"title":"Shop"' native-main-menu-result.json
          grep -q '"title":"Create & Learn"' native-main-menu-result.json
          grep -q '"title":"Services"' native-main-menu-result.json
          grep -q '"title":"Company"' native-main-menu-result.json
          grep -q '"title":"Support"' native-main-menu-result.json

      - name: Verify live storefront menu
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          for attempt in $(seq 1 18); do
            curl --location --fail --silent --show-error \
              -H "Cache-Control: no-cache" \
              "https://themindsetmediagroup.com/?mmg_nav_verify=${GITHUB_SHA}&attempt=${attempt}" \
              -o live-home.html
            if ! grep -q '>Knowledge Library<' live-home.html \
              && grep -q '>Create &amp; Learn<' live-home.html \
              && grep -q '>Support<' live-home.html; then
              echo "Live native Shopify menu verified."
              exit 0
            fi
            echo "Live verification attempt ${attempt}/18."
            sleep 10
          done
          echo "Live storefront still exposes the legacy menu tree." >&2
          exit 1
