name: Deploy Kairos Worker and Publish Shopify

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Confirm Worker deployment startup
        run: echo "Kairos Worker deployment started."

      - name: Materialize repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"

      - name: Validate deployed Worker source chain
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release"
          test -f cloudflare/mmg-ios/package.json
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          test -f cloudflare/mmg-ios/src/kairos-native-navigation-theme-publisher-v9.js
          test -f cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          test -f .github/scripts/verify-mmg-page-shell.mjs
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          node --check cloudflare/mmg-ios/src/kairos-native-navigation-theme-publisher-v9.js
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          node --check .github/scripts/verify-mmg-page-shell.mjs
          grep -q 'kairos-native-navigation-theme-publisher-v9.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q 'kairos-page-shell-publisher-v1.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q 'kairos-native-navigation-theme-publisher-20260719-9' cloudflare/mmg-ios/src/kairos-native-navigation-theme-publisher-v9.js
          grep -q 'kairos-page-shell-publisher-20260719-1' cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  publish-shopify:
    needs: deploy-worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
    steps:
      - name: Wait for current Worker deployment
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            identity="${RUNNER_TEMP}/deployment-identity.json"
            headers="${RUNNER_TEMP}/deployment-identity.headers"
            status="$(curl --silent --show-error --max-time 30 \
              -D "${headers}" \
              "${WORKER_BASE_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${identity}" -w '%{http_code}' || true)"
            echo "Deployment identity verification ${attempt}/24 HTTP ${status}"
            cat "${identity}" || true
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${identity}" \
              && grep -qi 'x-mmg-native-navigation: kairos-native-navigation-theme-publisher-20260719-9' "${headers}" \
              && grep -qi 'x-mmg-page-shell: kairos-page-shell-publisher-20260719-1' "${headers}"; then
              echo "Canonical navigation and page-shell Worker are live."
              exit 0
            fi
            sleep 5
          done
          echo "Current canonical Worker deployment was not identifiable." >&2
          exit 1

      - name: Publish native Shopify menu
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/native-main-menu-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 60 \
            -X POST "${WORKER_BASE_URL}/api/shopify/native-main-menu/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            -o "${result}" -w '%{http_code}' || true)"
          echo "Native Shopify menu publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactNativeMenuReadBack":true' "${result}"

      - name: Publish canonical five-group live-theme navigation
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/canonical-navigation-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/navigation/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_NAVIGATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          echo "Canonical live-theme publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" = "200"

          published_build="$(python3 - "${result}" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          with open(path, encoding="utf-8") as handle:
              body = json.load(handle)

          expected = ["Shop", "Create & Learn", "Services", "Company", "Support"]
          actual = body.get("verification", {}).get("canonicalTopLevel", [])
          build = body.get("build", "")
          valid = (
              body.get("status") == "completed"
              and build == "kairos-native-navigation-theme-publisher-20260719-9"
              and body.get("verification", {}).get("valid") is True
              and body.get("verification", {}).get("exactThemeFileReadBack") is True
              and body.get("verification", {}).get("layoutInjectionPresent") is True
              and body.get("verification", {}).get("legacyRuntimeBlocksRemoved") is True
              and body.get("cleanup", {}).get("legacyRuntimeBlocksRemoved") is True
              and body.get("safeguards", {}).get("mainThemeRoleVerified") is True
              and actual == expected
          )
          if not valid:
              print(json.dumps(body, indent=2), file=sys.stderr)
              raise SystemExit("Canonical navigation publication response failed validation.")
          print(build)
          PY
          )"
          echo "CANONICAL_BUILD=${published_build}" >> "${GITHUB_ENV}"
          echo "Validated published build ${published_build}."

      - name: Publish shared MMG page shell
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/page-shell-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/page-shell/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_PAGE_SHELL_RECONCILIATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          echo "MMG page-shell publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" = "200"

          python3 - "${result}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              body = json.load(handle)
          expected_pages = ["/pages/free-creator-toolkit", "/pages/publishing-services"]
          verification = body.get("verification", {})
          valid = (
              body.get("status") == "completed"
              and body.get("build") == "kairos-page-shell-publisher-20260719-1"
              and verification.get("valid") is True
              and verification.get("exactThemeFileReadBack") is True
              and verification.get("layoutInjectionPresent") is True
              and verification.get("targetPages") == expected_pages
              and body.get("safeguards", {}).get("mainThemeRoleVerified") is True
              and body.get("safeguards", {}).get("nativeFooterPreserved") is True
          )
          if not valid:
              print(json.dumps(body, indent=2), file=sys.stderr)
              raise SystemExit("MMG page-shell publication response failed validation.")
          PY

      - name: Verify live canonical assets are executable
        run: |
          set -euo pipefail
          for attempt in $(seq 1 8); do
            html="${RUNNER_TEMP}/storefront-${attempt}.html"
            headers="${RUNNER_TEMP}/storefront-${attempt}.headers"
            nav_js="${RUNNER_TEMP}/mmg-canonical-navigation-${attempt}.js"
            nav_css="${RUNNER_TEMP}/mmg-canonical-navigation-${attempt}.css"
            shell_js="${RUNNER_TEMP}/mmg-page-shell-${attempt}.js"
            shell_css="${RUNNER_TEMP}/mmg-page-shell-${attempt}.css"

            status="$(curl --location --silent --show-error --max-time 45 \
              -D "${headers}" \
              -H 'User-Agent: Mozilla/5.0 (MMG release verifier)' \
              -H 'Cache-Control: no-cache, no-store, must-revalidate' \
              "${STOREFRONT_URL}/?mmg_release=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${html}" -w '%{http_code}' || true)"
            echo "Asset verification ${attempt}/8 | HTTP ${status}"

            if [ "${status}" = "200" ] \
              && grep -q 'Shopify.theme = ' "${html}" \
              && grep -q 'MMG_CANONICAL_NAVIGATION_START' "${html}" \
              && grep -q 'MMG_PAGE_SHELL_START' "${html}" \
              && grep -q 'mmg-canonical-navigation.css' "${html}" \
              && grep -q 'mmg-canonical-navigation.js' "${html}" \
              && grep -q 'mmg-page-shell.css' "${html}" \
              && grep -q 'mmg-page-shell.js' "${html}" \
              && ! grep -q 'MMG_THEME_MENU_HOTFIX_START' "${html}" \
              && ! grep -q 'MMG_ALL_THEME_NAV_START' "${html}"; then

              nav_js_src="$(grep -oE 'src="[^"]*mmg-canonical-navigation\.js[^"]*"' "${html}" | head -n1 | sed 's/^src="//;s/"$//;s/&amp;/\&/g')"
              nav_css_src="$(grep -oE 'href="[^"]*mmg-canonical-navigation\.css[^"]*"' "${html}" | head -n1 | sed 's/^href="//;s/"$//;s/&amp;/\&/g')"
              shell_js_src="$(grep -oE 'src="[^"]*mmg-page-shell\.js[^"]*"' "${html}" | head -n1 | sed 's/^src="//;s/"$//;s/&amp;/\&/g')"
              shell_css_src="$(grep -oE 'href="[^"]*mmg-page-shell\.css[^"]*"' "${html}" | head -n1 | sed 's/^href="//;s/"$//;s/&amp;/\&/g')"

              normalize_url() {
                case "$1" in
                  //*) printf 'https:%s' "$1" ;;
                  /*) printf '%s%s' "${STOREFRONT_URL}" "$1" ;;
                  http*) printf '%s' "$1" ;;
                  *) printf '' ;;
                esac
              }

              nav_js_url="$(normalize_url "${nav_js_src}")"
              nav_css_url="$(normalize_url "${nav_css_src}")"
              shell_js_url="$(normalize_url "${shell_js_src}")"
              shell_css_url="$(normalize_url "${shell_css_src}")"

              if [ -n "${nav_js_url}" ] && [ -n "${nav_css_url}" ] && [ -n "${shell_js_url}" ] && [ -n "${shell_css_url}" ] \
                && curl --fail --silent --show-error --max-time 45 -H 'Cache-Control: no-cache' "${nav_js_url}" -o "${nav_js}" \
                && curl --fail --silent --show-error --max-time 45 -H 'Cache-Control: no-cache' "${nav_css_url}" -o "${nav_css}" \
                && curl --fail --silent --show-error --max-time 45 -H 'Cache-Control: no-cache' "${shell_js_url}" -o "${shell_js}" \
                && curl --fail --silent --show-error --max-time 45 -H 'Cache-Control: no-cache' "${shell_css_url}" -o "${shell_css}" \
                && node --check "${nav_js}" \
                && node --check "${shell_js}" \
                && grep -q "${CANONICAL_BUILD}" "${nav_js}" \
                && grep -q 'kairos-page-shell-publisher-20260719-1' "${shell_js}" \
                && grep -q '"Shop"' "${nav_js}" \
                && grep -q '"Create & Learn"' "${nav_js}" \
                && grep -q '"Services"' "${nav_js}" \
                && grep -q '"Company"' "${nav_js}" \
                && grep -q '"Support"' "${nav_js}" \
                && grep -q '/pages/free-creator-toolkit' "${shell_js}" \
                && grep -q '/pages/publishing-services' "${shell_js}" \
                && grep -q 'publishing-process' "${shell_js}"; then
                echo "Success: canonical navigation and page-shell assets are live and executable."
                exit 0
              fi
            fi

            echo "--- live shell markers ---"
            grep -Ein -m 50 'Shopify.theme|MMG_CANONICAL_NAVIGATION|MMG_PAGE_SHELL|mmg-canonical-navigation|mmg-page-shell|MMG_ALL_THEME_NAV|MMG_THEME_MENU_HOTFIX' "${html}" || true
            retry_after="$(awk 'BEGIN{IGNORECASE=1} /^retry-after:/ {gsub("\r", "", $2); print $2; exit}' "${headers}")"
            if [ -n "${retry_after}" ] && [ "${retry_after}" -le 180 ] 2>/dev/null; then sleep "${retry_after}"; else sleep 15; fi
          done
          echo "Error: canonical navigation and page-shell assets were not live and executable." >&2
          exit 1

      - name: Materialize page-shell verifier
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-verifier"
          cd "${RUNNER_TEMP}/mmg-verifier"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -f .github/scripts/verify-mmg-page-shell.mjs

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-verifier"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Verify Free Creator Toolkit and Publishing Services
        env:
          MMG_STOREFRONT_URL: https://themindsetmediagroup.com
          MMG_PAGE_SHELL_OUTPUT: artifacts/mmg-page-shell
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-verifier"
          node .github/scripts/verify-mmg-page-shell.mjs

      - name: Upload page-shell verification artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mmg-page-shell-verification-${{ github.run_id }}
          path: ${{ runner.temp }}/mmg-verifier/artifacts/mmg-page-shell
          if-no-files-found: warn
          retention-days: 14
