name: Deploy MMG Worker and Repair Shopify Navigation
run-name: MMG storefront delivery reconciliation ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: mmg-production-deployment
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ github.token }}
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_HOST: themindsetmediagroup.com
      SHOPIFY_HOST: 07kd8e-qw.myshopify.com
      THEME_MARKER: kairos-theme-menu-hotfix-20260718-2
    steps:
      - name: Resolve deployment commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            release_sha="$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          else
            release_sha="${GITHUB_SHA}"
          fi
          test -n "$release_sha"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Materialize exact repository commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/mmg-release"
          mkdir -p "$RUNNER_TEMP/mmg-release"
          cd "$RUNNER_TEMP/mmg-release"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${{ steps.release.outputs.sha }}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${{ steps.release.outputs.sha }}"
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js

      - name: Deploy exact commit to Cloudflare Worker
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          npm install --no-save wrangler@latest
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${{ steps.release.outputs.sha }}" \
            --var "DEPLOYED_AT:${deployed_at}" \
            | tee worker-deploy.txt

      - name: Prove live Worker exposes theme publisher
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            headers="$RUNNER_TEMP/theme-publisher-headers.txt"
            status="$(curl --silent --show-error --head --max-time 30 -o /dev/null -D "$headers" -w '%{http_code}' "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish?sha=${{ steps.release.outputs.sha }}&attempt=${attempt}" || true)"
            echo "Theme publisher probe ${attempt}/60 HTTP ${status}"
            if grep -qi "x-mmg-theme-menu-hotfix: ${THEME_MARKER}" "$headers"; then
              exit 0
            fi
            sleep 5
          done
          echo "Live Worker never exposed the verified theme-menu publisher." >&2
          exit 1

      - name: Publish canonical navigation into Shopify MAIN theme
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 \
            -X POST "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_THEME_MENU_HOTFIX_NOW"}' \
            -o theme-menu-result.json -w '%{http_code}' || true)"
          echo "Theme menu publish HTTP ${status}"
          cat theme-menu-result.json || true
          test "$status" -ge 200
          test "$status" -lt 300
          grep -q '"status":"completed"' theme-menu-result.json
          grep -q '"exactThemeReadBack":true' theme-menu-result.json
          grep -q '"inlineReleaseMarkerPresent":true' theme-menu-result.json
          grep -q '"mainThemeRoleVerified":true' theme-menu-result.json
          grep -q '"shopDomainIdentityVerified":true' theme-menu-result.json
          grep -q '"knowledgeLibraryRemoved":true' theme-menu-result.json

      - name: Purge Cloudflare storefront cache when zone access exists
        shell: bash
        run: |
          set -u
          zones_json="$RUNNER_TEMP/cloudflare-zones.json"
          zone_status="$(curl --silent --show-error \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            "https://api.cloudflare.com/client/v4/zones?name=${STOREFRONT_HOST}" \
            -o "$zones_json" -w '%{http_code}' || true)"
          echo "Cloudflare zone lookup HTTP ${zone_status}"
          cat "$zones_json" 2>/dev/null || true
          zone_id="$(jq -r '.result[0].id // empty' "$zones_json" 2>/dev/null || true)"
          if [ -z "$zone_id" ]; then
            echo "No accessible Cloudflare zone found for ${STOREFRONT_HOST}; continuing with origin/custom-domain comparison."
            exit 0
          fi
          purge_json="$RUNNER_TEMP/cloudflare-purge.json"
          purge_status="$(curl --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache" \
            -o "$purge_json" -w '%{http_code}' || true)"
          echo "Cloudflare cache purge HTTP ${purge_status}"
          cat "$purge_json" 2>/dev/null || true
          if jq -e '.success == true' "$purge_json" >/dev/null 2>&1; then
            echo "Cloudflare storefront cache purged."
          else
            echo "Cloudflare cache purge was not authorized; continuing with delivery diagnostics."
          fi

      - name: Compare Shopify origin and custom-domain delivery
        shell: bash
        run: |
          set -euo pipefail
          release="${{ steps.release.outputs.sha }}"
          curl --silent --show-error --location \
            -D "$RUNNER_TEMP/shopify.headers" \
            -H 'Cache-Control: no-cache, no-store, max-age=0' \
            "https://${SHOPIFY_HOST}/?mmg_delivery_probe=${release}" \
            -o "$RUNNER_TEMP/shopify.html"
          curl --silent --show-error --location \
            -D "$RUNNER_TEMP/custom.headers" \
            -H 'Cache-Control: no-cache, no-store, max-age=0' \
            "https://${STOREFRONT_HOST}/?mmg_delivery_probe=${release}" \
            -o "$RUNNER_TEMP/custom.html"
          echo '--- Shopify response headers ---'
          cat "$RUNNER_TEMP/shopify.headers"
          echo '--- Custom-domain response headers ---'
          cat "$RUNNER_TEMP/custom.headers"
          shopify_hash="$(sha256sum "$RUNNER_TEMP/shopify.html" | awk '{print $1}')"
          custom_hash="$(sha256sum "$RUNNER_TEMP/custom.html" | awk '{print $1}')"
          shopify_marker="$(grep -c "${THEME_MARKER}" "$RUNNER_TEMP/shopify.html" || true)"
          custom_marker="$(grep -c "${THEME_MARKER}" "$RUNNER_TEMP/custom.html" || true)"
          echo "Shopify HTML SHA256: ${shopify_hash}"
          echo "Custom HTML SHA256:  ${custom_hash}"
          echo "Shopify marker count: ${shopify_marker}"
          echo "Custom marker count:  ${custom_marker}"
          if [ "$shopify_marker" -gt 0 ] && [ "$custom_marker" -eq 0 ]; then
            echo "DELIVERY_CLASSIFICATION=custom_domain_proxy_or_cache_mismatch" | tee -a "$GITHUB_ENV"
          elif [ "$shopify_marker" -eq 0 ] && [ "$custom_marker" -eq 0 ]; then
            echo "DELIVERY_CLASSIFICATION=shopify_render_mismatch" | tee -a "$GITHUB_ENV"
          else
            echo "DELIVERY_CLASSIFICATION=marker_visible" | tee -a "$GITHUB_ENV"
          fi

      - name: Verify public storefront navigation after delivery diagnosis
        shell: bash
        run: |
          set -euo pipefail
          expected_sha="${{ steps.release.outputs.sha }}"
          for attempt in $(seq 1 36); do
            headers="$RUNNER_TEMP/live-home.headers"
            status="$(curl --location --silent --show-error \
              -D "$headers" \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              -H 'Pragma: no-cache' \
              "https://${STOREFRONT_HOST}/?mmg_theme_navigation=${expected_sha}&attempt=${attempt}&cache_bust=$(date +%s%N)" \
              -o "$RUNNER_TEMP/live-home.html" -w '%{http_code}' || true)"
            echo "Storefront verification ${attempt}/36 HTTP ${status} classification=${DELIVERY_CLASSIFICATION:-unknown}"
            grep -iE '^(cf-cache-status|age|server|x-cache|cache-control|location):' "$headers" || true
            if [ "$status" = "200" ] \
              && grep -q "${THEME_MARKER}" "$RUNNER_TEMP/live-home.html" \
              && grep -q 'Create &amp; Learn' "$RUNNER_TEMP/live-home.html" \
              && grep -q '>Support<' "$RUNNER_TEMP/live-home.html" \
              && grep -q '>Shop<' "$RUNNER_TEMP/live-home.html" \
              && ! grep -q '>Knowledge Library<' "$RUNNER_TEMP/live-home.html" \
              && ! grep -q '>Catalog<' "$RUNNER_TEMP/live-home.html"; then
              echo "Live Shopify navigation verified."
              exit 0
            fi
            sleep 5
          done
          echo "Storefront delivery failed classification=${DELIVERY_CLASSIFICATION:-unknown}." >&2
          exit 1
