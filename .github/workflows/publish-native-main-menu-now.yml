name: Publish Native Shopify Main Menu Now

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-native-main-menu-v1.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - ".github/workflows/publish-native-main-menu-now.yml"

permissions:
  contents: read

concurrency:
  group: publish-native-shopify-main-menu-now
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cloudflare/mmg-ios
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Wrangler
        run: npm install --no-save wrangler@latest
      - name: Deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy | tee native-main-menu-worker-deploy.txt
      - name: Publish native Shopify menu
        env:
          RUNTIME: ${{ secrets.KAIROS_RUNTIME_URL }}
        run: |
          set -euo pipefail
          test -n "$RUNTIME"
          curl --fail-with-body --retry 5 --retry-delay 3 \
            -X POST "${RUNTIME%/}/api/shopify/native-main-menu/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            | tee native-main-menu-result.json
          grep -q '"status":"completed"' native-main-menu-result.json
          grep -q '"exactNativeMenuReadBack":true' native-main-menu-result.json
          grep -q '"knowledgeLibraryRemoved":true' native-main-menu-result.json
          grep -q '"companyScopeRestricted":true' native-main-menu-result.json
      - name: Verify live storefront no longer serves legacy menu
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            curl -L --fail -sS 'https://themindsetmediagroup.com/?mmg_nav_verify=1' -o live-home.html
            if ! grep -q '>Knowledge Library<' live-home.html && grep -q '>Create &amp; Learn<' live-home.html && grep -q '>Support<' live-home.html; then
              exit 0
            fi
            sleep 10
          done
          echo 'Live storefront still exposes the legacy menu tree.' >&2
          exit 1
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-main-menu-publication-proof
          path: |
            cloudflare/mmg-ios/native-main-menu-worker-deploy.txt
            cloudflare/mmg-ios/native-main-menu-result.json
            cloudflare/mmg-ios/live-home.html
