name: Publish Native Shopify Main Menu Now
run-name: Force native Shopify menu release ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-native-main-menu-v1.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - ".github/workflows/publish-native-main-menu-now.yml"

permissions:
  contents: read

concurrency:
  group: publish-native-shopify-main-menu-now
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cloudflare/mmg-ios
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Wrangler
        run: npm install --no-save wrangler@latest
      - name: Deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy | tee native-main-menu-worker-deploy.txt
      - name: Wait for native-menu Worker entry
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            headers="$(curl -sS -I --max-time 30 "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish?release=${GITHUB_SHA}&attempt=${attempt}" || true)"
            if grep -qi 'x-mmg-native-main-menu:' <<<"$headers"; then
              echo 'Native main-menu Worker is deployed.'
              exit 0
            fi
            sleep 5
          done
          echo 'Native main-menu Worker did not become reachable.' >&2
          exit 1
      - name: Publish native Shopify menu
        run: |
          set -euo pipefail
          curl --fail-with-body --retry 5 --retry-delay 3 \
            -X POST "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/native-main-menu/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            | tee native-main-menu-result.json
          node - <<'NODE'
          const fs = require('node:fs');
          const body = JSON.parse(fs.readFileSync('native-main-menu-result.json', 'utf8'));
          const expected = ['Shop', 'Create & Learn', 'Services', 'Company', 'Support'];
          const observed = (body?.menu?.after || []).map(item => item.title);
          const valid = body?.status === 'completed'
            && body?.verification?.exactNativeMenuReadBack === true
            && body?.verification?.knowledgeLibraryRemoved === true
            && body?.verification?.companyScopeRestricted === true
            && body?.verification?.themeOverrideNotUsed === true
            && JSON.stringify(observed) === JSON.stringify(expected);
          if (!valid) {
            console.error(JSON.stringify(body, null, 2));
            process.exit(1);
          }
          console.log(JSON.stringify({status: body.status, topLevel: observed}, null, 2));
          NODE
      - name: Verify live storefront no longer serves legacy menu
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            curl -L --fail -sS -H 'Cache-Control: no-cache' \
              "https://themindsetmediagroup.com/?mmg_nav_verify=${GITHUB_SHA}&attempt=${attempt}" \
              -o live-home.html
            if ! grep -q '>Knowledge Library<' live-home.html \
              && grep -q '>Create &amp; Learn<' live-home.html \
              && grep -q '>Support<' live-home.html; then
              echo 'Live native Shopify menu verified.'
              exit 0
            fi
            sleep 10
          done
          echo 'Live storefront still exposes the legacy menu tree.' >&2
          exit 1
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-main-menu-publication-proof
          path: |
            cloudflare/mmg-ios/native-main-menu-worker-deploy.txt
            cloudflare/mmg-ios/native-main-menu-result.json
            cloudflare/mmg-ios/live-home.html