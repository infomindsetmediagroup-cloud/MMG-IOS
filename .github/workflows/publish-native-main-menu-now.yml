name: Publish Corrected Shopify Menu Now
run-name: Verified live-shop menu release ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js
      - cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
      - cloudflare/mmg-ios/wrangler.toml
      - .github/workflows/publish-native-main-menu-now.yml

permissions:
  contents: read

concurrency:
  group: publish-corrected-shopify-menu-now
  cancel-in-progress: false

jobs:
  deploy-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Materialize exact repository commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/mmg-release"
          mkdir -p "$RUNNER_TEMP/mmg-release"
          cd "$RUNNER_TEMP/mmg-release"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js

      - name: Deploy identity-gated theme-menu Worker
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          npm install --no-save wrangler@latest
          npx wrangler deploy | tee theme-menu-hotfix-worker-deploy.txt

      - name: Wait for identity-gated endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            headers_file="$RUNNER_TEMP/theme-menu-hotfix-headers.txt"
            status="$(curl --silent --show-error --head --max-time 30 -o /dev/null -D "$headers_file" -w '%{http_code}' "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/theme-menu-hotfix/publish?release=${GITHUB_SHA}&attempt=${attempt}" || true)"
            echo "Endpoint probe ${attempt}/48 HTTP ${status}"
            if grep -qi "x-mmg-theme-menu-hotfix: kairos-theme-menu-hotfix-20260718-2" "$headers_file"; then
              echo "Identity-gated theme menu Worker is deployed."
              exit 0
            fi
            sleep 5
          done
          echo "Identity-gated theme menu Worker did not become reachable." >&2
          exit 1

      - name: Verify shop identity and publish to verified MAIN
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          status="$(curl --silent --show-error --retry 2 --retry-delay 3 -X POST "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/theme-menu-hotfix/publish" -H "Content-Type: application/json" --data '{"confirmation":"PUBLISH_MMG_THEME_MENU_HOTFIX_NOW"}' -o theme-menu-hotfix-result.json -w '%{http_code}' || true)"
          echo "Identity-gated publish HTTP ${status}"
          cat theme-menu-hotfix-result.json || true
          test "$status" -ge 200
          test "$status" -lt 300
          grep -q '"status":"completed"' theme-menu-hotfix-result.json
          grep -q '"domainIdentityVerified":true' theme-menu-hotfix-result.json
          grep -q '"expectedStorefrontHost":"themindsetmediagroup.com"' theme-menu-hotfix-result.json
          grep -q '"exactThemeReadBack":true' theme-menu-hotfix-result.json
          grep -q '"shopDomainIdentityVerified":true' theme-menu-hotfix-result.json
          grep -q '"mainThemeRoleVerified":true' theme-menu-hotfix-result.json
          grep -q '"targetThemeIdEmbedded":true' theme-menu-hotfix-result.json
          grep -q '"knowledgeLibraryRemoved":true' theme-menu-hotfix-result.json

      - name: Verify v2 marker on live storefront
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mmg-release/cloudflare/mmg-ios"
          for attempt in $(seq 1 24); do
            status="$(curl --location --silent --show-error -H "Cache-Control: no-cache" "https://themindsetmediagroup.com/?mmg_menu_hotfix=${GITHUB_SHA}&attempt=${attempt}" -o live-home.html -w '%{http_code}' || true)"
            echo "Live verification ${attempt}/24 HTTP ${status}"
            if [ "$status" = "200" ] \
              && grep -q 'kairos-theme-menu-hotfix-20260718-2' live-home.html \
              && grep -q 'mmg-theme-menu-identity' live-home.html \
              && grep -q 'Create &amp; Learn' live-home.html \
              && grep -q 'Support' live-home.html; then
              echo "Verified corrected menu on the identified live Shopify storefront."
              exit 0
            fi
            sleep 10
          done
          echo "Identified storefront did not expose the verified MAIN-theme menu revision." >&2
          exit 1
