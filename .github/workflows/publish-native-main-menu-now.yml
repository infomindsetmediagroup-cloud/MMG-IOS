name: Deploy Kairos Worker and Publish Shopify

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Confirm Worker deployment startup
        run: echo "Kairos shell-only Worker deployment started."

      - name: Materialize repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"

      - name: Validate Worker source
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release"
          test -f cloudflare/mmg-ios/package.json
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          test -f cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  publish-shopify:
    needs: deploy-worker
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      THEME_MARKER: kairos-theme-menu-hotfix-20260718-3
    steps:
      - name: Confirm Shopify publication startup
        run: echo "Kairos Shopify publication started after successful Worker deployment."

      - name: Wait for deployed publisher
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            headers="${RUNNER_TEMP}/publisher-headers.txt"
            status="$(curl --silent --show-error --head --max-time 30 \
              -D "${headers}" \
              -o /dev/null \
              -w '%{http_code}' \
              "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish?sha=${GITHUB_SHA}&attempt=${attempt}" || true)"
            echo "Publisher verification ${attempt}/36 HTTP ${status}"
            if grep -qi "x-mmg-theme-menu-hotfix: ${THEME_MARKER}" "${headers}"; then
              echo "Kairos Shopify publisher is live."
              exit 0
            fi
            sleep 5
          done
          echo "Kairos Shopify publisher did not become live." >&2
          exit 1

      - name: Publish canonical Shopify navigation
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/theme-menu-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 \
            -X POST "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_THEME_MENU_HOTFIX_NOW"}' \
            -o "${result}" \
            -w '%{http_code}' || true)"
          echo "Shopify publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" -ge 200
          test "${status}" -lt 300
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactThemeReadBack":true' "${result}"
          grep -q '"inlineReleaseMarkerPresent":true' "${result}"
          grep -q '"mainThemeRoleVerified":true' "${result}"
          grep -q '"shopDomainIdentityVerified":true' "${result}"

      - name: Verify public Shopify release marker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            html="${RUNNER_TEMP}/storefront.html"
            status="$(curl --location --silent --show-error \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "https://themindsetmediagroup.com/?mmg_release=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${html}" \
              -w '%{http_code}' || true)"
            echo "Public marker verification ${attempt}/24 HTTP ${status}"
            if [ "${status}" = "200" ] && grep -q "${THEME_MARKER}" "${html}"; then
              echo "Public Shopify release marker verified."
              exit 0
            fi
            sleep 5
          done
          echo "Public storefront did not expose the Shopify release marker." >&2
          exit 1
