name: Deploy MMG Worker and Repair Shopify Navigation

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mmg-production-deployment
  cancel-in-progress: false

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      THEME_MARKER: kairos-theme-menu-hotfix-20260718-3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate deployment files
        shell: bash
        run: |
          set -euo pipefail
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js
          grep -q "${THEME_MARKER}" cloudflare/mmg-ios/src/kairos-theme-menu-hotfix-publisher-20260718.js

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install

      - name: Deploy Cloudflare Worker
        working-directory: cloudflare/mmg-ios
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for live v3 publisher
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            headers="${RUNNER_TEMP}/publisher-headers.txt"
            curl --silent --show-error --head --max-time 30 \
              -D "${headers}" \
              -o /dev/null \
              "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish?sha=${GITHUB_SHA}&attempt=${attempt}" || true
            if grep -qi "x-mmg-theme-menu-hotfix: ${THEME_MARKER}" "${headers}"; then
              echo "Live v3 publisher verified."
              exit 0
            fi
            sleep 5
          done
          echo "Live Worker did not expose ${THEME_MARKER}." >&2
          exit 1

      - name: Publish canonical navigation
        shell: bash
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/theme-menu-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 \
            -X POST "${WORKER_BASE_URL}/api/shopify/theme-menu-hotfix/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_THEME_MENU_HOTFIX_NOW"}' \
            -o "${result}" \
            -w '%{http_code}' || true)"
          cat "${result}" || true
          test "${status}" -ge 200
          test "${status}" -lt 300
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactThemeReadBack":true' "${result}"
          grep -q '"inlineReleaseMarkerPresent":true' "${result}"

      - name: Verify marker is delivered publicly
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            html="${RUNNER_TEMP}/storefront.html"
            status="$(curl --location --silent --show-error \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              "https://themindsetmediagroup.com/?mmg_marker_verify=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${html}" \
              -w '%{http_code}' || true)"
            echo "Public marker verification ${attempt}/24 HTTP ${status}"
            if [ "${status}" = "200" ] && grep -q "${THEME_MARKER}" "${html}"; then
              echo "Public v3 theme marker verified."
              exit 0
            fi
            sleep 5
          done
          echo "Public storefront did not expose ${THEME_MARKER}." >&2
          exit 1
