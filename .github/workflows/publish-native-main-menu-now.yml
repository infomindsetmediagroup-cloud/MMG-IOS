name: Deploy to Shopify and Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy Theme to Shopify
        # This uses your app's credentials to push code safely
        run: |
          shopify theme push --store ${{ secrets.SHOPIFY_STORE_URL }} \
          --theme ${{ secrets.SHOPIFY_THEME_ID }} \
          --password ${{ secrets.SHOPIFY_PASSWORD }} \
          --json
        env:
          SHOPIFY_CLI_TTY: 0

      - name: Publish to Cloudflare
        # Use the official Cloudflare Action for reliable deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'mmg-storefront'
          directory: './dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
