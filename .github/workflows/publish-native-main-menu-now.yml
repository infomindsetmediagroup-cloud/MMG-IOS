name: Deploy Kairos Worker and Publish Shopify

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Confirm Worker deployment startup
        run: echo "Kairos shell-only Worker deployment started."

      - name: Materialize repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"

      - name: Validate Worker source
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release"
          test -f cloudflare/mmg-ios/package.json
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          test -f cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  publish-shopify:
    needs: deploy-worker
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      NATIVE_MENU_BUILD: kairos-native-main-menu-publisher-20260718-7
    steps:
      - name: Confirm Shopify publication startup
        run: echo "Publishing the native Shopify menu bound to the live MAIN theme."

      - name: Wait for native menu publisher
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            headers="${RUNNER_TEMP}/publisher-headers.txt"
            status="$(curl --silent --show-error --head --max-time 30 \
              -D "${headers}" \
              -o /dev/null \
              -w '%{http_code}' \
              "${WORKER_BASE_URL}/api/shopify/native-main-menu/publish?sha=${GITHUB_SHA}&attempt=${attempt}" || true)"
            echo "Native publisher verification ${attempt}/36 HTTP ${status}"
            if grep -qi "x-mmg-native-main-menu: ${NATIVE_MENU_BUILD}" "${headers}"; then
              echo "Native Shopify menu publisher is live."
              exit 0
            fi
            sleep 5
          done
          echo "Native Shopify menu publisher did not become live." >&2
          exit 1

      - name: Publish native Shopify navigation
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/native-main-menu-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 \
            -X POST "${WORKER_BASE_URL}/api/shopify/native-main-menu/publish" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            -o "${result}" \
            -w '%{http_code}' || true)"
          echo "Native Shopify menu publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" -ge 200
          test "${status}" -lt 300
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactNativeMenuReadBack":true' "${result}"
          grep -q '"boundMenuUpdated":true' "${result}"
          grep -q '"knowledgeLibraryRemoved":true' "${result}"
          grep -q '"absoluteUrlsUsed":true' "${result}"
          grep -q '"themeOverrideNotUsed":true' "${result}"

      - name: Record storefront delivery status
        run: |
          set -euo pipefail
          status="$(curl --location --silent --show-error --max-time 30 \
            -H 'Cache-Control: no-cache, no-store, max-age=0' \
            "${STOREFRONT_URL}/?mmg_native_menu=${GITHUB_SHA}" \
            -o /dev/null \
            -w '%{http_code}' || true)"
          echo "Storefront delivery HTTP ${status:-unavailable}."
          echo "Authoritative verification passed through exact native Shopify menu read-back."
