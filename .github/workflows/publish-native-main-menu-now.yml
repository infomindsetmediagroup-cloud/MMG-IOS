name: Deploy Kairos Worker and Publish Shopify

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Confirm Worker deployment startup
        run: echo "Kairos shell-only Worker deployment started."

      - name: Materialize repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"

      - name: Validate Worker source
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release"
          test -f cloudflare/mmg-ios/package.json
          test -f cloudflare/mmg-ios/wrangler.toml
          test -f cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          test -f cloudflare/mmg-ios/src/kairos-native-main-menu-publisher-20260718.js
          test -f cloudflare/mmg-ios/src/kairos-all-theme-navigation-publisher-20260719.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  publish-shopify:
    needs: deploy-worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      ALL_THEME_BUILD: kairos-all-theme-navigation-20260719-1
    steps:
      - name: Wait for current Worker deployment
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            identity="${RUNNER_TEMP}/deployment-identity.json"
            status="$(curl --silent --show-error --max-time 30 \
              "${WORKER_BASE_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${identity}" \
              -w '%{http_code}' || true)"
            echo "Deployment identity verification ${attempt}/36 HTTP ${status}"
            cat "${identity}" || true
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${identity}"; then
              echo "Current Worker deployment is live."
              exit 0
            fi
            sleep 5
          done
          echo "Current Worker deployment did not become identifiable." >&2
          exit 1

      - name: Publish native Shopify navigation
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/native-main-menu-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 45 \
            -X POST "${WORKER_BASE_URL}/api/shopify/native-main-menu/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_MENU_NOW"}' \
            -o "${result}" \
            -w '%{http_code}' || true)"
          echo "Native Shopify menu publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactNativeMenuReadBack":true' "${result}"
          grep -q '"handle":"main-menu"' "${result}"
          grep -q '"knowledgeLibraryRemoved":true' "${result}"
          grep -q '"absoluteUrlsUsed":true' "${result}"

      - name: Publish canonical navigation across all renderable themes
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/all-theme-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/all-theme-navigation/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_ALL_THEME_NAVIGATION_NOW"}' \
            -o "${result}" \
            -w '%{http_code}' || true)"
          echo "All-theme navigation publication HTTP ${status}"
          cat "${result}" || true
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q "\"build\":\"${ALL_THEME_BUILD}\"" "${result}"
          grep -q '"allReadableThemeLayoutsPatched":true' "${result}"
          grep -q '"exactThemeReadBack":true' "${result}"
          grep -q '"canonicalNavigationEmbedded":true' "${result}"
          grep -q '"mainThemePatched":true' "${result}"

      - name: Verify public storefront navigation
        run: |
          set -euo pipefail

          cache_bust="$(date +%s)"

          for attempt in $(seq 1 36); do
            html="${RUNNER_TEMP}/storefront-${attempt}.html"
            headers="${RUNNER_TEMP}/storefront-${attempt}.headers"

            status="$(curl --location --silent --show-error --max-time 45 \
              -D "${headers}" \
              -H 'User-Agent: Mozilla/5.0 (MMG release verifier)' \
              -H 'Cache-Control: no-cache, no-store, must-revalidate' \
              -H 'Pragma: no-cache' \
              "${STOREFRONT_URL}/?mmg_public_nav=${GITHUB_SHA}&attempt=${attempt}&cb=${cache_bust}-${attempt}" \
              -o "${html}" \
              -w '%{http_code}' || true)"

            echo "Verification ${attempt}/36 | HTTP ${status}"

            if [ "${status}" = "200" ] \
              && grep -q 'Shopify.theme = ' "${html}" \
              && grep -q 'MMG_CANONICAL_NAVIGATION_START' "${html}" \
              && grep -q 'mmg-canonical-navigation.js' "${html}" \
              && grep -q 'data-mmg-menu' "${html}" \
              && grep -q '\[\["Shop"' "${html}" \
              && grep -q '\["Create & Learn"' "${html}" \
              && grep -q '\["Services"' "${html}" \
              && grep -q '\["Company"' "${html}" \
              && grep -q '\["Support"' "${html}"; then
              echo "Success: Canonical navigation payload is embedded in the live storefront."
              exit 0
            fi

            echo "Warning: Canonical navigation payload not yet observable on attempt ${attempt}."
            echo "--- Response headers ---"
            sed -n '1,30p' "${headers}" || true
            echo "--- Navigation deployment markers ---"
            grep -Ein -m 40 'MMG_CANONICAL_NAVIGATION|mmg-canonical-navigation|data-mmg-menu|const BUILD=|const NAV=|Shopify.theme' "${html}" || echo "[No canonical navigation markers found]"

            sleep 5
          done

          echo "Error: Canonical navigation payload was not embedded in the public storefront." >&2
          exit 1
