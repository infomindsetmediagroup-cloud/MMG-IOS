name: Verify Command Center Browser

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-command-center-browser.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v45.js"
      - "web/kairos-dashboard/**"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-command-center-browser
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - name: Install Chromium browser harness
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Prove live app initializes in Chromium
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true });
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];
            page.on('console', msg => { if (msg.type() === 'error') consoleErrors.push(msg.text()); });
            page.on('pageerror', err => pageErrors.push(String(err && err.stack || err)));
            page.on('requestfailed', req => failedRequests.push({ url: req.url(), error: req.failure()?.errorText || 'failed' }));
            const url = `${process.env.APP_URL}?browser-verification=${Date.now()}`;
            const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForTimeout(12000);
            const result = await page.evaluate(() => {
              const hub = document.querySelector('#kairos-hub');
              const loading = hub?.textContent?.includes('Loading Kairos Command Center') || false;
              const website = document.querySelector('[data-action-id="website"], [data-action="website"], .website-stage-row, .job, .parent-grid');
              const bodyStyle = getComputedStyle(document.body);
              const headerImage = document.querySelector('.app-header-image');
              const headerStyle = headerImage ? getComputedStyle(headerImage) : null;
              return {
                title: document.title,
                hubPresent: Boolean(hub),
                loading,
                renderedWorkspace: Boolean(website),
                bodyFont: bodyStyle.fontFamily,
                bodyBackground: bodyStyle.backgroundColor,
                headerWidth: headerImage?.getBoundingClientRect().width || 0,
                headerMaxWidth: headerStyle?.maxWidth || null,
                text: (hub?.innerText || '').slice(0, 1000),
              };
            });
            const receipt = {
              httpStatus: response?.status() || 0,
              result,
              consoleErrors,
              pageErrors,
              failedRequests: failedRequests.slice(0, 30),
            };
            console.log(`KAIROS_BROWSER_RECEIPT=${JSON.stringify(receipt)}`);
            await page.screenshot({ path: 'command-center-browser.png', fullPage: true });
            await browser.close();
            const initialized = response && response.ok() && result.hubPresent && !result.loading && result.renderedWorkspace;
            const styled = !/Times New Roman|serif/i.test(result.bodyFont || '') && result.headerWidth > 0 && result.headerWidth < 600;
            const clean = pageErrors.length === 0;
            if (!initialized || !styled || !clean) process.exit(1);
          })().catch(error => { console.error(error); process.exit(1); });
          NODE

      - name: Upload browser screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-browser-proof
          path: command-center-browser.png
          if-no-files-found: ignore

      - name: Publish browser verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Command Center initializes and renders in Chromium"
          else
            state="failure"
            description="Command Center browser initialization failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-command-center-browser",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
