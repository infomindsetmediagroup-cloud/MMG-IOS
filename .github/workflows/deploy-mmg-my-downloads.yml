name: Deploy MMG My Downloads

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "shopify/apps/mmg-customer-account/**"
      - ".github/workflows/deploy-mmg-my-downloads.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - "shopify/apps/mmg-customer-account/**"
      - ".github/workflows/deploy-mmg-my-downloads.yml"

permissions:
  contents: read

concurrency:
  group: deploy-mmg-my-downloads-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy customer-account extension
    if: github.event_name != 'pull_request' || github.head_ref == 'codex/my-downloads-deploy-check'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHOPIFY_APP_AUTOMATION_TOKEN: ${{ secrets.MMG_SHOPIFY_APP_AUTOMATION_TOKEN || secrets.SHOPIFY_APP_AUTOMATION_TOKEN }}
      SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Verify deployment credential
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SHOPIFY_APP_AUTOMATION_TOKEN:-}" ] && [ -z "${SHOPIFY_CLI_PARTNERS_TOKEN:-}" ]; then
            echo "Missing Shopify deployment credential."
            echo "Expected one repository secret: MMG_SHOPIFY_APP_AUTOMATION_TOKEN, SHOPIFY_APP_AUTOMATION_TOKEN, or SHOPIFY_CLI_PARTNERS_TOKEN."
            exit 78
          fi
          if [ -n "${SHOPIFY_APP_AUTOMATION_TOKEN:-}" ]; then
            echo "Using app-scoped Shopify automation token."
          else
            echo "Using existing legacy Shopify CLI Partner token."
          fi

      - name: Download exact repository revision
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 90 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${SOURCE_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository

      - name: Install app dependencies
        shell: bash
        working-directory: repository/shopify/apps/mmg-customer-account
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund --silent

      - name: Validate Shopify configuration
        shell: bash
        working-directory: repository/shopify/apps/mmg-customer-account
        run: |
          set -o pipefail
          npx shopify app config validate --config production 2>&1 | tee /tmp/shopify-config-validation.log

      - name: Deploy and release My Downloads
        shell: bash
        working-directory: repository/shopify/apps/mmg-customer-account
        env:
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ env.SOURCE_SHA }}
        run: |
          set +e
          npx shopify app deploy \
            --config production \
            --allow-updates \
            --source-control-url "${COMMIT_URL}" \
            > /tmp/shopify-deploy.log 2>&1
          status=$?
          tail -n 80 /tmp/shopify-deploy.log
          exit $status

      - name: Run governed validation and entitlement tests
        shell: bash
        working-directory: repository/shopify/apps/mmg-customer-account
        run: |
          set -euo pipefail
          npm run check
