name: Diagnose Homepage Planner

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-homepage-planner.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Capture live planner transaction
        shell: bash
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set +e
          objective='Prepare the canonical Mindset Media Group homepage retool on Kairos Staging using the approved three-file package. Do not publish the live theme.'
          payload="$(OBJECTIVE="${objective}" node -e 'process.stdout.write(JSON.stringify({objective:process.env.OBJECTIVE}))')"
          curl --show-error --silent --location --max-time 60 \
            -D submission-headers.txt -o submission.json -w '%{http_code}' \
            -H 'Content-Type: application/json' -H 'Cache-Control: no-cache' \
            --data "${payload}" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs?diagnostic=${GITHUB_SHA}" > submission-status.txt
          cat submission-status.txt
          cat submission.json
          poll_url="$(node -e 'const fs=require("fs");try{const b=JSON.parse(fs.readFileSync("submission.json","utf8")||"{}");process.stdout.write(b.pollURL||"")}catch{}')"
          if [ -n "${poll_url}" ]; then
            for attempt in $(seq 1 12); do
              curl --show-error --silent --location --max-time 30 \
                -D job-headers.txt -o job.json -w '%{http_code}' \
                -H 'Cache-Control: no-cache' \
                "${KAIROS_PRODUCTION_URL}${poll_url}?diagnostic=${GITHUB_SHA}-${attempt}" > job-status.txt
              cat job-status.txt
              cat job.json
              status="$(node -e 'const fs=require("fs");try{const b=JSON.parse(fs.readFileSync("job.json","utf8")||"{}");process.stdout.write(String(b.status||""))}catch{}')"
              case "${status}" in completed|failed|needs-attention|cancelled|not-found) break;; esac
              sleep 2
            done
          fi
          exit 0

      - name: Upload planner diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-planner-diagnostics
          path: |
            submission-status.txt
            submission-headers.txt
            submission.json
            job-status.txt
            job-headers.txt
            job.json
          if-no-files-found: warn
          retention-days: 3
