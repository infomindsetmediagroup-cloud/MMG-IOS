name: Deploy Cloudflare Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev

    steps:
      - name: Download repository archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location --retry 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Resolve Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error::Cloudflare API token is unavailable."; exit 1; }
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --show-error --silent --retry 2 -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e 'const p=JSON.parse(process.env.ACCOUNTS_JSON||"{}");const a=Array.isArray(p.result)?p.result:[];if(!p.success||a.length!==1)process.exit(1);process.stdout.write(a[0].id||"")')"
            test -n "${account_id}"
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Install dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate production source
        working-directory: repository/cloudflare/mmg-ios
        run: |
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify live application
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            health="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}")" || true
            html="$(curl --fail --show-error --silent --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/?deployment=${nonce}")" || true
            if HEALTH="${health}" HTML="${html}" node <<'NODE'
          let health={};try{health=JSON.parse(process.env.HEALTH||'{}')}catch{}
          const html=process.env.HTML||'';
          const ok=["ready","ok","operational"].includes(String(health.status||'').toLowerCase())
            && html.includes('kairos-command-center-routed-20260715-3')
            && html.includes('scripts/job-transport.js?v=20260715-1')
            && html.includes('scripts/command-hub.js?v=routed-20260715-3');
          if(!ok)process.exit(1);
          NODE
            then
              exit 0
            fi
            sleep 5
          done
          echo "::error::Live Kairos application did not reach the expected build."
          exit 1

      - name: Verify canonical homepage planning transaction
        shell: bash
        run: |
          set -euo pipefail
          objective='Prepare the canonical Mindset Media Group homepage retool on Kairos Staging using the approved three-file package. Do not publish the live theme.'
          payload="$(OBJECTIVE="${objective}" node -e 'process.stdout.write(JSON.stringify({objective:process.env.OBJECTIVE}))')"
          submission_code="$(curl --show-error --silent --location --max-time 60 -o submission.json -w '%{http_code}' -H 'Content-Type: application/json' -H 'Cache-Control: no-cache' --data "${payload}" "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs?deployment=${GITHUB_SHA}")"
          cat submission.json
          echo
          [[ "${submission_code}" =~ ^2 ]] || exit 1

          if node -e 'const b=require("./submission.json");process.exit(b.result?0:1)'; then
            cp submission.json plan-envelope.json
          else
            poll_url="$(node -e 'const b=require("./submission.json");if(!b.jobID||!b.pollURL)process.exit(1);process.stdout.write(b.pollURL)')"
            for attempt in $(seq 1 30); do
              code="$(curl --show-error --silent --location --max-time 30 -o plan-envelope.json -w '%{http_code}' -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}${poll_url}?deployment=${GITHUB_SHA}-${attempt}")"
              [[ "${code}" =~ ^2 ]] || exit 1
              status="$(node -e 'const b=require("./plan-envelope.json");process.stdout.write(String(b.status||""))')"
              [ "${status}" = "completed" ] && break
              case "${status}" in failed|needs-attention|cancelled) exit 1;; esac
              sleep 2
            done
          fi

          node <<'NODE'
          const envelope=require('./plan-envelope.json');
          const result=envelope.result||{};
          const plan=result.plan||{};
          const names=(plan.canonicalPackage?.files||[]).map(x=>x.filename).sort();
          const required=['assets/mmg-canonical-homepage.css','sections/mmg-canonical-homepage.liquid','templates/index.json'].sort();
          const checks={
            completed:envelope.status==='completed',
            readyForApproval:result.status==='ready-for-approval',
            canonicalMode:plan.installationMode==='kairos-canonical-homepage-v1',
            threeFiles:JSON.stringify(names)===JSON.stringify(required),
            stagingOnly:String(plan.targetTheme?.role||'').toUpperCase()!=='MAIN',
            liveProtected:String(plan.publishedTheme?.role||'').toUpperCase()==='MAIN',
            noLiveMutation:plan.liveThemeMutationAuthorized===false&&plan.productionPublishAuthorized===false,
            rollbackReady:Array.isArray(plan.rollbackPlan)&&plan.rollbackPlan.length>=3
          };
          console.log(JSON.stringify({build:envelope.build,installationMode:plan.installationMode,files:names,checks},null,2));
          if(Object.values(checks).some(v=>v!==true))process.exit(1);
          NODE

      - name: Upload transaction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-homepage-plan-transaction
          path: |
            submission.json
            plan-envelope.json
          if-no-files-found: warn
          retention-days: 3

      - name: Publish deployment status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then state=success; description='Kairos production and canonical planning verified'; else state=failure; description='Kairos production verification failed'; fi
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(STATE="${state}" DESCRIPTION="${description}" TARGET_URL="${target_url}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-cloudflare-production",target_url:process.env.TARGET_URL}))')"
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
