name: Deploy Cloudflare Production

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Clone repository with native Git
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repository

      - name: Verify deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Missing GitHub Actions credential. Add CLOUDFLARE_API_TOKEN as a repository or organization Actions secret."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing GitHub Actions credential. Add CLOUDFLARE_ACCOUNT_ID as a repository or organization Actions secret or variable."
            exit 1
          fi
          echo "Cloudflare deployment credentials are available."

      - name: Verify runtime
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Validate canonical Cloudflare Worker bundle
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy canonical Cloudflare Worker
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy
