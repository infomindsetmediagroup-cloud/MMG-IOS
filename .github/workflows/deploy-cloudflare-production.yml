name: Deploy Cloudflare Production

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Download repository archive and run complete validation suite
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location --connect-timeout 15 --max-time 60 --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml
          node repository/cloudflare/mmg-ios/scripts/validate-production-suite.mjs

      - name: Resolve Cloudflare deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error::Cloudflare API token is unavailable."; exit 1; }
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --show-error --silent --connect-timeout 15 --max-time 30 --retry 2 -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e 'const p=JSON.parse(process.env.ACCOUNTS_JSON||"{}");const a=Array.isArray(p.result)?p.result:[];if(!p.success||a.length!==1)process.exit(1);process.stdout.write(a[0].id||"")')"
            test -n "${account_id}" || { echo "::error::Cloudflare account ID could not be resolved."; exit 1; }
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Verify runtime tools
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate reconciled production baseline
        working-directory: repository/cloudflare/mmg-ios
        run: node scripts/validate-frozen-production-standard.mjs

      - name: Validate canonical Cloudflare Worker bundle
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy canonical Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify deployed production baseline
        shell: bash
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            if health_json="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}")" \
              && command_center="$(curl --fail --show-error --silent --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/?deployment=${nonce}")" \
              && command_hub="$(curl --fail --show-error --silent --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/command-hub.js?v=routed-20260715-2&deployment=${nonce}")" \
              && layout="$(curl --fail --show-error --silent --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/command-center-layout.js?v=routed-20260715-2&deployment=${nonce}")" \
              && analytics="$(curl --fail --show-error --silent --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/shopify-analytics-summary.js?v=routed-20260715-2&deployment=${nonce}")"; then
              if HEALTH_JSON="${health_json}" COMMAND_CENTER="${command_center}" COMMAND_HUB="${command_hub}" LAYOUT="${layout}" ANALYTICS="${analytics}" node <<'NODE'
          const health=JSON.parse(process.env.HEALTH_JSON||"{}");
          const html=process.env.COMMAND_CENTER||"";
          const hub=process.env.COMMAND_HUB||"";
          const layout=process.env.LAYOUT||"";
          const analytics=process.env.ANALYTICS||"";
          const checks={
            healthy:["ready","ok","operational"].includes(String(health.status||"").toLowerCase()),
            routedBuild:html.includes("kairos-command-center-routed-20260715-2"),
            oneCommandHub:(html.match(/scripts\/command-hub\.js/g)||[]).length===1,
            oneLayout:(html.match(/scripts\/command-center-layout\.js/g)||[]).length===1,
            oneAnalytics:(html.match(/scripts\/shopify-analytics-summary\.js/g)||[]).length===1,
            threeModules:(html.match(/<script type="module"/g)||[]).length===3,
            visibleIcons:["knowledge","content","business","customers","operations"].every(id=>html.includes(`data-route-center=${id}`)),
            iconGlyphs:["🧠","🎬","💼","👥","⚙️"].every(icon=>html.includes(icon)),
            noLegacyControllers:!["readiness-registry.js","command-center-governance.js","executive-simple-mode.js","loadNext("].some(x=>html.includes(x)),
            staticViewport:html.includes("scroll-behavior:auto!important")&&html.includes("overflow-anchor:none!important"),
            routedHub:hub.includes("kairos-command-hub-routed-20260715-1")&&hub.includes('id="command-view"')&&hub.includes("history.pushState")&&(hub.match(/root\.innerHTML/g)||[]).length===1,
            noHubMotion:!["setInterval(","scrollIntoView","scrollTo(","scrollBy(","MutationObserver"].some(x=>hub.includes(x)),
            statusStrip:layout.includes("kairos-command-center-layout-routed-20260715-1")&&layout.includes("In Progress")&&layout.includes("Done 24h")&&layout.includes("Pending"),
            noLayoutMotion:!["MutationObserver","requestAnimationFrame","scrollIntoView"].some(x=>layout.includes(x)),
            containedAnalytics:analytics.includes("kairos-shopify-analytics-summary-20260715-1")&&analytics.includes("/api/analytics/shopify?range=")&&analytics.includes('insertAdjacentElement("afterend",section)'),
            noAnalyticsMotion:!["setInterval(","MutationObserver","scrollIntoView"].some(x=>analytics.includes(x)),
            completeCenters:["knowledge","content","business","customers","operations"].every(id=>hub.includes(`id:"${id}"`)),
            completeCards:hub.includes('data-readiness="100"')&&hub.includes('<span>100%</span>')
          };
          console.log(JSON.stringify({healthStatus:health.status,htmlBytes:Buffer.byteLength(html),hubBytes:Buffer.byteLength(hub),layoutBytes:Buffer.byteLength(layout),analyticsBytes:Buffer.byteLength(analytics),checks},null,2));
          if(Object.values(checks).some(value=>value!==true))process.exit(1);
          NODE
              then
                echo "Kairos routed command center verified on attempt ${attempt}."
                exit 0
              fi
            fi
            echo "Kairos routed command center not ready yet (attempt ${attempt}/18)."
            sleep 5
          done
          echo "::error::Kairos production did not pass the routed command center contract."
          exit 1

      - name: Publish Kairos deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_JOB_STATUS}" = "success" ]; then state="success"; description="Kairos routed command center verified"; else state="failure"; description="Kairos routed command center failed verification"; fi
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(STATE="${state}" DESCRIPTION="${description}" TARGET_URL="${target_url}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-cloudflare-production",target_url:process.env.TARGET_URL}))')"
          curl --fail --show-error --silent -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" -H "Content-Type: application/json" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data "${payload}"
