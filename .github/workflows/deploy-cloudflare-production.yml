name: Deploy Cloudflare Production

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker and publish homepage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 90 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Worker dependencies
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Validate and deploy Worker
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          npx wrangler deploy --dry-run
          npx wrangler deploy

      - name: Wait for deployed Worker
        shell: bash
        env:
          KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --max-time 20 \
              "${KAIROS_URL}/api/health?release=${GITHUB_SHA}" \
              --output /tmp/kairos-health.json; then
              echo "Kairos Worker is reachable on attempt ${attempt}."
              exit 0
            fi
            sleep 5
          done
          echo "Kairos Worker did not become reachable."
          exit 1

      - name: Install verified homepage in staging
        shell: bash
        env:
          KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 150 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_URL}/api/shopify/staging/canonical-homepage/build" \
            --data '{"confirmation":"BUILD_CANONICAL_MMG_HOMEPAGE_STAGING","mode":"build"}' \
            --output /tmp/homepage-staging.json
          node -e '
            const body = require("/tmp/homepage-staging.json");
            if (body.status !== "completed" || body.verification?.exactReadBack !== true) {
              console.error(JSON.stringify(body));
              process.exit(1);
            }
          '

      - name: Publish verified homepage to Shopify MAIN
        shell: bash
        env:
          KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 180 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_URL}/api/shopify/staging/canonical-homepage/build" \
            --data '{"confirmation":"PUBLISH_CANONICAL_MMG_HOMEPAGE_LIVE","mode":"publish"}' \
            --output /tmp/homepage-live.json
          node -e '
            const body = require("/tmp/homepage-live.json");
            if (
              body.status !== "completed" ||
              body.mode !== "publish" ||
              body.production?.publishedThemeChanged !== true ||
              body.verification?.publishedThemeReadBackVerified !== true
            ) {
              console.error(JSON.stringify(body));
              process.exit(1);
            }
            console.log(JSON.stringify({
              status: body.status,
              liveURL: body.production.url,
              themeChanged: body.production.publishedThemeChanged,
              build: body.build
            }, null, 2));
          '

      - name: Verify live homepage marker
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            page="$(curl --fail --silent --show-error --location --max-time 30 "https://themindsetmediagroup.com/?release=${GITHUB_SHA}")"
            if printf '%s' "${page}" | grep -q 'kairos-canonical-homepage-builder-20260718-1'; then
              echo "Live canonical homepage verified."
              exit 0
            fi
            sleep 5
          done
          echo "Live homepage marker was not found."
          exit 1
