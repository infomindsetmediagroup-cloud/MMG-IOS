name: Deploy Cloudflare Production
# Cloudflare account auto-resolution trigger: 2026-07-12

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Download repository archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml
          echo "Repository archive prepared for ${GITHUB_SHA}."

      - name: Resolve Cloudflare deployment credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Cloudflare API token is unavailable to the production environment."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare account ID is not stored in GitHub; resolving it from the deployment token."

            accounts_json="$(curl --fail --show-error --silent \
              --connect-timeout 15 \
              --max-time 30 \
              --retry 2 \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=50")"

            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e '
              const payload = JSON.parse(process.env.ACCOUNTS_JSON || "{}");
              if (!payload.success) process.exit(2);
              const accounts = Array.isArray(payload.result) ? payload.result : [];
              if (accounts.length !== 1) process.exit(3);
              process.stdout.write(accounts[0].id || "");
            ')" || status=$?

            status="${status:-0}"
            if [ "${status}" -eq 2 ]; then
              echo "::error::Cloudflare rejected the deployment token while resolving the account."
              exit 1
            fi
            if [ "${status}" -eq 3 ]; then
              echo "::error::The token can access zero or multiple Cloudflare accounts. Add CLOUDFLARE_ACCOUNT_ID explicitly in GitHub."
              exit 1
            fi
            if [ -z "${account_id:-}" ]; then
              echo "::error::Cloudflare returned no usable account ID."
              exit 1
            fi

            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
            export CLOUDFLARE_ACCOUNT_ID="${account_id}"
          fi

          echo "Cloudflare production credentials are available."

      - name: Verify runtime
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Test native creation pipeline
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npm test

      - name: Validate canonical Cloudflare Worker bundle
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy canonical Cloudflare Worker
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify deployed native creation runtime
        shell: bash
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            if health_json="$(curl --fail --show-error --silent --max-time 30 "${KAIROS_PRODUCTION_URL}/api/health?deployment=${GITHUB_SHA}")" \
              && capabilities_json="$(curl --fail --show-error --silent --max-time 30 "${KAIROS_PRODUCTION_URL}/api/content/capabilities?deployment=${GITHUB_SHA}")" \
              && creation_script="$(curl --fail --show-error --silent --max-time 30 "${KAIROS_PRODUCTION_URL}/scripts/creation-engine.js?deployment=${GITHUB_SHA}")"; then
              if HEALTH_JSON="${health_json}" CAPABILITIES_JSON="${capabilities_json}" CREATION_SCRIPT="${creation_script}" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH_JSON || "{}");
          const capabilities = JSON.parse(process.env.CAPABILITIES_JSON || "{}");
          const script = process.env.CREATION_SCRIPT || "";
          const valid =
            health.launchMode === "native-generative-production" &&
            health.openaiAPIUsed === false &&
            health.nativeIntelligence?.externalInferenceAPI === false &&
            health.nativeIntelligence?.projectStorage === "durable-object" &&
            health.capabilities?.bookDevelopment === "operational" &&
            health.capabilities?.productAssetCopy === "operational" &&
            capabilities.status === "ready" &&
            capabilities.productionActions?.fullManuscript === "operational" &&
            capabilities.productionActions?.kdpManufacturing === "operational" &&
            capabilities.productionActions?.productPage === "operational" &&
            script.includes("Build Complete Package");
          if (!valid) process.exit(1);
          console.log(JSON.stringify({
            build: health.build,
            launchMode: health.launchMode,
            intelligenceRuntime: health.intelligenceRuntime?.provider,
            projectStorage: health.nativeIntelligence?.projectStorage,
            creationPipeline: capabilities.version,
          }, null, 2));
          NODE
              then
                echo "Kairos native creation deployment verified on attempt ${attempt}."
                exit 0
              fi
            fi
            echo "Kairos production has not exposed the new native creation build yet (attempt ${attempt}/18)."
            sleep 5
          done
          echo "::error::Kairos production did not pass the native creation health contract."
          exit 1

      - name: Publish Kairos deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos native creation deployment verified"
          else
            state="failure"
            description="Kairos native creation deployment failed verification"
          fi
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(STATE="${state}" DESCRIPTION="${description}" TARGET_URL="${target_url}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-cloudflare-production",
              target_url: process.env.TARGET_URL,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
