name: Deploy Cloudflare Production

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  pull_request:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloudflare/mmg-ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Validate canonical Cloudflare Worker bundle
        run: npx wrangler deploy --dry-run

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloudflare/mmg-ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Deploy canonical Cloudflare Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
