name: Deploy Cloudflare Production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-hybrid-dry-build-diagnostic
  cancel-in-progress: true

jobs:
  diagnose-hybrid:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out hybrid integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/tuesday-shell-friday-functionality-20260717

      - name: Run validators and Wrangler dry build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          hybrid_sha="$(git rev-parse HEAD)"
          cd cloudflare/mmg-ios

          npm install --no-package-lock --no-audit --no-fund 2>&1 | tee /tmp/kairos-hybrid-build.log
          status=${PIPESTATUS[0]}

          if [ "${status}" -eq 0 ]; then
            npm run validate:loading 2>&1 | tee -a /tmp/kairos-hybrid-build.log
            status=${PIPESTATUS[0]}
          fi

          if [ "${status}" -eq 0 ]; then
            npm run validate:production 2>&1 | tee -a /tmp/kairos-hybrid-build.log
            status=${PIPESTATUS[0]}
          fi

          if [ "${status}" -eq 0 ]; then
            npx wrangler deploy --dry-run --outdir /tmp/kairos-hybrid-dry-run 2>&1 | tee -a /tmp/kairos-hybrid-build.log
            status=${PIPESTATUS[0]}
          fi

          if [ "${status}" -eq 0 ]; then
            find /tmp/kairos-hybrid-dry-run -maxdepth 2 -type f -printf '%p %s bytes\n' | sort | tee -a /tmp/kairos-hybrid-build.log
            state="success"
            description="Hybrid validators and Wrangler dry build passed"
          else
            state="failure"
            description="Hybrid dry build failed; inspect exact workflow logs"
          fi

          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(STATE="${state}" DESCRIPTION="${description}" TARGET_URL="${target_url}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-hybrid-build-diagnostic",target_url:process.env.TARGET_URL}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${hybrid_sha}" \
            --data "${payload}"

          exit "${status}"
