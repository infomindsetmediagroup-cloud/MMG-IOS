name: Deploy Cloudflare Production

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - "docs/KAIROS_ENTERPRISE_WEBSITE_BUILD_INSTRUCTIONS.md"
      - "docs/CANONICAL_COMMAND_WIRING_20260717.md"
      - ".github/workflows/deploy-cloudflare-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev

    steps:
      - name: Check out production source
        uses: actions/checkout@v4

      - name: Resolve Cloudflare account
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e '
              const payload=JSON.parse(process.env.ACCOUNTS_JSON||"{}");
              const accounts=Array.isArray(payload.result)?payload.result:[];
              if(!payload.success||accounts.length!==1) process.exit(1);
              process.stdout.write(accounts[0].id||"");
            ')"
            test -n "${account_id}"
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Install dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Enforce resilient loading contract
        working-directory: cloudflare/mmg-ios
        run: npm run validate:loading

      - name: Validate canonical instruction wiring
        working-directory: cloudflare/mmg-ios
        run: npm run validate:production

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy Worker
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Prove app opens after deployment
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            if root_html="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/?proof=${nonce}")" \
              && renderer_js="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/command-hub-canonical-v3.js?proof=${nonce}")" \
              && action_js="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/canonical-action-executor-v1.js?proof=${nonce}")" \
              && website_js="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/scripts/canonical-website-workspace-v1.js?proof=${nonce}")" \
              && contracts_json="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/api/hub/contracts?proof=${nonce}")" \
              && health_json="$(curl --fail --silent --show-error --location --max-time 30 -H 'Cache-Control: no-cache' "${KAIROS_PRODUCTION_URL}/api/health?proof=${nonce}")" \
              && ROOT_HTML="${root_html}" RENDERER_JS="${renderer_js}" ACTION_JS="${action_js}" WEBSITE_JS="${website_js}" CONTRACTS_JSON="${contracts_json}" HEALTH_JSON="${health_json}" node <<'NODE'
          const root=process.env.ROOT_HTML||"";
          const renderer=process.env.RENDERER_JS||"";
          const action=process.env.ACTION_JS||"";
          const website=process.env.WEBSITE_JS||"";
          const contracts=JSON.parse(process.env.CONTRACTS_JSON||"{}");
          const health=JSON.parse(process.env.HEALTH_JSON||"{}");
          const entries=contracts.actions&&typeof contracts.actions==="object"?Object.entries(contracts.actions):[];
          const rootMarker=root.includes('kairos-command-hub-recovery-20260714-1');
          const mount=root.includes('id="kairos-hub"');
          const canonicalRenderer=root.includes('./scripts/command-hub-canonical-v3.js?v=20260717-2');
          const obsoleteRenderer=!root.includes('command-hub-stable-v2.js')&&!root.includes('command-hub.js?v=recovery');
          const rendererBuild=renderer.includes('kairos-command-hub-canonical-v3-20260717-2');
          const embeddedRegistry=renderer.includes('const fallback=');
          const noStaticOptionalImport=!/^\s*import\s/m.test(renderer);
          const builtInExecutor=action.includes('postJSON("/api/hub/execute"')&&action.includes('canonicalInstructionsRequired:true');
          const websiteInstructions=website.includes('kairos-enterprise-website-build-instructions@2026.07.15-v1')
            && website.includes('requestType:"full-retool"')
            && website.includes('structuralMutationAuthorized:true')
            && website.includes('styleMutationAuthorized:true')
            && website.includes('visualMutationAuthorized:true')
            && website.includes('liveThemeMutationAuthorized:false');
          const currentContracts=entries.length===25;
          const contractsBound=entries.every(([,value])=>value&&value.moduleRequiredForExecution===false&&value.instructionSet);
          const wiring=health.canonicalInstructionWiring||{};
          const healthy=["ready","ok","operational"].includes(String(health.status||"").toLowerCase());
          const wiringReady=wiring.status==="operational"&&wiring.optionalWorkspaceModulesRequired===false;
          const passed=rootMarker&&mount&&canonicalRenderer&&obsoleteRenderer&&rendererBuild&&embeddedRegistry&&noStaticOptionalImport&&builtInExecutor&&websiteInstructions&&currentContracts&&contractsBound&&healthy&&wiringReady;
          console.log(JSON.stringify({rootMarker,mount,canonicalRenderer,obsoleteRenderer,rendererBuild,embeddedRegistry,noStaticOptionalImport,builtInExecutor,websiteInstructions,contractCount:entries.length,contractsBound,health:health.status,wiringReady},null,2));
          process.exit(passed?0:1);
          NODE
            then
              echo "Kairos canonical instruction wiring, resilient shell, 25 child executors, and live health verified."
              exit 0
            fi
            sleep 5
          done
          echo "::error::Kairos did not satisfy the canonical instruction-bound production contract after deployment."
          exit 1

      - name: Publish deployment receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos canonical instructions and child executors verified live"
          else
            state="failure"
            description="Kairos canonical wiring or production validation failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-cloudflare-production",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
