name: Verify Command Center Route

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-command-center-route.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v45.js"
      - "web/kairos-dashboard/**"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-command-center-route
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
      CSS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/styles/command-hub.css
      JS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/scripts/command-center-safe.js
    steps:
      - name: Verify safe shell and static assets
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f shell-headers.txt css-headers.txt js-headers.txt dashboard.html command-hub.css command-center-safe.js

            shell_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D shell-headers.txt \
              "${APP_URL}?route-verification=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            css_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D css-headers.txt \
              "${CSS_URL}?route-verification=${nonce}" \
              --output command-hub.css \
              --write-out '%{http_code}' || true)"
            js_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D js-headers.txt \
              "${JS_URL}?route-verification=${nonce}" \
              --output command-center-safe.js \
              --write-out '%{http_code}' || true)"

            shell_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' shell-headers.txt | tail -1)"
            css_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' css-headers.txt | tail -1)"
            js_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' js-headers.txt | tail -1)"
            css_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' css-headers.txt | tail -1)"
            js_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' js-headers.txt | tail -1)"

            if [ "${shell_code}" = "200" ] \
              && [ "${css_code}" = "200" ] \
              && [ "${js_code}" = "200" ] \
              && [ "${shell_route}" = "direct-assets-root-shell" ] \
              && [ "${css_route}" = "direct-assets-static" ] \
              && [ "${js_route}" = "direct-assets-static" ] \
              && [[ "${css_type}" == text/css* ]] \
              && [[ "${js_type}" == *javascript* ]] \
              && grep -q 'id="kairos-hub"' dashboard.html \
              && grep -q '/scripts/command-center-safe.js' dashboard.html \
              && grep -q '\.hub-shell' command-hub.css \
              && grep -q 'kairos-command-center-safe-20260717-1' command-center-safe.js \
              && grep -q 'root.dataset.safeBoot' command-center-safe.js \
              && ! grep -qi '<html' command-hub.css \
              && ! grep -qi '<html' command-center-safe.js; then
              echo "Dependency-free Command Center shell and assets are healthy."
              break
            fi

            if [ "${attempt}" = "36" ]; then
              echo "Dependency-free Command Center shell or assets did not become healthy." >&2
              printf 'shell=%s css=%s js=%s shell_route=%s css_route=%s js_route=%s css_type=%s js_type=%s\n' \
                "${shell_code:-}" "${css_code:-}" "${js_code:-}" "${shell_route:-}" "${css_route:-}" "${js_route:-}" "${css_type:-}" "${js_type:-}" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Execute live app in headless Chrome
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "${CHROME}" ]; then
            echo "No headless Chrome binary is available on the runner." >&2
            exit 1
          fi

          nonce="${GITHUB_SHA}-$(date +%s)"
          rm -f rendered.html chrome-errors.log
          timeout 75s "${CHROME}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-networking \
            --window-size=390,844 \
            --virtual-time-budget=15000 \
            --dump-dom \
            "${APP_URL}?chrome-verification=${nonce}" \
            > rendered.html 2> chrome-errors.log || true

          echo "KAIROS_CHROME_BINARY=${CHROME}"
          echo "KAIROS_RENDERED_BYTES=$(wc -c < rendered.html | tr -d ' ')"

          test -s rendered.html || { echo "Headless Chrome returned no rendered DOM." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          ! grep -q 'Loading Kairos Command Center' rendered.html || { echo "The live app remained stuck on the loading screen." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          grep -q 'data-kairos-boot="ready"' rendered.html || { echo "The safe shell did not report ready." >&2; exit 1; }
          grep -q 'data-safe-boot="kairos-command-center-safe-20260717-1"' rendered.html || { echo "The dependency-free shell identity was not rendered." >&2; exit 1; }
          grep -q 'id="command-view"' rendered.html || { echo "The Command Center view did not initialize." >&2; exit 1; }
          grep -q 'Website Retool' rendered.html || { echo "The Website Retool workspace did not render." >&2; exit 1; }
          grep -q 'Website objective' rendered.html || { echo "The Website objective form did not render." >&2; exit 1; }
          grep -q 'Inspect &amp; Prepare Proposal' rendered.html || { echo "The Website proposal action did not render." >&2; exit 1; }

          echo "Dependency-free Command Center initialized and rendered Website Retool in headless Chrome."

      - name: Upload rendered browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-headless-chrome-proof
          path: |
            rendered.html
            chrome-errors.log
          if-no-files-found: ignore

      - name: Publish browser verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Dependency-free Command Center rendered in Chrome"
          else
            state="failure"
            description="Command Center browser initialization failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-command-center-route",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
