name: Verify Command Center Route

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-command-center-route.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v45.js"
      - "web/kairos-dashboard/**"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-command-center-route
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - name: Verify exact self-contained app shell
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f headers.txt dashboard.html
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${APP_URL}?route-verification=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' headers.txt | tail -1)"
            if [ "${code}" = "200" ] \
              && [ "${route}" = "direct-assets-root-shell" ] \
              && [[ "${type}" == text/html* ]] \
              && grep -q 'id="kairos-hub"' dashboard.html \
              && grep -q 'kairos-command-center-inline-20260717-1' dashboard.html \
              && grep -q 'Website Retool' dashboard.html \
              && grep -q 'website-objective' dashboard.html; then
              echo "Self-contained Command Center shell is live."
              break
            fi
            if [ "${attempt}" = "36" ]; then
              echo "Self-contained Command Center shell did not become healthy." >&2
              printf 'code=%s route=%s content_type=%s\n' "${code:-}" "${route:-}" "${type:-}" >&2
              head -c 1200 dashboard.html >&2 || true
              exit 1
            fi
            sleep 5
          done

      - name: Execute live app in headless Chrome
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          test -n "${CHROME}" || { echo "No headless Chrome binary is available." >&2; exit 1; }
          nonce="${GITHUB_SHA}-$(date +%s)"
          rm -f rendered.html chrome-errors.log
          timeout 75s "${CHROME}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-networking \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --dump-dom \
            "${APP_URL}?chrome-verification=${nonce}" \
            > rendered.html 2> chrome-errors.log || true

          test -s rendered.html || { echo "Headless Chrome returned no DOM." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          ! grep -q 'Loading Kairos Command Center' rendered.html || { echo "App remained on loading screen." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          grep -q 'data-kairos-boot="ready"' rendered.html || { echo "App did not report ready." >&2; exit 1; }
          grep -q 'data-self-contained-build="kairos-command-center-inline-20260717-1"' rendered.html || { echo "Self-contained build identity missing." >&2; exit 1; }
          grep -q 'id="command-view"' rendered.html || { echo "Command Center view missing." >&2; exit 1; }
          grep -q 'Website Retool' rendered.html || { echo "Website Retool missing." >&2; exit 1; }
          grep -q 'id="website-objective"' rendered.html || { echo "Website objective input missing." >&2; exit 1; }
          grep -q 'data-website-plan' rendered.html || { echo "Website planning control missing." >&2; exit 1; }
          echo "Self-contained Command Center rendered Website Retool in Chrome."

      - name: Upload rendered browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-self-contained-browser-proof
          path: |
            rendered.html
            chrome-errors.log
          if-no-files-found: ignore

      - name: Publish browser verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Self-contained Command Center rendered in Chrome"
          else
            state="failure"
            description="Command Center browser initialization failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-command-center-route",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
