name: Verify Kairos Experience Live

on:
  pull_request:
    branches: [main]
    paths: &experience_paths
      - ".github/workflows/verify-kairos-experience-live.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-manuscript-online-v1.js"
      - "cloudflare/mmg-ios/src/kairos-manuscript-project-setup-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-registry-v1.js"
      - "cloudflare/mmg-ios/scripts/validate-manuscript-production-mode.mjs"
      - "cloudflare/mmg-ios/test/kairos-manuscript-project-setup-*.test.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "web/kairos-dashboard/index.html"
      - "web/kairos-dashboard/scripts/manuscript-project-setup.js"
  push:
    branches: [main]
    paths: *experience_paths
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: verify-kairos-experience-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download repository archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location --connect-timeout 15 --max-time 60 --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Worker dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Validate active manuscript experience contract
        working-directory: repository/cloudflare/mmg-ios
        run: |
          node scripts/validate-manuscript-production-mode.mjs
          node --test test/kairos-manuscript-project-setup-v3.test.js test/kairos-manuscript-project-setup-ui-v2.test.js

      - name: Validate Worker bundle
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

  verify-production-live:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: verify-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Verify deployed manuscript experience and operation boundary
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 24); do
            status_file="$(mktemp)"
            client_file="$(mktemp)"
            probe_headers="$(mktemp)"
            probe_body="$(mktemp)"
            denial_body="$(mktemp)"

            status_code="$(curl --silent --show-error --max-time 30 \
              "${KAIROS_PRODUCTION_URL}/api/kairos/manuscripts/status?proof=${GITHUB_SHA}" \
              -o "${status_file}" -w '%{http_code}' || true)"
            client_code="$(curl --silent --show-error --max-time 30 \
              "${KAIROS_PRODUCTION_URL}/scripts/manuscript-project-setup.js?proof=${GITHUB_SHA}" \
              -o "${client_file}" -w '%{http_code}' || true)"
            probe_code="$(curl --silent --show-error --max-time 30 -D "${probe_headers}" \
              "${KAIROS_PRODUCTION_URL}/api/production-registry/manuscripts/experience-probe-12345678/setup" \
              -o "${probe_body}" -w '%{http_code}' || true)"
            denial_code="$(curl --silent --show-error --max-time 30 \
              -X POST "${KAIROS_PRODUCTION_URL}/api/shopify/page-shell/publish" \
              -H 'Content-Type: application/json' --data '{}' \
              -o "${denial_body}" -w '%{http_code}' || true)"

            if [ "${status_code}" = "200" ] \
              && grep -q '"ready":true' "${status_file}" \
              && grep -q '"mode":"manuscript-only"' "${status_file}" \
              && [ "${client_code}" = "200" ] \
              && grep -q 'kairos-manuscript-project-setup-ui-20260722-2' "${client_file}" \
              && grep -q 'two-phase-resumable' "${client_file}" \
              && [ "${probe_code}" = "404" ] \
              && grep -qi 'X-Kairos-Manuscript-Setup: kairos-manuscript-project-setup-20260722-3' "${probe_headers}" \
              && [ "${denial_code}" = "403" ] \
              && grep -q '"code":"WEBSITE_MUTATION_DENIED"' "${denial_body}"; then
              success=1
              echo "Live manuscript experience verified on attempt ${attempt}."
              rm -f "${status_file}" "${client_file}" "${probe_headers}" "${probe_body}" "${denial_body}"
              break
            fi

            rm -f "${status_file}" "${client_file}" "${probe_headers}" "${probe_body}" "${denial_body}"
            echo "Manuscript experience deployment not ready (attempt ${attempt}/24)."
            sleep 5
          done

          if [ "${success}" -ne 1 ]; then
            echo "::error::Live manuscript experience proof failed after the deployment window."
            exit 1
          fi
