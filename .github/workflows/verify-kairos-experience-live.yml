name: Verify Kairos Experience Live

on:
  pull_request:
    branches:
      - main
    paths: &experience_paths
      - ".github/workflows/verify-kairos-experience-live.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v1.js"
      - "cloudflare/mmg-ios/src/kairos-product-manufacturing-bridge-v1.js"
      - "cloudflare/mmg-ios/src/kairos-website-builder-v2.js"
      - "cloudflare/mmg-ios/src/kairos-website-builder-asset-library-v1.js"
      - "cloudflare/mmg-ios/scripts/validate-kairos-experience-controller.mjs"
      - "cloudflare/mmg-ios/scripts/validate-website-builder-v2.mjs"
      - "cloudflare/mmg-ios/scripts/validate-product-manufacturing-bridge.mjs"
      - "cloudflare/mmg-ios/scripts/validate-production-quiet.mjs"
      - "web/kairos-dashboard/index.html"
      - "web/kairos-dashboard/scripts/complete-product-engine.js"
      - "web/kairos-dashboard/scripts/website-builder-studio.js"
      - "web/kairos-dashboard/styles/website-builder-studio.css"
  push:
    branches:
      - main
    paths: *experience_paths
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: verify-kairos-experience-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download repository archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location --connect-timeout 15 --max-time 60 --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml
      - name: Install Worker dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund
      - name: Validate complete production contract
        working-directory: repository/cloudflare/mmg-ios
        run: npm run validate:production
      - name: Validate Worker bundle
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

  verify-production-live:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/verify-manuscript-large-intake-production'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Verify deployed product manufacturing and manuscript intake
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 24); do
            headers_file="$(mktemp)"
            if builder_status_json="$(curl --fail --show-error --silent --location --max-time 30 -D "${headers_file}" "${KAIROS_PRODUCTION_URL}/api/website-builder/v2/status?proof=${GITHUB_SHA}")" \
              && product_status_json="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/api/product-manufacturing/status?proof=${GITHUB_SHA}")" \
              && manuscript_capabilities_json="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/api/manuscript/capabilities?proof=${GITHUB_SHA}")" \
              && assets_json="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/api/website-builder/assets?proof=${GITHUB_SHA}")" \
              && root_html="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/?proof=${GITHUB_SHA}")" \
              && objective_js="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/scripts/objective-controller-v2.js?proof=${GITHUB_SHA}")" \
              && builder_js="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/scripts/website-builder-studio.js?proof=${GITHUB_SHA}")" \
              && product_js="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/scripts/complete-product-engine.js?proof=${GITHUB_SHA}")" \
              && manuscript_js="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/scripts/manuscript-studio.js?proof=${GITHUB_SHA}")" \
              && builder_css="$(curl --fail --show-error --silent --location --max-time 30 "${KAIROS_PRODUCTION_URL}/styles/website-builder-studio.css?proof=${GITHUB_SHA}")"; then
              production_entry="$(awk 'BEGIN{IGNORECASE=1} /^x-mmg-production-entry:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              website_builder_v2="$(awk 'BEGIN{IGNORECASE=1} /^x-mmg-website-builder-v2:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              product_bridge="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-product-manufacturing:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if BUILDER_STATUS_JSON="${builder_status_json}" PRODUCT_STATUS_JSON="${product_status_json}" MANUSCRIPT_CAPABILITIES_JSON="${manuscript_capabilities_json}" ASSETS_JSON="${assets_json}" ROOT_HTML="${root_html}" OBJECTIVE_JS="${objective_js}" BUILDER_JS="${builder_js}" PRODUCT_JS="${product_js}" MANUSCRIPT_JS="${manuscript_js}" BUILDER_CSS="${builder_css}" PRODUCTION_ENTRY="${production_entry}" WEBSITE_BUILDER_V2="${website_builder_v2}" PRODUCT_BRIDGE="${product_bridge}" node <<'NODE'
          (async () => {
            const builderStatus = JSON.parse(process.env.BUILDER_STATUS_JSON || "{}");
            const productStatus = JSON.parse(process.env.PRODUCT_STATUS_JSON || "{}");
            const manuscriptCapabilities = JSON.parse(process.env.MANUSCRIPT_CAPABILITIES_JSON || "{}");
            const assets = JSON.parse(process.env.ASSETS_JSON || "{}");
            const root = process.env.ROOT_HTML || "";
            const objective = process.env.OBJECTIVE_JS || "";
            const builder = process.env.BUILDER_JS || "";
            const product = process.env.PRODUCT_JS || "";
            const manuscript = process.env.MANUSCRIPT_JS || "";
            const css = process.env.BUILDER_CSS || "";
            const exactFailureSize = "M".repeat(279045);
            const intakeResponse = await fetch(`${process.env.KAIROS_PRODUCTION_URL}/api/manuscript/intake/advance?proof=${process.env.GITHUB_SHA || "live"}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                title: "Live 279045 Character Verification",
                manuscript: exactFailureSize,
                source: { name: "live-verification.txt", format: "txt", checksum: "live-verification", size: exactFailureSize.length },
              }),
            });
            const intake = await intakeResponse.json().catch(() => ({}));
            const checks = {
              productionEntry: process.env.PRODUCTION_ENTRY === "kairos-production-entry-immutable-20260717-11",
              websiteBuilderHeader: process.env.WEBSITE_BUILDER_V2 === "kairos-website-builder-v2-20260717-1",
              productBridgeHeader: process.env.PRODUCT_BRIDGE === "kairos-product-manufacturing-bridge-20260717-1",
              builderOperational: builderStatus.status === "operational",
              productManufacturingOperational: productStatus.status === "operational",
              authoritativeManuscript: productStatus.authoritativeManuscriptIntake === true,
              approvedCoverRequired: productStatus.approvedCoverRequired === true,
              durableSource: productStatus.sourcePreservation === "durable-object-chunked-source-and-extracted-text",
              shopifyHandoff: productStatus.shopifyHandoff === "existing-draft-media-review-publication-controls",
              websitePopulation: productStatus.websitePopulation === "approved-cover-auto-registered-to-builder-asset-library",
              manuscriptCapabilityVersion: manuscriptCapabilities.version === "manuscript-studio-v5-large-intake",
              manuscriptCapabilityLimit: manuscriptCapabilities.maxCharacters === 600000,
              manuscriptCapabilityBuild: manuscriptCapabilities.build === "kairos-manuscript-studio-20260717-5",
              live279045Accepted: intakeResponse.status === 200 && intake.status === "production_intake" && intake.manuscript?.characterCount === 279045,
              liveManuscriptHeader: intakeResponse.headers.get("x-kairos-manuscript-studio") === "kairos-manuscript-studio-20260717-5",
              intelligentComposer: builderStatus.composer === "objective-to-premium-composition-v2",
              assetLibrary: builderStatus.assetLibrary === "durable-object-central-library-v1",
              assetsReadable: assets.status === "completed" && Array.isArray(assets.assets),
              rootLoadsProductBridge: root.includes("product-bridge-20260717-1") && root.includes("complete-product-engine.js"),
              rootLoadsLargeManuscriptBuild: root.includes("manuscript-large-intake-20260717-1") && root.includes("manuscript-studio.js"),
              objectiveExecutes: objective.includes("/api/objectives/execute") && objective.includes("Execute Objective"),
              composerUI: builder.includes("Compose complete website") && builder.includes("/api/website-builder/compose"),
              productSourceUpload: product.includes("sourceDataBase64") && product.includes("Authoritative manuscript"),
              productDraftHandoff: product.includes("Prepare Shopify Draft") && product.includes("/api/shopify/product-publication/prepare"),
              replacementBlocked: product.includes("does not replace the uploaded book"),
              manuscriptBrowserBuild: manuscript.includes('manuscript-studio-20260717-4'),
              manuscriptBrowserLimit: manuscript.includes('MAX_TEXT_CHARS = 600000') && !manuscript.includes('MAX_TEXT_CHARS = 180000'),
              premiumCanvas: css.includes(".kws-composer") && css.includes(".kws-asset-library") && css.includes(".kws-preview__section--full-bleed"),
            };
            console.log(JSON.stringify({ productionEntry: process.env.PRODUCTION_ENTRY, websiteBuilderV2: process.env.WEBSITE_BUILDER_V2, productBridge: process.env.PRODUCT_BRIDGE, manuscriptCapabilities, liveIntake: { status: intakeResponse.status, body: intake }, assetCount: assets.assets?.length, checks }, null, 2));
            if (Object.values(checks).some(value => value !== true)) process.exit(1);
          })().catch(error => { console.error(error); process.exit(1); });
          NODE
              then
                success=1
                rm -f "${headers_file}"
                echo "Live Product Manufacturing Bridge, Website Builder, and 600k Manuscript Studio verified on attempt ${attempt}."
                break
              fi
            fi
            rm -f "${headers_file}"
            echo "Production deployment not ready for large Manuscript Studio intake (attempt ${attempt}/24)."
            sleep 5
          done
          if [ "${success}" -ne 1 ]; then
            echo "::error::Live 600k Manuscript Studio proof failed after the production deployment window."
            exit 1
          fi
