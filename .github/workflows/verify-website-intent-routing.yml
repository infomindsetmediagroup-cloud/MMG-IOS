name: Verify Website Intent Routing

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/src/kairos-production-entry-v39.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "cloudflare/mmg-ios/production-baseline.json"
      - "web/kairos-dashboard/scripts/website-intent-router.js"
      - "web/kairos-dashboard/index.html"
      - ".github/workflows/verify-website-intent-routing.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-website-intent-routing
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Wait for structural routing deployment
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?website-routing=${GITHUB_SHA}-${attempt}-$(date +%s)" \
              --output health.json || true
            curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/center/content/website?website-routing=${GITHUB_SHA}-${attempt}" \
              --output dashboard.html || true
            if node -e '
              const fs=require("fs");
              let health={};try{health=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{}
              const page=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";
              const ok=["ready","ok","operational"].includes(String(health.status||"").toLowerCase())
                &&health.build==="kairos-production-entry-20260716-96"
                &&health.websiteIntentRouting?.status==="operational"
                &&health.websiteIntentRouting?.contract==="structural-objective-overrides-stale-content-only-lock"
                &&health.capabilities?.structuralIntentOverridesContentOnlyLock==="operational"
                &&page.includes("scripts/website-intent-router.js");
              process.exit(ok?0:1);
            '; then
              break
            fi
            if [ "${attempt}" -eq 36 ]; then
              echo "The structural Website Retool routing deployment did not become ready." >&2
              cat health.json >&2 || true
              exit 1
            fi
            sleep 5
          done

      - name: Prove structural objective overrides stale content-only lock
        id: routing_probe
        shell: bash
        run: |
          set -euo pipefail
          objective="Retool the Mindset Media Group homepage into a complete premium cinematic guided customer experience. This is a full structural retool. Build the non-live Shopify staging package and rendered preview. Do not publish the live theme."
          http_code="$(curl --silent --show-error --location --max-time 300 \
            -D routing-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data "$(OBJECTIVE="${objective}" node -e 'process.stdout.write(JSON.stringify({objective:process.env.OBJECTIVE,requestType:"content-only",intent:"content-only",contentOnlyLocked:true,literalOnly:true,fullRetoolConfirmed:false,structuralMutationAuthorized:false,styleMutationAuthorized:false}))')" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output routing-result.json \
            --write-out '%{http_code}' || true)"
          HTTP_CODE="${http_code}" node <<'NODE'
          const fs=require('fs');
          const headers=fs.existsSync('routing-headers.txt')?fs.readFileSync('routing-headers.txt','utf8'):'';
          let body={};try{body=JSON.parse(fs.readFileSync('routing-result.json','utf8'))}catch{}
          const header=name=>{
            const matches=[...headers.matchAll(new RegExp(`^${name}:\\s*(.+)$`,'gim'))];
            return matches.length?matches[matches.length-1][1].trim():'';
          };
          const checks={
            accepted:[200,202].includes(Number(process.env.HTTP_CODE)),
            productionEntry:header('x-kairos-production-entry')==='kairos-production-entry-20260716-96',
            intent:header('x-kairos-website-intent')==='full-retool',
            reason:header('x-kairos-intent-reason')==='structural-objective-overrode-content-only-lock',
            contentLockRetired:header('x-kairos-content-only-lock')==='false',
            structuralRuntime:header('x-kairos-structural-runtime')==='enabled',
            guard:header('x-kairos-website-intent-guard')==='kairos-production-entry-20260716-96',
            durableJob:Boolean(body.jobID||body.id||body.result?.jobID||body.result?.planID||body.plan?.planID),
            notContentOnly:!JSON.stringify(body).includes('content-only change')&&!JSON.stringify(body).includes('no exact unique source phrases'),
          };
          const diagnostic={
            checks,
            httpStatus:Number(process.env.HTTP_CODE),
            responseHeaders:{
              productionEntry:header('x-kairos-production-entry'),
              intent:header('x-kairos-website-intent'),
              reason:header('x-kairos-intent-reason'),
              contentOnlyLock:header('x-kairos-content-only-lock'),
              structuralRuntime:header('x-kairos-structural-runtime'),
              guard:header('x-kairos-website-intent-guard'),
            },
            response:body,
          };
          fs.writeFileSync('routing-diagnostic.json',JSON.stringify(diagnostic,null,2));
          console.log(JSON.stringify(diagnostic,null,2));
          process.exit(Object.values(checks).every(Boolean)?0:1);
          NODE

      - name: Upload routing diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-routing-diagnostic
          path: |
            routing-diagnostic.json
            routing-result.json
            routing-headers.txt
            health.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publish website routing verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Structural homepage objectives route to full WEB-003 execution"
          else
            state="failure"
            description="Website intent routing verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state:process.env.STATE,
              description:process.env.DESCRIPTION,
              context:"kairos-website-routing-production",
              target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
