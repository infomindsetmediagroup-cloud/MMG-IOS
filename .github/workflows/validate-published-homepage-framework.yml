name: Diagnose Live Rendered Homepage Text

on:
  push:
    branches:
      - validate/published-homepage-framework
    paths:
      - ".validation-trigger"
      - ".github/workflows/validate-published-homepage-framework.yml"

permissions:
  contents: write

concurrency:
  group: kairos-live-rendered-homepage-text
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      TARGET_PRODUCTION_COMMIT: 3c346d1521dccc919718835e081613d8ed0abe2d
      EXPECTED_RENDERED_PLANNER: kairos-rendered-homepage-text-planner-20260716-1
    steps:
      - name: Collect live diagnostics
        shell: bash
        run: |
          set -u
          health_code="000"
          for attempt in $(seq 1 30); do
            nonce="${TARGET_PRODUCTION_COMMIT}-${attempt}-$(date +%s)"
            health_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?rendered-diagnostic=${nonce}" \
              --output health.json \
              --write-out '%{http_code}' || true)"
            if [ "${health_code}" = "200" ]; then break; fi
            sleep 10
          done

          nonce="${TARGET_PRODUCTION_COMMIT}-$(date +%s)"
          script_code="$(curl --silent --show-error --location --max-time 45 \
            -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/scripts/homepage-quick-action.js?v=${nonce}" \
            --output homepage-quick.js \
            --write-out '%{http_code}' || true)"

          planner_code="$(curl --silent --show-error --location --max-time 45 \
            -D planner-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data '{"objective":"x","requestType":"homepage-preserve-design","homepageMode":"preserve-published-framework","sourceOfTruth":"published-main-theme","preserveExistingDesign":true,"preservePublishedFramework":true,"renderedTextRequired":true,"activeOrderedSectionsOnly":true,"activeOrderedBlocksOnly":true,"templateTextOnly":true,"canonicalPackageAuthorized":false}' \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output planner-body.json \
            --write-out '%{http_code}' || true)"

          HEALTH_CODE="${health_code}" SCRIPT_CODE="${script_code}" PLANNER_CODE="${planner_code}" EXPECTED_RENDERED_PLANNER="${EXPECTED_RENDERED_PLANNER}" node <<'NODE' > diagnostics.json
          const fs=require('fs');
          const read=(p,f)=>{try{return fs.readFileSync(p,'utf8')}catch{return f}};
          const parse=(p)=>{try{return JSON.parse(read(p,'{}'))}catch{return {parseError:true,raw:read(p,'')}}};
          const health=parse('health.json');
          const quick=read('homepage-quick.js','');
          const body=parse('planner-body.json');
          const headers=read('planner-headers.txt','');
          const p=health.homepagePreserveDesign||{};
          const checks={
            healthHttp:Number(process.env.HEALTH_CODE)===200,
            productionBuild:health.build==='kairos-production-entry-20260716-98',
            renderedPlannerBuild:p.renderedTextPlannerBuild===process.env.EXPECTED_RENDERED_PLANNER,
            renderedTextContract:p.renderedTextContract==='active-ordered-primary-copy-delta-required',
            renderedTextRequirement:p.renderedTextRequirement==='at-least-one-active-primary-copy-delta',
            hiddenTextBlocked:p.hiddenTextSuccess==='prohibited',
            disabledTextBlocked:p.disabledSectionTextSuccess==='prohibited',
            unorderedTextBlocked:p.unorderedSectionOrBlockTextSuccess==='prohibited',
            capabilityDelta:health.capabilities?.homepageRenderedTextDelta==='required',
            capabilityNoop:health.capabilities?.homepageHiddenTextNoOp==='prohibited',
            scriptHttp:Number(process.env.SCRIPT_CODE)===200,
            stateV3:quick.includes('kairos.homepage.quick-action.v3'),
            legacyStateDiscarded:quick.includes('sessionStorage.removeItem(LEGACY_STATE_KEY)'),
            activeSectionsRequired:quick.includes('activeOrderedSectionsOnly: true'),
            activeBlocksRequired:quick.includes('activeOrderedBlocksOnly: true'),
            replacementCountRequired:quick.includes('textSettingReplacementCount'),
            plannerHttp:Number(process.env.PLANNER_CODE)===400,
            objectiveGuard:body?.error?.code==='objective_required',
            productionHeader:/x-kairos-production-entry:\s*kairos-production-entry-20260716-98/i.test(headers),
            renderedPlannerHeader:/x-kairos-rendered-homepage-text-planner:\s*kairos-rendered-homepage-text-planner-20260716-1/i.test(headers),
            renderedScope:/x-kairos-mutation-scope:\s*templates-index-json-existing-rendered-string-settings-only/i.test(headers),
            renderedDeltaRequired:/x-kairos-rendered-text-delta-required:\s*true/i.test(headers),
            hiddenNoopBlocked:/x-kairos-hidden-text-noop:\s*prohibited/i.test(headers),
            rebuildBlocked:/x-kairos-canonical-rebuild-fallback:\s*prohibited/i.test(headers),
          };
          const passed=Object.values(checks).every(Boolean);
          process.stdout.write(JSON.stringify({
            status:passed?'passed':'failed',
            productionCommit:process.env.TARGET_PRODUCTION_COMMIT,
            productionBuild:health.build||null,
            expectedRenderedPlanner:process.env.EXPECTED_RENDERED_PLANNER,
            http:{health:Number(process.env.HEALTH_CODE),script:Number(process.env.SCRIPT_CODE),planner:Number(process.env.PLANNER_CODE)},
            actual:{
              renderedTextPlannerBuild:p.renderedTextPlannerBuild||null,
              renderedTextContract:p.renderedTextContract||null,
              renderedTextRequirement:p.renderedTextRequirement||null,
              hiddenTextSuccess:p.hiddenTextSuccess||null,
              disabledSectionTextSuccess:p.disabledSectionTextSuccess||null,
              unorderedSectionOrBlockTextSuccess:p.unorderedSectionOrBlockTextSuccess||null,
              homepageRenderedTextDelta:health.capabilities?.homepageRenderedTextDelta||null,
              homepageHiddenTextNoOp:health.capabilities?.homepageHiddenTextNoOp||null,
              plannerErrorCode:body?.error?.code||null
            },
            checks,
            completedAt:new Date().toISOString()
          },null,2));
          NODE

      - name: Write diagnostic receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          receipt="$(cat diagnostics.json 2>/dev/null || printf '%s' '{"status":"failed","error":"diagnostics_missing"}')"
          encoded="$(printf '%s' "${receipt}" | base64 -w0)"
          api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/contents/.validation/rendered-homepage-text-live.json"
          existing="$(curl --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}?ref=${GITHUB_REF_NAME}")"
          existing_sha="$(printf '%s' "${existing}" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(JSON.parse(s).sha||"")}catch{}})')"
          payload="$(CONTENT="${encoded}" BRANCH="${GITHUB_REF_NAME}" SHA="${existing_sha}" node -e 'const p={message:"Record rendered homepage text diagnostics",content:process.env.CONTENT,branch:process.env.BRANCH};if(process.env.SHA)p.sha=process.env.SHA;process.stdout.write(JSON.stringify(p))')"
          curl --fail --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${api_url}" \
            --data "${payload}"
