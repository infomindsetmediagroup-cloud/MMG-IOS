name: Verify Live Rendered Homepage Text

on:
  push:
    branches:
      - validate/published-homepage-framework
    paths:
      - ".validation-trigger"
      - ".github/workflows/validate-published-homepage-framework.yml"

permissions:
  contents: write

concurrency:
  group: kairos-live-rendered-homepage-text
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      TARGET_PRODUCTION_COMMIT: 3c346d1521dccc919718835e081613d8ed0abe2d
      EXPECTED_RENDERED_PLANNER: kairos-rendered-homepage-text-planner-20260716-1
    steps:
      - name: Wait for rendered-text deployment
        shell: bash
        run: |
          set -euo pipefail
          ready=0
          for attempt in $(seq 1 60); do
            nonce="${TARGET_PRODUCTION_COMMIT}-${attempt}-$(date +%s)"
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?rendered-text=${nonce}" \
              --output health.json \
              --write-out '%{http_code}' || true)"
            if [ "${code}" = "200" ] && EXPECTED_RENDERED_PLANNER="${EXPECTED_RENDERED_PLANNER}" node - <<'NODE'
          const fs=require('fs');
          try {
            const h=JSON.parse(fs.readFileSync('health.json','utf8'));
            const p=h.homepagePreserveDesign||{};
            const ok=h.build==='kairos-production-entry-20260716-98'
              &&p.status==='operational'
              &&p.sourceOfTruth==='published-main-theme'
              &&p.renderedTextPlannerBuild===process.env.EXPECTED_RENDERED_PLANNER
              &&p.renderedTextContract==='active-ordered-primary-copy-delta-required'
              &&p.renderedTextRequirement==='at-least-one-active-primary-copy-delta'
              &&p.hiddenTextSuccess==='prohibited'
              &&p.disabledSectionTextSuccess==='prohibited'
              &&p.unorderedSectionOrBlockTextSuccess==='prohibited'
              &&Array.isArray(p.mutableFiles)&&p.mutableFiles.length===1&&p.mutableFiles[0]==='templates/index.json'
              &&p.canonicalPackageInstallation==='prohibited-in-preserve-mode'
              &&p.structuralFallback==='stop-instead-of-rebuild'
              &&h.capabilities?.homepageRenderedTextDelta==='required'
              &&h.capabilities?.homepageHiddenTextNoOp==='prohibited'
              &&h.capabilities?.homepageCanonicalRebuildFallback==='prohibited';
            process.exit(ok?0:1);
          } catch { process.exit(1); }
          NODE
            then
              ready=1
              break
            fi
            sleep 10
          done
          if [ "${ready}" != "1" ]; then
            echo "Rendered homepage text deployment did not become ready." >&2
            cat health.json 2>/dev/null || true
            exit 1
          fi

      - name: Verify browser guards and safe routing
        shell: bash
        run: |
          set -euo pipefail
          nonce="${TARGET_PRODUCTION_COMMIT}-$(date +%s)"
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/scripts/homepage-quick-action.js?v=${nonce}" --output homepage-quick.js
          http_code="$(curl --silent --show-error --location --max-time 45 \
            -D planner-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data '{"objective":"x","requestType":"homepage-preserve-design","homepageMode":"preserve-published-framework","sourceOfTruth":"published-main-theme","preserveExistingDesign":true,"preservePublishedFramework":true,"renderedTextRequired":true,"activeOrderedSectionsOnly":true,"activeOrderedBlocksOnly":true,"templateTextOnly":true,"canonicalPackageAuthorized":false}' \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output planner-body.json \
            --write-out '%{http_code}')"
          HTTP_CODE="${http_code}" EXPECTED_RENDERED_PLANNER="${EXPECTED_RENDERED_PLANNER}" node <<'NODE'
          const fs=require('fs');
          const quick=fs.readFileSync('homepage-quick.js','utf8');
          const body=JSON.parse(fs.readFileSync('planner-body.json','utf8'));
          const headers=fs.readFileSync('planner-headers.txt','utf8');
          const expected=process.env.EXPECTED_RENDERED_PLANNER.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          const checks={
            stateV3:quick.includes('kairos.homepage.quick-action.v3'),
            legacyStateDiscarded:quick.includes('LEGACY_STATE_KEY')&&quick.includes('sessionStorage.removeItem(LEGACY_STATE_KEY)'),
            activeSectionsRequired:quick.includes('activeOrderedSectionsOnly: true'),
            activeBlocksRequired:quick.includes('activeOrderedBlocksOnly: true'),
            executionReplacementRequired:quick.includes('textSettingReplacementCount'),
            visibleDeltaError:quick.includes('verified rendered homepage text replacement'),
            safeValidation:Number(process.env.HTTP_CODE)===400,
            objectiveGuard:body?.error?.code==='objective_required',
            productionHeader:/x-kairos-production-entry:\s*kairos-production-entry-20260716-98/i.test(headers),
            renderedPlannerHeader:new RegExp(`x-kairos-rendered-homepage-text-planner:\\s*${expected}`,'i').test(headers),
            preserveModeHeader:/x-kairos-homepage-mode:\s*preserve-published-framework/i.test(headers),
            renderedScopeHeader:/x-kairos-mutation-scope:\s*templates-index-json-existing-rendered-string-settings-only/i.test(headers),
            renderedDeltaRequired:/x-kairos-rendered-text-delta-required:\s*true/i.test(headers),
            hiddenNoopBlocked:/x-kairos-hidden-text-noop:\s*prohibited/i.test(headers),
            rebuildBlocked:/x-kairos-canonical-rebuild-fallback:\s*prohibited/i.test(headers),
          };
          console.log(JSON.stringify({httpStatus:Number(process.env.HTTP_CODE),checks},null,2));
          if(Object.values(checks).some(value=>value!==true))process.exit(1);
          NODE

      - name: Write live verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          receipt="$(JOB_STATUS="${JOB_STATUS}" node - <<'NODE'
          const status=process.env.JOB_STATUS==='success'?'passed':'failed';
          process.stdout.write(JSON.stringify({
            status,
            productionCommit:process.env.TARGET_PRODUCTION_COMMIT,
            productionBuild:'kairos-production-entry-20260716-98',
            renderedPlannerBuild:process.env.EXPECTED_RENDERED_PLANNER,
            workflowRunID:process.env.GITHUB_RUN_ID,
            workflowRunURL:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            checks:[
              'live-health-rendered-planner',
              'active-ordered-primary-copy-delta-required',
              'hidden-disabled-unordered-noop-prohibited',
              'browser-state-v3',
              'executor-replacement-count-required',
              'published-main-framework-preserved',
              'canonical-rebuild-fallback-prohibited',
              'safe-routing-no-shopify-mutation'
            ],
            completedAt:new Date().toISOString()
          },null,2));
          NODE
          )"
          encoded="$(printf '%s' "${receipt}" | base64 -w0)"
          api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/contents/.validation/rendered-homepage-text-live.json"
          existing="$(curl --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}?ref=${GITHUB_REF_NAME}")"
          existing_sha="$(printf '%s' "${existing}" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(JSON.parse(s).sha||"")}catch{}})')"
          payload="$(CONTENT="${encoded}" BRANCH="${GITHUB_REF_NAME}" SHA="${existing_sha}" node -e 'const p={message:"Record live rendered homepage text verification",content:process.env.CONTENT,branch:process.env.BRANCH};if(process.env.SHA)p.sha=process.env.SHA;process.stdout.write(JSON.stringify(p))')"
          curl --fail --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${api_url}" \
            --data "${payload}"
