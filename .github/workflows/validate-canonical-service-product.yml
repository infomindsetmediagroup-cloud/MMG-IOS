name: Validate Canonical Service Product

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "shopify/products/professional-cover-design-service/**"
      - "package.json"
      - ".github/workflows/validate-canonical-service-product.yml"
  push:
    branches: [main]
    paths:
      - "shopify/products/professional-cover-design-service/**"
      - "package.json"
      - ".github/workflows/validate-canonical-service-product.yml"

permissions:
  contents: read

concurrency:
  group: canonical-service-product-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate service contract and source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Download repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 90 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${SOURCE_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository

      - name: Validate canonical service product
        shell: bash
        working-directory: repository
        run: |
          set -euo pipefail
          node --version
          npm run validate:service-product
