name: Execute Native MMG Page Repair on PR

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  statuses: write

concurrency:
  group: execute-native-page-repair-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      TARGET_SHA: ${{ github.event.pull_request.head.sha }}
      BUILD: kairos-native-page-content-repair-20260719-1
    steps:
      - name: Materialize PR head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --no-checkout \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-repair"
          cd "${RUNNER_TEMP}/mmg-repair"
          git checkout --detach "${TARGET_SHA}"
          test "$(git rev-parse HEAD)" = "${TARGET_SHA}"

      - name: Repair source syntax and validate runtime
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-repair"
          python3 -c 'from pathlib import Path; p=Path("cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js"); s=p.read_text(encoding="utf-8"); old="      ),\n    toolkitMiniNavigationRemoved: toolkitAudit.toolkitMiniNavigationRemoved,"; new="      ),\n    ),\n    toolkitMiniNavigationRemoved: toolkitAudit.toolkitMiniNavigationRemoved,"; assert s.count(old)==1; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          node --check cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${BUILD}" cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js
          grep -q 'kairos-native-page-content-repair-v1.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js

      - name: Deploy PR Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-repair/cloudflare/mmg-ios"
          npm install --no-audit --no-fund
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${TARGET_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for exact Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 -D "${headers}" \
              "${WORKER_URL}/api/deployment/identity?sha=${TARGET_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${TARGET_SHA}\"" "${body}" \
              && grep -qi "x-mmg-native-page-repair: ${BUILD}" "${headers}"; then
              exit 0
            fi
            sleep 5
          done
          cat "${RUNNER_TEMP}/identity.json" || true
          cat "${RUNNER_TEMP}/identity.headers" || true
          exit 1

      - name: Repair audited Shopify pages
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/repair.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_URL}/api/shopify/pages/repair?sha=${TARGET_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"REPAIR_MMG_AUDITED_PAGES_NOW"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}"
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactPageReadBack":true' "${result}"
          grep -q '"toolkitMiniNavigationRemoved":true' "${result}"
          grep -q '"publishingDirectoryRemoved":true' "${result}"
          grep -q '"projectGuideLinksRepaired":true' "${result}"
          grep -q '"nativeTitleSuppressionInstalled":true' "${result}"

      - name: Verify live static content
        run: |
          set -euo pipefail
          toolkit="${RUNNER_TEMP}/toolkit.html"
          publishing="${RUNNER_TEMP}/publishing.html"
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache, no-store' \
            "${STOREFRONT_URL}/pages/free-creator-toolkit?native_repair=${TARGET_SHA}" -o "${toolkit}"
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache, no-store' \
            "${STOREFRONT_URL}/pages/publishing-services?native_repair=${TARGET_SHA}" -o "${publishing}"
          grep -q 'data-mmg-native-page="free-creator-toolkit"' "${toolkit}"
          grep -q 'data-mmg-native-page="publishing-services"' "${publishing}"
          ! grep -q '/pages/project-guide' "${publishing}"
          ! grep -q 'Explore Mindset Media Group™' "${publishing}"
