name: Command Center Browser Proof

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - name: Check out pull request source
        uses: actions/checkout@v4

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy self-contained app
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          npx wrangler deploy

      - name: Wait for exact live shell
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f headers.txt app.html
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${APP_URL}?proof=${nonce}" \
              --output app.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            if [ "${code}" = "200" ] \
              && [ "${route}" = "direct-assets-root-shell" ] \
              && grep -q 'kairos-command-center-inline-20260717-1' app.html \
              && grep -q 'id="website-objective"' app.html; then
              echo "Exact self-contained app shell is live."
              exit 0
            fi
            sleep 5
          done
          echo "Exact self-contained app shell did not become live." >&2
          exit 1

      - name: Install Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Open app and exercise Website Retool
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              isMobile: true,
              hasTouch: true,
            });
            const page = await context.newPage();
            const pageErrors = [];
            page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
            const response = await page.goto(`${process.env.APP_URL}?proof=${Date.now()}`, {
              waitUntil: 'domcontentloaded',
              timeout: 60000,
            });
            await page.waitForSelector('html[data-kairos-boot="ready"]', { timeout: 15000 });
            await page.waitForSelector('#website-objective', { state: 'visible', timeout: 15000 });
            const objective = 'Verified functioning Website Retool input.';
            await page.fill('#website-objective', objective);
            const value = await page.inputValue('#website-objective');
            const button = page.locator('[data-website-plan]');
            const receipt = {
              httpStatus: response?.status() || 0,
              loading: (await page.locator('#kairos-hub').innerText()).includes('Loading Kairos Command Center'),
              build: await page.locator('#kairos-hub').getAttribute('data-self-contained-build'),
              value,
              buttonVisible: await button.isVisible(),
              buttonEnabled: await button.isEnabled(),
              headerBox: await page.locator('.app-header-image').boundingBox(),
              bodyFont: await page.evaluate(() => getComputedStyle(document.body).fontFamily),
              pageErrors,
            };
            console.log(`KAIROS_BROWSER_RECEIPT=${JSON.stringify(receipt)}`);
            await page.screenshot({ path: 'command-center-browser-proof.png', fullPage: true });
            await browser.close();
            const box = receipt.headerBox || {};
            const passed = response?.ok()
              && !receipt.loading
              && receipt.build === 'kairos-command-center-inline-20260717-1'
              && value === objective
              && receipt.buttonVisible
              && receipt.buttonEnabled
              && box.width > 0 && box.width <= 390
              && box.height > 0 && box.height <= 180
              && !/Times New Roman|serif/i.test(receipt.bodyFont || '')
              && pageErrors.length === 0;
            if (!passed) process.exit(1);
          })().catch(error => { console.error(error); process.exit(1); });
          NODE

      - name: Upload browser proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-browser-proof
          path: command-center-browser-proof.png
          if-no-files-found: ignore
