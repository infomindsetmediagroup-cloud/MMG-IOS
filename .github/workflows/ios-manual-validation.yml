name: Manual iOS Validation

on:
  workflow_dispatch:
    inputs:
      ref_name:
        description: Branch, tag, or SHA to validate
        required: false
        default: main
      simulator_destination:
        description: xcodebuild destination for simulator build
        required: false
        default: generic/platform=iOS Simulator

concurrency:
  group: manual-ios-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ios:
    name: Build MMGIOS on cloud macOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref_name }}

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes and simulator destinations
        run: |
          xcodebuild -list -project MMGIOS.xcodeproj
          xcodebuild -showdestinations -project MMGIOS.xcodeproj -scheme MMGIOS || true

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project MMGIOS.xcodeproj -scheme MMGIOS

      - name: Build for iOS simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project MMGIOS.xcodeproj \
            -scheme MMGIOS \
            -destination "${{ inputs.simulator_destination }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Validate runtime foundation source files
        run: |
          test -f MMGIOS/App/AppRootView.swift
          test -f MMGIOS/App/MMGIOSApp.swift
          test -f MMGIOS/Config/AppTheme.swift
          test -f MMGIOS/Features/AssetManagement/AssetEnums.swift
          test -f MMGIOS/Features/AssetManagement/AssetManagementDashboardView.swift
          test -f MMGIOS/Features/AssetManagement/ProductionAssetRecord.swift
          test -f MMGIOS/Features/AssetManagement/ProductionAssetService.swift
          test -f MMGIOS/Features/CommandCenter/CommandCenterRuntimeSummaryView.swift
          test -f MMGIOS/Features/DesignStudio/DesignStudioProjectFactory.swift
          test -f MMGIOS/Features/DesignStudio/DesignStudioProjectRecord.swift
          test -f MMGIOS/Features/DesignStudio/DesignStudioWorkflowView.swift
          test -f MMGIOS/Features/KnowledgeVault/KnowledgeVaultRecord.swift
          test -f MMGIOS/Features/ProductionQueue/ProductionQueueEnums.swift
          test -f MMGIOS/Features/ProductionQueue/ProductionQueueRecord.swift
          test -f MMGIOS/Features/ProductionQueue/ProductionQueueService.swift
          test -f MMGIOS/Features/TaskEngine/TaskDependencyRecord.swift
          test -f MMGIOS/Features/TaskEngine/TaskEnums.swift
          test -f MMGIOS/Features/TaskEngine/TaskRecord.swift
          test -f MMGIOS/Features/TaskEngine/TaskRuntimeService.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowEnums.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowRecord.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowRuntimeDashboardView.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowRuntimeService.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowStagePolicy.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowStageProgress.swift
          test -f MMGIOS/Features/WorkflowRuntime/WorkflowTransitionRecord.swift
          grep -q "CommandCenterRuntimeSummaryView" MMGIOS/App/AppRootView.swift
          grep -q "WorkflowRuntimeDashboardView" MMGIOS/App/AppRootView.swift
          grep -q "DesignStudioWorkflowView" MMGIOS/App/AppRootView.swift
          grep -q "AssetManagementDashboardView" MMGIOS/App/AppRootView.swift
          grep -q "WorkflowRecord.self" MMGIOS/App/MMGIOSApp.swift
          grep -q "TaskRecord.self" MMGIOS/App/MMGIOSApp.swift
          grep -q "ProductionQueueRecord.self" MMGIOS/App/MMGIOSApp.swift
          grep -q "DesignStudioProjectRecord.self" MMGIOS/App/MMGIOSApp.swift
          grep -q "ProductionAssetRecord.self" MMGIOS/App/MMGIOSApp.swift
          grep -q "KnowledgeVaultRecord.self" MMGIOS/App/MMGIOSApp.swift
