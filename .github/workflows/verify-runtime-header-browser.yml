name: Verify Runtime Header Browser

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-runtime-header-browser.yml"
      - ".github/scripts/verify-runtime-header-browser.cjs"
      - "web/kairos-dashboard/index.html"
      - "web/kairos-dashboard/scripts/command-hub.js"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-runtime-header-browser
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - uses: actions/checkout@v4

      - name: Wait for inline runtime probe to reach Cloudflare
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_URL}?browser-gate=${GITHUB_SHA}-${attempt}-$(date +%s)" \
              --output command-center.html || true
            if grep -q 'header-inline=' command-center.html 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "The repaired Command Center HTML did not reach Cloudflare." >&2
          exit 1

      - name: Install browser verifier
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/kairos-browser-check
          cd /tmp/kairos-browser-check
          npm init -y >/dev/null
          npm install --no-save playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Prove visible header becomes Online
        shell: bash
        env:
          NODE_PATH: /tmp/kairos-browser-check/node_modules
          DIAGNOSTIC_PATH: runtime-header-browser-diagnostics.json
        run: node .github/scripts/verify-runtime-header-browser.cjs

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-header-browser-diagnostics
          path: runtime-header-browser-diagnostics.json
          if-no-files-found: warn
          retention-days: 1

      - name: Publish browser verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Live browser header changed to Online"
          else
            state="failure"
            description="Live browser runtime header verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-runtime-header-browser",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
