name: Publish Corrected Main Navigation
run-name: Publish corrected Shopify navigation ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-main-navigation-now.yml
      - cloudflare/mmg-ios/src/kairos-native-navigation-publisher-20260718.js
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mmg-main-navigation-publish
  cancel-in-progress: false

# Rerun requested after Shopify online-store navigation scope approval.

jobs:
  publish-navigation:
    name: Publish corrected Shopify navigation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish native Shopify main navigation
        shell: bash
        run: |
          set -euo pipefail
          http_code="$(curl --silent --show-error --max-time 240 \
            -X POST \
            -H 'Content-Type: application/json' \
            'https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/navigation/publish' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_NAVIGATION"}' \
            --output /tmp/navigation.json \
            --write-out '%{http_code}')"

          echo "Worker HTTP status: ${http_code}"
          cat /tmp/navigation.json
          echo

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            exit 1
          fi

          node - <<'NODE'
          const fs = require('node:fs');
          const body = JSON.parse(fs.readFileSync('/tmp/navigation.json', 'utf8'));
          const expectedTopLevel = [
            'Home',
            'Products',
            'Publishing Services',
            'Knowledge Library',
            'Membership',
            'Kairos',
            'Customer Portal',
            'Company'
          ];
          const observed = body?.verification?.topLevel?.map(item => item.title) || [];
          const valid = body?.status === 'completed'
            && body?.build === 'kairos-native-navigation-publisher-20260718-4'
            && body?.verification?.valid === true
            && JSON.stringify(observed) === JSON.stringify(expectedTopLevel)
            && !observed.includes('Catalog')
            && !observed.includes('Contact')
            && body?.safeguards?.duplicateDestinationsRemoved === true
            && body?.safeguards?.aboutAndContactNestedUnderCompany === true;

          if (!valid) {
            console.error(JSON.stringify(body, null, 2));
            process.exit(1);
          }

          console.log(JSON.stringify({
            status: body.status,
            build: body.build,
            topLevel: observed,
            destinationCounts: body.verification.destinationCounts
          }, null, 2));
          NODE

      - name: Verify live storefront navigation
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            html="$(curl --fail --silent --show-error --max-time 30 -H 'Cache-Control: no-cache' "https://themindsetmediagroup.com/?navigation_release=${GITHUB_SHA}&attempt=${attempt}")"
            if printf '%s' "$html" | grep -q '>Products<' \
              && printf '%s' "$html" | grep -q '>Membership<' \
              && printf '%s' "$html" | grep -q '>Kairos<' \
              && ! printf '%s' "$html" | grep -q '>Catalog<' ; then
              echo 'Verified corrected live storefront navigation.'
              exit 0
            fi
            echo "Storefront verification attempt ${attempt}/24 did not yet reflect the corrected navigation."
            sleep 5
          done
          exit 1
