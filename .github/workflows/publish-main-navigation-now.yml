name: Publish Corrected Main Navigation
run-name: Publish theme-layer Shopify navigation ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-main-navigation-now.yml
      - cloudflare/mmg-ios/src/kairos-native-navigation-publisher-20260718.js
      - cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mmg-main-navigation-publish
  cancel-in-progress: false

jobs:
  publish-navigation:
    name: Publish live theme navigation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for Cloudflare navigation publisher v6
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            headers="$(curl --silent --show-error --max-time 30 -I \
              "https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/navigation/publish?release=${GITHUB_SHA}&attempt=${attempt}" || true)"
            if printf '%s' "$headers" | grep -qi 'x-mmg-native-navigation: kairos-native-navigation-theme-publisher-20260718-6'; then
              echo 'Theme navigation publisher v6 is deployed.'
              exit 0
            fi
            echo "Deployment verification attempt ${attempt}/48 has not exposed v6 yet."
            sleep 5
          done
          exit 1

      - name: Publish canonical desktop and mobile navigation
        shell: bash
        run: |
          set -euo pipefail
          http_code="$(curl --silent --show-error --max-time 240 \
            -X POST \
            -H 'Content-Type: application/json' \
            'https://mmg-ios.info-mindsetmediagroup.workers.dev/api/shopify/navigation/publish' \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_NAVIGATION"}' \
            --output /tmp/navigation.json \
            --write-out '%{http_code}')"

          echo "Worker HTTP status: ${http_code}"
          cat /tmp/navigation.json
          echo

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            exit 1
          fi

          node - <<'NODE'
          const fs = require('node:fs');
          const body = JSON.parse(fs.readFileSync('/tmp/navigation.json', 'utf8'));
          const expected = [
            'Home',
            'Products',
            'Publishing Services',
            'Knowledge Library',
            'Membership',
            'Kairos',
            'Customer Portal',
            'Company'
          ];
          const observed = body?.verification?.topLevel?.map(item => item.title) || [];
          const valid = body?.status === 'completed'
            && body?.build === 'kairos-native-navigation-theme-publisher-20260718-6'
            && body?.verification?.valid === true
            && body?.verification?.exactThemeFileReadBack === true
            && body?.safeguards?.menusGraphQLDependencyRemoved === true
            && body?.safeguards?.liveThemeChanged === true
            && body?.safeguards?.aboutAndContactNestedUnderCompany === true
            && JSON.stringify(observed) === JSON.stringify(expected);
          if (!valid) {
            console.error(JSON.stringify(body, null, 2));
            process.exit(1);
          }
          console.log(JSON.stringify({
            status: body.status,
            build: body.build,
            strategy: body.navigation.strategy,
            topLevel: observed,
            files: body.files
          }, null, 2));
          NODE

      - name: Verify live storefront navigation assets
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            html="$(curl --fail --silent --show-error --max-time 30 -H 'Cache-Control: no-cache' \
              "https://themindsetmediagroup.com/?navigation_release=${GITHUB_SHA}&attempt=${attempt}")"
            if printf '%s' "$html" | grep -q 'mmg-canonical-navigation.css' \
              && printf '%s' "$html" | grep -q 'mmg-canonical-navigation.js'; then
              js_url="$(printf '%s' "$html" | grep -oE 'https:[^\" ]*mmg-canonical-navigation\.js[^\" ]*' | head -n1 | sed 's/&amp;/\&/g')"
              if [ -z "$js_url" ]; then
                js_url="https://themindsetmediagroup.com/cdn/shop/t/1/assets/mmg-canonical-navigation.js"
              fi
              js="$(curl --fail --silent --show-error --max-time 30 -H 'Cache-Control: no-cache' "$js_url" || true)"
              if printf '%s' "$js" | grep -q 'kairos-native-navigation-theme-publisher-20260718-6' \
                && printf '%s' "$js" | grep -q 'Publishing Services' \
                && printf '%s' "$js" | grep -q 'Customer Portal' \
                && printf '%s' "$js" | grep -q 'About Mindset Media Group'; then
                echo 'Verified canonical navigation assets on the live storefront.'
                exit 0
              fi
            fi
            echo "Live storefront verification attempt ${attempt}/36 has not exposed the canonical navigation assets yet."
            sleep 5
          done
          exit 1
