name: Run Native MMG Page Repair

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/run-native-page-repair.yml"
      - "cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: run-native-mmg-page-repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      BUILD: kairos-native-page-content-repair-20260719-1
      STATUS_CONTEXT: mmg-native-page-repair
    steps:
      - name: Mark pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:process.env.STATUS_CONTEXT,description:"Repairing audited Shopify pages",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

      - uses: actions/checkout@v7

      - name: Validate
        run: |
          set -euo pipefail
          node --check cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${BUILD}" cloudflare/mmg-ios/src/kairos-native-page-content-repair-v1.js

      - name: Deploy Worker
        working-directory: cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 -D "${headers}" \
              "${WORKER_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${body}" \
              && grep -qi "x-mmg-native-page-repair: ${BUILD}" "${headers}"; then
              exit 0
            fi
            sleep 5
          done
          cat "${RUNNER_TEMP}/identity.json" || true
          cat "${RUNNER_TEMP}/identity.headers" || true
          exit 1

      - name: Repair pages
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/repair.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_URL}/api/shopify/pages/repair?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"REPAIR_MMG_AUDITED_PAGES_NOW"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}"
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"exactPageReadBack":true' "${result}"
          grep -q '"toolkitMiniNavigationRemoved":true' "${result}"
          grep -q '"publishingDirectoryRemoved":true' "${result}"
          grep -q '"projectGuideLinksRepaired":true' "${result}"
          grep -q '"nativeTitleSuppressionInstalled":true' "${result}"

      - name: Verify static storefront content
        run: |
          set -euo pipefail
          toolkit="${RUNNER_TEMP}/toolkit.html"
          publishing="${RUNNER_TEMP}/publishing.html"
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache, no-store' \
            "${STOREFRONT_URL}/pages/free-creator-toolkit?repair=${GITHUB_SHA}" -o "${toolkit}"
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache, no-store' \
            "${STOREFRONT_URL}/pages/publishing-services?repair=${GITHUB_SHA}" -o "${publishing}"
          grep -q 'data-mmg-native-page="free-creator-toolkit"' "${toolkit}"
          grep -q 'data-mmg-native-page="publishing-services"' "${publishing}"
          ! grep -q '/pages/project-guide' "${publishing}"
          ! grep -q 'Explore Mindset Media Group™' "${publishing}"

      - name: Report result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"; description="Audited Shopify pages repaired"
          else
            state="failure"; description="Native page repair failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.STATUS_CONTEXT,description:process.env.DESCRIPTION,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

