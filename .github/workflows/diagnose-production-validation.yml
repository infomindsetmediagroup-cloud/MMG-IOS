name: Deploy Kairos Through Verified Runner

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/diagnose-production-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download canonical repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Cloudflare dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate production source
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Verify exact live runtime and dashboard assets
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          expected_entry="$(node -e 'const fs=require("fs");const root="repository/cloudflare/mmg-ios";const manifest=JSON.parse(fs.readFileSync(`${root}/production-baseline.json`,"utf8"));const x=fs.readFileSync(`${root}/${manifest.worker.entry}`,"utf8").match(/const BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          expected_autonomy="$(node -e 'const fs=require("fs");const x=fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-autonomy-runtime-v1.js","utf8").match(/KAIROS_AUTONOMY_BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          export EXPECTED_ENTRY="${expected_entry}" EXPECTED_AUTONOMY="${expected_autonomy}"

          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f health.json dashboard.html dashboard.css dashboard.js loader.js

            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/center/content/website?deployment=${nonce}" \
              --output dashboard.html || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/styles/command-hub.css?deployment=${nonce}" \
              --output dashboard.css || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/scripts/command-hub.js?deployment=${nonce}" \
              --output dashboard.js || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/scripts/command-hub-loader.js?deployment=${nonce}" \
              --output loader.js || true

            if node -e '
              const fs=require("fs");
              let health={};
              try{health=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{}
              const html=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";
              const css=fs.existsSync("dashboard.css")?fs.readFileSync("dashboard.css","utf8"):"";
              const js=fs.existsSync("dashboard.js")?fs.readFileSync("dashboard.js","utf8"):"";
              const loader=fs.existsSync("loader.js")?fs.readFileSync("loader.js","utf8"):"";
              const ok=["ready","ok","operational"].includes(String(health.status||"").toLowerCase())
                && health.build===process.env.EXPECTED_ENTRY
                && health.enhancedInference?.status==="operational"
                && health.enhancedInference?.provider==="cloudflare-workers-ai"
                && health.autonomy?.status==="operational"
                && health.autonomy?.build===process.env.EXPECTED_AUTONOMY
                && html.includes("id=\"kairos-hub\"")
                && html.includes("/scripts/command-hub-loader.js")
                && css.includes(".hub-shell")
                && js.includes("renderApp();")
                && loader.includes("data.kairosBoot")
                && !css.includes("<html")
                && !js.includes("<html")
                && !loader.includes("<html");
              process.exit(ok?0:1);
            '; then
              echo "Exact runtime, app shell, CSS, main module, and guarded loader are live."
              break
            fi

            if [ "${attempt}" = "36" ]; then
              echo "Kairos failed exact runtime or dashboard asset verification." >&2
              exit 1
            fi
            sleep 5
          done

      - name: Prove Website Retool renders in headless Chrome
        env:
          APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "${CHROME}" ]; then
            echo "No Chrome or Chromium binary is available on the production runner." >&2
            exit 1
          fi

          nonce="${GITHUB_SHA}-$(date +%s)"
          rm -f rendered.html chrome-errors.log
          timeout 75s "${CHROME}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --window-size=390,844 \
            --virtual-time-budget=15000 \
            --dump-dom \
            "${APP_URL}?browser-verification=${nonce}" \
            > rendered.html 2> chrome-errors.log || true

          echo "KAIROS_CHROME_BINARY=${CHROME}"
          echo "KAIROS_RENDERED_BYTES=$(wc -c < rendered.html | tr -d ' ')"

          test -s rendered.html || { echo "Chrome returned no rendered DOM." >&2; cat chrome-errors.log >&2 || true; exit 1; }

          if grep -q 'Loading Kairos Command Center' rendered.html; then
            echo "The live app is still stuck on its loading screen." >&2
            cat chrome-errors.log >&2 || true
            exit 1
          fi

          if grep -q 'Kairos could not finish opening' rendered.html; then
            echo "The guarded loader exposed a startup module failure." >&2
            grep -o '<p class="error">[^<]*' rendered.html | head -1 >&2 || true
            cat chrome-errors.log >&2 || true
            exit 1
          fi

          grep -q 'data-kairos-boot="ready"' rendered.html || { echo "The guarded startup loader did not report ready." >&2; exit 1; }
          grep -q 'id="command-view"' rendered.html || { echo "The Command Center view did not initialize." >&2; exit 1; }
          grep -q 'Website Retool' rendered.html || { echo "The Website Retool workspace did not render." >&2; exit 1; }
          grep -q 'Describe the homepage you want Kairos to build' rendered.html || { echo "The Website objective form did not render." >&2; exit 1; }

          echo "Website Retool rendered successfully in a real headless Chrome session."

      - name: Upload live browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-live-browser-proof
          path: |
            rendered.html
            chrome-errors.log
            health.json
          if-no-files-found: ignore

      - name: Publish deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos deployed and Website Retool rendered in Chrome"
          else
            state="failure"
            description="Kairos deployment or browser render verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-cloudflare-production",
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
