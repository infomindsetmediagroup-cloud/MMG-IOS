name: Diagnose Production Validation

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - ".github/workflows/diagnose-production-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-validation-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout canonical repository
        uses: actions/checkout@v4

      - name: Run complete validation suite
        working-directory: cloudflare/mmg-ios
        run: node scripts/validate-production-suite.mjs

      - name: Publish diagnostic receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos complete validation suite passed"
          else
            state="failure"
            description="Kairos complete validation suite failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-validation-diagnostics",
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
