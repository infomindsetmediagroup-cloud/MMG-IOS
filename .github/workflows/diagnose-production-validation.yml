name: Deploy Kairos Through Verified Runner

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/diagnose-production-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download canonical repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Cloudflare dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate production source
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Verify exact live runtime and dependency-free dashboard assets
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        shell: bash
        run: |
          set -euo pipefail
          expected_entry="$(node -e 'const fs=require("fs");const root="repository/cloudflare/mmg-ios";const manifest=JSON.parse(fs.readFileSync(`${root}/production-baseline.json`,"utf8"));const x=fs.readFileSync(`${root}/${manifest.worker.entry}`,"utf8").match(/const BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          expected_autonomy="$(node -e 'const fs=require("fs");const x=fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-autonomy-runtime-v1.js","utf8").match(/KAIROS_AUTONOMY_BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          export EXPECTED_ENTRY="${expected_entry}" EXPECTED_AUTONOMY="${expected_autonomy}"

          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f health.json dashboard.html dashboard.css safe-shell.js shell-headers.txt css-headers.txt js-headers.txt

            health_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json \
              --write-out '%{http_code}' || true)"
            shell_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D shell-headers.txt \
              "${KAIROS_PRODUCTION_URL}/center/content/website?deployment=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            css_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D css-headers.txt \
              "${KAIROS_PRODUCTION_URL}/styles/command-hub.css?deployment=${nonce}" \
              --output dashboard.css \
              --write-out '%{http_code}' || true)"
            js_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D js-headers.txt \
              "${KAIROS_PRODUCTION_URL}/scripts/command-center-safe.js?deployment=${nonce}" \
              --output safe-shell.js \
              --write-out '%{http_code}' || true)"

            shell_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' shell-headers.txt | tail -1)"
            css_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' css-headers.txt | tail -1)"
            js_route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' js-headers.txt | tail -1)"
            css_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' css-headers.txt | tail -1)"
            js_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' js-headers.txt | tail -1)"

            if HEALTH_CODE="${health_code}" SHELL_CODE="${shell_code}" CSS_CODE="${css_code}" JS_CODE="${js_code}" \
              SHELL_ROUTE="${shell_route}" CSS_ROUTE="${css_route}" JS_ROUTE="${js_route}" \
              CSS_TYPE="${css_type}" JS_TYPE="${js_type}" node -e '
                const fs=require("fs");
                let health={};
                try{health=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{}
                const html=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";
                const css=fs.existsSync("dashboard.css")?fs.readFileSync("dashboard.css","utf8"):"";
                const js=fs.existsSync("safe-shell.js")?fs.readFileSync("safe-shell.js","utf8"):"";
                const ok=process.env.HEALTH_CODE==="200"
                  && process.env.SHELL_CODE==="200"
                  && process.env.CSS_CODE==="200"
                  && process.env.JS_CODE==="200"
                  && process.env.SHELL_ROUTE==="direct-assets-root-shell"
                  && process.env.CSS_ROUTE==="direct-assets-static"
                  && process.env.JS_ROUTE==="direct-assets-static"
                  && String(process.env.CSS_TYPE||"").startsWith("text/css")
                  && /javascript/.test(String(process.env.JS_TYPE||""))
                  && ["ready","ok","operational"].includes(String(health.status||"").toLowerCase())
                  && health.build===process.env.EXPECTED_ENTRY
                  && health.enhancedInference?.status==="operational"
                  && health.enhancedInference?.provider==="cloudflare-workers-ai"
                  && health.autonomy?.status==="operational"
                  && health.autonomy?.build===process.env.EXPECTED_AUTONOMY
                  && html.includes("id=\"kairos-hub\"")
                  && html.includes("/scripts/command-center-safe.js")
                  && css.includes(".hub-shell")
                  && js.includes("kairos-command-center-safe-20260717-1")
                  && js.includes("root.dataset.safeBoot")
                  && !css.includes("<html")
                  && !js.includes("<html");
                process.exit(ok?0:1);
              '; then
              echo "Exact runtime and dependency-free Command Center assets are live."
              break
            fi

            if [ "${attempt}" = "36" ]; then
              echo "Kairos failed exact runtime or dependency-free dashboard verification." >&2
              printf 'health=%s shell=%s css=%s js=%s shell_route=%s css_route=%s js_route=%s css_type=%s js_type=%s\n' \
                "${health_code:-}" "${shell_code:-}" "${css_code:-}" "${js_code:-}" "${shell_route:-}" "${css_route:-}" "${js_route:-}" "${css_type:-}" "${js_type:-}" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Prove Website Retool renders and functions in headless Chrome
        env:
          APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "${CHROME}" ]; then
            echo "No Chrome or Chromium binary is available on the production runner." >&2
            exit 1
          fi

          nonce="${GITHUB_SHA}-$(date +%s)"
          rm -f rendered.html chrome-errors.log
          timeout 75s "${CHROME}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-networking \
            --window-size=390,844 \
            --virtual-time-budget=15000 \
            --dump-dom \
            "${APP_URL}?browser-verification=${nonce}" \
            > rendered.html 2> chrome-errors.log || true

          echo "KAIROS_CHROME_BINARY=${CHROME}"
          echo "KAIROS_RENDERED_BYTES=$(wc -c < rendered.html | tr -d ' ')"

          test -s rendered.html || { echo "Chrome returned no rendered DOM." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          ! grep -q 'Loading Kairos Command Center' rendered.html || { echo "The live app is still stuck on its loading screen." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          grep -q 'data-kairos-boot="ready"' rendered.html || { echo "The dependency-free shell did not report ready." >&2; exit 1; }
          grep -q 'data-safe-boot="kairos-command-center-safe-20260717-1"' rendered.html || { echo "The dependency-free shell identity was not rendered." >&2; exit 1; }
          grep -q 'id="command-view"' rendered.html || { echo "The Command Center view did not initialize." >&2; exit 1; }
          grep -q 'Website Retool' rendered.html || { echo "The Website Retool workspace did not render." >&2; exit 1; }
          grep -q 'Website objective' rendered.html || { echo "The Website objective form did not render." >&2; exit 1; }
          grep -q 'Inspect &amp; Prepare Proposal' rendered.html || { echo "The Website proposal action did not render." >&2; exit 1; }
          grep -q 'id="website-objective"' rendered.html || { echo "The Website objective input is not present." >&2; exit 1; }
          grep -q 'data-website-plan' rendered.html || { echo "The Website planning control is not present." >&2; exit 1; }

          echo "Website Retool rendered successfully with its objective input and planning control in a real Chrome session."

      - name: Upload live browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-live-browser-proof
          path: |
            rendered.html
            chrome-errors.log
            health.json
          if-no-files-found: ignore

      - name: Publish deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos deployed and safe Website Retool rendered in Chrome"
          else
            state="failure"
            description="Kairos deployment or browser render verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-cloudflare-production",
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
