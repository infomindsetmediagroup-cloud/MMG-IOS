name: Deploy Kairos Through Verified Runner

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/diagnose-production-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download canonical repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Cloudflare dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate production source
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Verify exact runtime and self-contained app shell
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        shell: bash
        run: |
          set -euo pipefail
          expected_entry="$(node -e 'const fs=require("fs");const root="repository/cloudflare/mmg-ios";const manifest=JSON.parse(fs.readFileSync(`${root}/production-baseline.json`,"utf8"));const x=fs.readFileSync(`${root}/${manifest.worker.entry}`,"utf8").match(/const BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          export EXPECTED_ENTRY="${expected_entry}"

          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f health.json dashboard.html headers.txt
            health_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json \
              --write-out '%{http_code}' || true)"
            shell_code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${KAIROS_PRODUCTION_URL}/center/content/website?deployment=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' headers.txt | tail -1)"

            if HEALTH_CODE="${health_code}" SHELL_CODE="${shell_code}" ROUTE="${route}" TYPE="${type}" node -e '
              const fs=require("fs");
              let health={};
              try{health=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{}
              const html=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";
              const ok=process.env.HEALTH_CODE==="200"
                && process.env.SHELL_CODE==="200"
                && process.env.ROUTE==="direct-assets-root-shell"
                && String(process.env.TYPE||"").startsWith("text/html")
                && ["ready","ok","operational"].includes(String(health.status||"").toLowerCase())
                && health.build===process.env.EXPECTED_ENTRY
                && html.includes("id=\"kairos-hub\"")
                && html.includes("kairos-command-center-inline-20260717-1")
                && html.includes("Website Retool")
                && html.includes("website-objective");
              process.exit(ok?0:1);
            '; then
              echo "Exact runtime and self-contained Command Center shell are live."
              break
            fi

            if [ "${attempt}" = "36" ]; then
              echo "Runtime or self-contained app shell did not become healthy." >&2
              printf 'health=%s shell=%s route=%s content_type=%s\n' "${health_code:-}" "${shell_code:-}" "${route:-}" "${type:-}" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Prove Website Retool renders in headless Chrome
        env:
          APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          test -n "${CHROME}" || { echo "No Chrome binary is available." >&2; exit 1; }
          nonce="${GITHUB_SHA}-$(date +%s)"
          rm -f rendered.html chrome-errors.log
          timeout 75s "${CHROME}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-networking \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --dump-dom \
            "${APP_URL}?browser-verification=${nonce}" \
            > rendered.html 2> chrome-errors.log || true

          test -s rendered.html || { echo "Chrome returned no DOM." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          ! grep -q 'Loading Kairos Command Center' rendered.html || { echo "The app remained on its loading screen." >&2; cat chrome-errors.log >&2 || true; exit 1; }
          grep -q 'data-kairos-boot="ready"' rendered.html || { echo "App did not report ready." >&2; exit 1; }
          grep -q 'data-self-contained-build="kairos-command-center-inline-20260717-1"' rendered.html || { echo "Self-contained identity missing." >&2; exit 1; }
          grep -q 'id="command-view"' rendered.html || { echo "Command Center view missing." >&2; exit 1; }
          grep -q 'Website Retool' rendered.html || { echo "Website Retool missing." >&2; exit 1; }
          grep -q 'id="website-objective"' rendered.html || { echo "Website objective input missing." >&2; exit 1; }
          grep -q 'data-website-plan' rendered.html || { echo "Website planning control missing." >&2; exit 1; }
          echo "Self-contained Website Retool rendered in Chrome."

      - name: Upload live browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-self-contained-browser-proof
          path: |
            rendered.html
            chrome-errors.log
            health.json
          if-no-files-found: ignore

      - name: Publish deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos deployed and self-contained app rendered in Chrome"
          else
            state="failure"
            description="Kairos deployment or rendered app verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-cloudflare-production",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
