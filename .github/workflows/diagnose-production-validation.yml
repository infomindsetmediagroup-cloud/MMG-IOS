name: Deploy Kairos Through Verified Runner

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/diagnose-production-validation.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download canonical repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml

      - name: Install Cloudflare dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate production source
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        working-directory: repository/cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Verify live Kairos application
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          expected_entry="$(node -e 'const fs=require("fs");const root="repository/cloudflare/mmg-ios";const manifest=JSON.parse(fs.readFileSync(`${root}/production-baseline.json`,"utf8"));const x=fs.readFileSync(`${root}/${manifest.worker.entry}`,"utf8").match(/const BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          expected_autonomy="$(node -e 'const fs=require("fs");const x=fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-autonomy-runtime-v1.js","utf8").match(/KAIROS_AUTONOMY_BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          export EXPECTED_ENTRY="${expected_entry}" EXPECTED_AUTONOMY="${expected_autonomy}"
          for attempt in $(seq 1 36); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f health.json dashboard.html
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/center/content/website?deployment=${nonce}" \
              --output dashboard.html || true
            if node -e 'const fs=require("fs");let h={};try{h=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{};const x=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";const ok=["ready","ok","operational"].includes(String(h.status||"").toLowerCase())&&h.build===process.env.EXPECTED_ENTRY&&h.enhancedInference?.status==="operational"&&h.enhancedInference?.provider==="cloudflare-workers-ai"&&h.autonomy?.status==="operational"&&h.autonomy?.build===process.env.EXPECTED_AUTONOMY&&x.includes("id=\"kairos-hub\"")&&x.includes("scripts/command-hub.js")&&x.includes("scripts/website-stage-three-recovery.js");process.exit(ok?0:1)'; then
              echo "Kairos exact deployment builds are live on Cloudflare."
              exit 0
            fi
            sleep 5
          done
          echo "Kairos failed live verification." >&2
          exit 1

      - name: Verify enhanced intelligence and bounded autonomous operation
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          expected_autonomy="$(node -e 'const fs=require("fs");const x=fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-autonomy-runtime-v1.js","utf8").match(/KAIROS_AUTONOMY_BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          expected_native="$(node -e 'const fs=require("fs");const x=fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-native-task-execution-v1.js","utf8").match(/KAIROS_NATIVE_TASK_EXECUTION_BUILD\s*=\s*"([^"]+)"/);if(!x)process.exit(1);process.stdout.write(x[1])')"
          export EXPECTED_AUTONOMY="${expected_autonomy}" EXPECTED_NATIVE="${expected_native}"
          inference_code=""
          for attempt in $(seq 1 6); do
            inference_code="$(curl --silent --show-error --location --max-time 180 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/inference/health?deployment=${GITHUB_SHA}-${attempt}" \
              --output inference-health.json \
              --write-out '%{http_code}' || true)"
            if [ "${inference_code}" = "200" ]; then
              break
            fi
            ATTEMPT="${attempt}" HTTP_CODE="${inference_code}" node -e '
              const fs=require("fs");
              let body={};
              try{body=JSON.parse(fs.readFileSync("inference-health.json","utf8"))}catch{}
              console.error(JSON.stringify({
                attempt:Number(process.env.ATTEMPT),
                httpStatus:Number(process.env.HTTP_CODE||0),
                status:body.status||"unknown",
                mode:body.mode||null,
                provider:body.provider||null,
                model:body.model||null,
                error:body.error||null,
              }));
            '
            sleep 10
          done
          if [ "${inference_code}" != "200" ]; then
            echo "Kairos enhanced inference did not become ready after six probes." >&2
            exit 1
          fi
          stable_runtime_probes=0
          for attempt in $(seq 1 36); do
            runtime_code="$(curl --silent --show-error --location --max-time 60 \
              -H 'Cache-Control: no-cache' -H 'Connection: close' \
              "${KAIROS_PRODUCTION_URL}/api/autonomy/status?deployment=${GITHUB_SHA}-runtime-${attempt}-$(date +%s)" \
              --output autonomy-runtime-probe.json \
              --write-out '%{http_code}' || true)"
            if [ "${runtime_code}" = "200" ] && node -e '
              const fs=require("fs");
              let body={};
              try{body=JSON.parse(fs.readFileSync("autonomy-runtime-probe.json","utf8"))}catch{}
              const exact=body.status==="operational"&&body.build===process.env.EXPECTED_AUTONOMY&&body.nativeExecutionBuild===process.env.EXPECTED_NATIVE;
              process.exit(exact?0:1);
            '; then
              stable_runtime_probes=$((stable_runtime_probes + 1))
            else
              stable_runtime_probes=0
            fi
            if [ "${stable_runtime_probes}" -ge 4 ]; then
              break
            fi
            sleep 5
          done
          if [ "${stable_runtime_probes}" -lt 4 ]; then
            echo "Kairos exact autonomy and native-execution builds did not stabilize across four consecutive probes." >&2
            exit 1
          fi
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H 'Content-Type: application/json' -H 'Cache-Control: no-cache' -H 'X-Kairos-Autonomy-Dispatch: manual' \
            --data "{\"title\":\"Deployment native execution ${GITHUB_SHA}\",\"objective\":\"Prove that Kairos produces a grounded native analysis artifact and verifies durable read-back before task completion.\",\"center\":\"operations\",\"priority\":\"high\",\"source\":\"verified-production-deployment\",\"tasks\":[{\"title\":\"Observe authoritative deployment workflow\",\"description\":\"Read this durable workflow and produce a grounded internal deployment verification artifact.\",\"stage\":\"observe\",\"executionClass\":\"native-analysis\"}]}" \
            "${KAIROS_PRODUCTION_URL}/api/workflows" \
            --output native-validation-workflow.json
          workflow_id="$(node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync("native-validation-workflow.json","utf8")).workflow.id)')"
          curl --fail-with-body --silent --show-error --location --max-time 180 \
            -H 'Content-Type: application/json' -H 'Cache-Control: no-cache' \
            --data "{\"source\":\"deployment:${GITHUB_SHA}\",\"workflowID\":\"${workflow_id}\"}" \
            "${KAIROS_PRODUCTION_URL}/api/autonomy/run" \
            --output autonomy-cycle.json
          artifact_id="$(node -e 'const x=JSON.parse(require("fs").readFileSync("autonomy-cycle.json","utf8"));process.stdout.write(x.applied?.[0]?.artifactID||"")')"
          if [ -z "${artifact_id}" ]; then
            curl --silent --show-error --location --max-time 60 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/autonomy/decisions?deployment=${GITHUB_SHA}" \
              --output autonomy-decisions.json || true
            WORKFLOW_ID="${workflow_id}" node <<'NODE'
          const fs=require('fs');
          const cycle=JSON.parse(fs.readFileSync('autonomy-cycle.json','utf8'));
          let decisions={};
          try{decisions=JSON.parse(fs.readFileSync('autonomy-decisions.json','utf8'))}catch{}
          const decision=(decisions.decisions||[]).find(value=>value.cycleID===cycle.id&&value.workflowID===process.env.WORKFLOW_ID)||null;
          console.error(JSON.stringify({
            error:'native-validation-artifact-missing',
            expected:{autonomy:process.env.EXPECTED_AUTONOMY,nativeExecution:process.env.EXPECTED_NATIVE},
            cycle:{id:cycle.id,status:cycle.status,build:cycle.build,nativeExecutionBuild:cycle.nativeExecutionBuild,actionsApplied:cycle.actionsApplied,decisionsPreserved:cycle.decisionsPreserved,error:cycle.error||null},
            decision:decision?{id:decision.id,status:decision.status,action:decision.action,blockedReason:decision.blockedReason||null,classification:decision.classification||null}:null,
          },null,2));
          NODE
            exit 1
          fi
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/api/autonomy/artifacts/${artifact_id}?deployment=${GITHUB_SHA}" \
            --output native-validation-artifact.json
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/api/workflows/${workflow_id}?deployment=${GITHUB_SHA}" \
            --output native-validation-readback.json
          curl --fail-with-body --silent --show-error --location --max-time 60 \
            -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/api/autonomy/status?deployment=${GITHUB_SHA}" \
            --output autonomy-status.json
          node <<'NODE'
          const fs=require('fs');
          const inference=JSON.parse(fs.readFileSync('inference-health.json','utf8'));
          const requested=JSON.parse(fs.readFileSync('autonomy-cycle.json','utf8'));
          const autonomy=JSON.parse(fs.readFileSync('autonomy-status.json','utf8'));
          const artifact=JSON.parse(fs.readFileSync('native-validation-artifact.json','utf8')).artifact;
          const workflow=JSON.parse(fs.readFileSync('native-validation-readback.json','utf8')).workflow;
          const cycle=requested.status==='completed'?requested:autonomy.lastCycle;
          const task=workflow?.tasks?.[0];
          const checks={
            inferenceReady:inference.status==='ready'&&inference.reachable===true,
            accountScoped:inference.mode==='cloudflare-account-scoped'&&inference.provider==='cloudflare-workers-ai',
            qwenModel:inference.model==='@cf/qwen/qwen3-30b-a3b-fp8',
            privacy:inference.privacy==='customer-content-isolated-no-training',
            autonomyOperational:autonomy.status==='operational'&&autonomy.enabled===true,
            exactRuntimeBuilds:cycle?.build===process.env.EXPECTED_AUTONOMY&&cycle?.nativeExecutionBuild===process.env.EXPECTED_NATIVE&&autonomy?.build===process.env.EXPECTED_AUTONOMY&&autonomy?.nativeExecutionBuild===process.env.EXPECTED_NATIVE,
            cycleCompleted:cycle?.status==='completed',
            intelligentDecision:cycle?.inference?.mode==='cloudflare-account-scoped',
            nativeActionApplied:cycle?.actionsApplied===1&&cycle?.applied?.[0]?.artifactReadbackVerified===true&&cycle?.applied?.[0]?.atomicCommitVerified===true,
            artifactVerified:artifact?.status==='verified'&&typeof artifact?.contentHash==='string'&&artifact.contentHash.length===64&&artifact?.safeguards?.durableReadbackRequired===true,
            reasoningPrivate:artifact?.safeguards?.modelReasoningStored===false,
            workflowReadback:workflow?.state==='completed'&&task?.state==='completed'&&task?.nativeOutput?.artifactID===artifact?.id,
            noExternalEffect:artifact?.safeguards?.externalActionTaken===false&&cycle?.applied?.[0]?.externalActionTaken===false,
            boundedExternalEffects:cycle?.safeguards?.approvalRequired?.includes('external-publication')&&cycle?.safeguards?.prohibited?.includes('bypass-approval')
          };
          console.log(JSON.stringify({checks,inference:{status:inference.status,mode:inference.mode,provider:inference.provider,model:inference.model,privacy:inference.privacy},cycle:{id:cycle?.id,status:cycle?.status,actionsApplied:cycle?.actionsApplied,decisionsPreserved:cycle?.decisionsPreserved},artifact:{id:artifact?.id,status:artifact?.status,contentHash:artifact?.contentHash},workflow:{id:workflow?.id,state:workflow?.state,progress:workflow?.progress}},null,2));
          if(Object.values(checks).some(value=>value!==true))process.exit(1);
          NODE

      - name: Publish deployment receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Kairos Cloudflare deployment passed live verification"
          else
            state="failure"
            description="Kairos Cloudflare deployment failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-cloudflare-production",
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
