name: Repair Shopify Receipt Size Verification

on:
  push:
    paths:
      - '.github/workflows/patch-shopify-receipt-size.yml'

permissions:
  contents: write

concurrency:
  group: repair-shopify-receipt-size
  cancel-in-progress: true

jobs:
  repair-deploy-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply exact in-place repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js')
          text = path.read_text()
          old = 'if (hasReportedSize && (!Number.isFinite(actualBytes) || actualBytes !== expectedBytes)) {'
          new = 'if (!jobResult && hasReportedSize && (!Number.isFinite(actualBytes) || actualBytes !== expectedBytes)) {'
          old_count = text.count(old)
          new_count = text.count(new)
          if new_count == 1 and old_count == 0:
              print('Repair already present.')
          elif old_count == 1 and new_count == 0:
              path.write_text(text.replace(old, new, 1))
              print('Applied exact receipt-size repair.')
          else:
              raise SystemExit(f'Unsafe source state: old={old_count}, new={new_count}')
          PY
          git diff --check
          grep -F 'if (!jobResult && hasReportedSize && (!Number.isFinite(actualBytes) || actualBytes !== expectedBytes)) {' cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js

      - name: Commit repair to main
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Source already repaired.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js
            git commit -m 'Trust authoritative Shopify job result over receipt size'
            git push origin HEAD:main
          fi

      - name: Build-check Worker
        working-directory: cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-package-lock --no-audit --no-fund
          npx wrangler deploy --dry-run

      - name: Deploy repaired Worker to Cloudflare
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo 'CLOUDFLARE_API_TOKEN missing' >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo 'CLOUDFLARE_ACCOUNT_ID missing' >&2; exit 1; }
          npx wrangler deploy

      - name: Verify live Worker
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            nonce="receipt-repair-${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f health.json dashboard.html
            curl --fail --silent --show-error --location --max-time 30 \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json || true
            curl --fail --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/center/content/website?deployment=${nonce}" \
              --output dashboard.html || true
            if node -e 'const fs=require("fs");let h={};try{h=JSON.parse(fs.readFileSync("health.json","utf8"))}catch{};const x=fs.existsSync("dashboard.html")?fs.readFileSync("dashboard.html","utf8"):"";process.exit(["ready","ok","operational"].includes(String(h.status||"").toLowerCase())&&x.includes("kairos-hub")?0:1)'; then
              echo 'Cloudflare Worker is live and the Website Retool route loads.'
              exit 0
            fi
            sleep 5
          done
          echo 'Repaired Worker did not pass live verification.' >&2
          exit 1
