name: Patch Shopify Receipt Size Verification

on:
  push:
    paths:
      - '.github/workflows/patch-shopify-receipt-size.yml'

permissions:
  contents: write

jobs:
  patch-validate-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply exact Shopify verification patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js')
          text = path.read_text()
          old = '''      if (!Number.isFinite(actualBytes) || actualBytes !== expectedBytes) {
        throw httpError(502, "theme_file_write_operation_size_mismatch", "Shopify's successful write receipt reported an unexpected size for " + expected.filename + ".");
      }'''
          new = '''      if (!jobResult && (!Number.isFinite(actualBytes) || actualBytes !== expectedBytes)) {
        throw httpError(502, "theme_file_write_operation_size_mismatch", "Shopify's successful write receipt reported an unexpected size for " + expected.filename + ".");
      }'''
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one receipt-size condition, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
          git diff --check
          git diff -- cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js

      - name: Validate production source
        working-directory: cloudflare/mmg-ios
        run: |
          npm install --ignore-scripts --no-package-lock --no-audit --no-fund
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Commit exact patch to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add cloudflare/mmg-ios/src/kairos-compact-homepage-utils-v1.js
          git commit -m 'Trust authoritative Shopify job result over receipt size'
          git push origin HEAD:main

      - name: Deploy to Cloudflare
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          npx wrangler deploy

      - name: Verify live Worker
        env:
          KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            nonce="receipt-size-fix-${GITHUB_SHA}-${attempt}-$(date +%s)"
            if curl --fail --silent --show-error --location --max-time 30 \
              "${KAIROS_PRODUCTION_URL}/api/health?deployment=${nonce}" \
              --output health.json; then
              node -e 'const h=require("./health.json"); process.exit(["ready","ok","operational"].includes(String(h.status||"").toLowerCase())?0:1)' && exit 0
            fi
            sleep 5
          done
          exit 1
