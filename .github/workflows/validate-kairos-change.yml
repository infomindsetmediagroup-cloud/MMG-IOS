name: Validate Kairos Change

on:
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare/kairos/**'
      - 'cloudflare/mmg-ios/**'
      - 'cloudflare/mmg-ios-worker.js'
      - 'server/kairos/**'
      - 'backend-tests/**'
      - 'browser-tests/**'
      - 'playwright.config.mjs'
      - 'governance/kairos-shopify-operation-scope-v1.json'
      - 'governance/kairos-builder-plugin-registry-v1.json'
      - 'scripts/validate-kairos-shopify-policy.mjs'
      - 'scripts/validate-kairos-manuscript-activation.mjs'
      - 'docs/runbooks/kairos-cloudflare-native-shopify-runtime.md'
      - 'docs/runbooks/kairos-builder-plugin-operating-model.md'
      - 'package.json'
      - 'wrangler.toml'
      - 'web/kairos-dashboard/**'
      - '.github/workflows/validate-kairos-change.yml'
      - '.github/workflows/deploy-kairos-manuscript-runtime.yml'
  workflow_dispatch:

concurrency:
  group: validate-kairos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate Cloudflare runtime syntax
        run: |
          node --check cloudflare/mmg-ios-worker.js
          node --check cloudflare/kairos/shopify-doctrine.js
          node --check cloudflare/kairos/workflow-registry.js
          node --check cloudflare/kairos/scope-firewall.js
          node --check cloudflare/kairos/shopify-client.js
          node --check cloudflare/kairos/operation-registry.js
          node --check cloudflare/kairos/runtime.js
          node --check cloudflare/kairos/deterministic-planner.js
          node --check cloudflare/kairos/intelligence-runtime.js
          node --check cloudflare/kairos/intelligence-api.js
          node --check cloudflare/mmg-ios/src/kairos-manuscript-operation-boundary-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-manuscript-online-v1.js
          node --check web/kairos-dashboard/scripts/manuscript-project-setup.js
          node --check web/kairos-dashboard/scripts/manuscript-editorial-workbench.js
          node --check web/kairos-dashboard/scripts/kairos-local-inference.js
          node --check web/kairos-dashboard/scripts/manuscript-auto-pipeline.js
          node --check web/kairos-dashboard/scripts/publication-performance.js
          node --check scripts/validate-kairos-shopify-policy.mjs
          node --check scripts/validate-kairos-manuscript-activation.mjs

      - name: Test Kairos operation and intelligence boundaries
        run: npx vitest run backend-tests/kairos-scope-firewall.test.js backend-tests/kairos-manuscript-operation-boundary.test.js backend-tests/kairos-self-hosted-runtime.test.ts

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit > /dev/null

      - name: Test manuscript buttons in mobile WebKit
        id: webkit
        shell: bash
        run: |
          set +e
          npm run test:manuscript-ui > "${RUNNER_TEMP}/manuscript-webkit.log" 2>&1
          status=$?
          cp "${RUNNER_TEMP}/manuscript-webkit.log" manuscript-webkit.log
          if [ "${status}" -ne 0 ]; then
            echo "Mobile WebKit interaction failure:"
            tail -n 220 manuscript-webkit.log
            exit "${status}"
          fi
          tail -n 60 manuscript-webkit.log

      - name: Upload WebKit failure evidence
        if: ${{ failure() && steps.webkit.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-webkit-failure
          path: |
            manuscript-webkit.log
            test-results
          if-no-files-found: warn
          retention-days: 7

      - name: Validate Kairos Shopify policy
        if: ${{ always() }}
        run: npm run validate:kairos-shopify

      - name: Validate manuscript activation and builder plugins
        if: ${{ always() }}
        run: npm run validate:manuscript-activation

      - name: Validate Shopify governance
        if: ${{ always() }}
        run: npm run validate:shopify

      - name: Validate canonical service product
        if: ${{ always() }}
        run: npm run validate:service-product

      - name: Install active Worker dependencies
        if: ${{ always() }}
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate active Cloudflare manuscript bundle
        if: ${{ always() }}
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run
