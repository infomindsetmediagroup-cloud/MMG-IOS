name: Validate Kairos Change

on:
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare/mmg-ios/**'
      - 'server/kairos/**'
      - 'backend-tests/**'
      - 'web/kairos-dashboard/**'
      - '.github/workflows/validate-kairos-change.yml'
  workflow_dispatch:

concurrency:
  group: validate-kairos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cloudflare/mmg-ios/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate root contracts and tests
        run: npm run check

      - name: Install Kairos Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm ci

      - name: Run Kairos Worker tests
        working-directory: cloudflare/mmg-ios
        run: npm test

      - name: Validate production configuration
        working-directory: cloudflare/mmg-ios
        run: npm run validate:production

      - name: Validate deployment bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run
