name: Deploy Kairos Digital Asset V2

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/mmg-ios/src/kairos-production-entry-digital-asset-v2-v1.js'
      - 'cloudflare/mmg-ios/src/kairos-digital-asset-*.js'
      - 'cloudflare/mmg-ios/src/kairos-creation-artifacts-v1.js'
      - 'cloudflare/mmg-ios/wrangler.toml'
      - 'scripts/validate-kairos-manuscript-activation.mjs'
      - 'governance/mmg-digital-asset-edition-v2-contract-v1.json'
      - '.github/workflows/deploy-kairos-digital-asset-v2.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: deploy-kairos-digital-asset-v2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev

    steps:
      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"kairos-digital-asset-v2\",\"description\":\"Validating and deploying the V2 writing engine\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate V2 runtime syntax
        run: |
          node --check cloudflare/mmg-ios/src/kairos-digital-asset-edition-v2-contract-v1.js
          node --check cloudflare/mmg-ios/src/kairos-digital-asset-v2-manuscript-writer-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-digital-asset-v2-v1.js
          node --check cloudflare/mmg-ios/src/kairos-creation-artifacts-v1.js
          node scripts/validate-kairos-manuscript-activation.mjs

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy V2 Worker
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify V2 runtime headers
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            headers="${RUNNER_TEMP}/headers.txt"
            body="${RUNNER_TEMP}/status.json"
            status="$(curl --silent --show-error --max-time 20 \
              -D "${headers}" \
              "${WORKER_URL}/api/kairos/manuscripts/status?attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -qi '^x-kairos-digital-asset-edition: V2' "${headers}" \
              && grep -qi '^x-kairos-digital-asset-writer: kairos-digital-asset-v2-writer-' "${headers}" \
              && grep -q '"ready":true' "${body}"; then
              cat "${body}"
              exit 0
            fi
            sleep 5
          done
          cat "${headers}" || true
          cat "${body}" || true
          exit 1

      - name: Report deployment success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"kairos-digital-asset-v2\",\"description\":\"V2 writing engine deployed and verified\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Report deployment failure
        if: ${{ failure() || cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"failure\",\"context\":\"kairos-digital-asset-v2\",\"description\":\"V2 writing engine deployment failed\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
