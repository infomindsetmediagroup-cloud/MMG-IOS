name: Publish Free Creator Toolkit Page Shell

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-free-creator-toolkit-shell.yml"
      - "cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "cloudflare/mmg-ios/package.json"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: publish-free-creator-toolkit-page-shell
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      PAGE_SHELL_BUILD: kairos-page-shell-publisher-20260719-1
      STATUS_CONTEXT: mmg-free-creator-toolkit-shell
    steps:
      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:process.env.STATUS_CONTEXT,description:"Deploying Free Creator Toolkit page shell",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

      - name: Materialize exact release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -f cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          test -f cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q 'kairos-page-shell-publisher-v1.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${PAGE_SHELL_BUILD}" cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install --no-audit --no-fund
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for exact Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 \
              -D "${headers}" \
              "${WORKER_BASE_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${body}" \
              && grep -qi "x-mmg-page-shell: ${PAGE_SHELL_BUILD}" "${headers}"; then
              exit 0
            fi
            sleep 4
          done
          cat "${RUNNER_TEMP}/identity.json" || true
          cat "${RUNNER_TEMP}/identity.headers" || true
          exit 1

      - name: Publish page shell to Shopify MAIN theme
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/page-shell-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/page-shell/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_PAGE_SHELL_RECONCILIATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}" || true
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q "\"build\":\"${PAGE_SHELL_BUILD}\"" "${result}"
          grep -q '"exactThemeFileReadBack":true' "${result}"
          grep -q '"layoutInjectionPresent":true' "${result}"

      - name: Verify live page-shell assets
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            html="${RUNNER_TEMP}/toolkit-${attempt}.html"
            status="$(curl --location --silent --show-error --max-time 45 \
              -H 'User-Agent: Mozilla/5.0 (MMG page-shell verifier)' \
              -H 'Cache-Control: no-cache, no-store, must-revalidate' \
              "${STOREFRONT_URL}/pages/free-creator-toolkit?mmg_shell=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${html}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q 'MMG_PAGE_SHELL_START' "${html}" \
              && grep -q 'mmg-page-shell.js' "${html}" \
              && grep -q 'mmg-page-shell.css' "${html}"; then
              js_src="$(grep -oE 'src="[^"]*mmg-page-shell\.js[^"]*"' "${html}" | head -n1 | sed 's/^src="//;s/"$//;s/&amp;/\&/g')"
              case "${js_src}" in
                //*) js_url="https:${js_src}" ;;
                /*) js_url="${STOREFRONT_URL}${js_src}" ;;
                http*) js_url="${js_src}" ;;
                *) js_url="" ;;
              esac
              if [ -n "${js_url}" ]; then
                curl --fail --silent --show-error --max-time 45 -H 'Cache-Control: no-cache' "${js_url}" -o "${RUNNER_TEMP}/mmg-page-shell.js"
                node --check "${RUNNER_TEMP}/mmg-page-shell.js"
                grep -q "${PAGE_SHELL_BUILD}" "${RUNNER_TEMP}/mmg-page-shell.js"
                grep -q 'heroTitle' "${RUNNER_TEMP}/mmg-page-shell.js"
                grep -q 'mmgPageShellReady' "${RUNNER_TEMP}/mmg-page-shell.js"
                exit 0
              fi
            fi
            sleep 5
          done
          exit 1

      - name: Report deployment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Free Creator Toolkit page shell is live"
          else
            state="failure"
            description="Free Creator Toolkit page-shell deployment failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.STATUS_CONTEXT,description:process.env.DESCRIPTION,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
