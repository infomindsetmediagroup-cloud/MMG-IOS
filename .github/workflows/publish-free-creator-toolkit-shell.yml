name: Publish Free Creator Toolkit Page Shell

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-free-creator-toolkit-shell.yml"
      - "cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "cloudflare/mmg-ios/package.json"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: publish-free-creator-toolkit-page-shell
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STOREFRONT_URL: https://themindsetmediagroup.com
      PAGE_SHELL_BUILD: kairos-page-shell-publisher-20260719-1
      STATUS_CONTEXT: mmg-free-creator-toolkit-shell
    steps:
      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:process.env.STATUS_CONTEXT,description:"Publishing and browser-verifying Free Creator Toolkit",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

      - name: Materialize exact release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${RUNNER_TEMP}/mmg-release"
          cd "${RUNNER_TEMP}/mmg-release"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q "${PAGE_SHELL_BUILD}" cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js

      - name: Deploy Kairos Worker
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/mmg-release/cloudflare/mmg-ios"
          npm install --no-audit --no-fund
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for exact Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 \
              -D "${headers}" \
              "${WORKER_BASE_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${body}" \
              && grep -qi "x-mmg-page-shell: ${PAGE_SHELL_BUILD}" "${headers}"; then
              exit 0
            fi
            sleep 4
          done
          exit 1

      - name: Publish page shell to Shopify MAIN theme
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/page-shell-result.json"
          status="$(curl --silent --show-error --retry 3 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/page-shell/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_PAGE_SHELL_RECONCILIATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}"
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q "\"build\":\"${PAGE_SHELL_BUILD}\"" "${result}"
          grep -q '"exactThemeFileReadBack":true' "${result}"
          grep -q '"layoutInjectionPresent":true' "${result}"

      - name: Install Playwright
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/toolkit-browser"
          cd "${RUNNER_TEMP}/toolkit-browser"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Inspect live desktop and mobile DOM
        id: inspect
        continue-on-error: true
        run: |
          cd "${RUNNER_TEMP}/toolkit-browser"
          cat > verify.mjs <<'JS'
          import fs from "node:fs";
          import { chromium } from "playwright";

          const results = [];
          const browser = await chromium.launch({ headless: true });
          try {
            for (const viewport of [
              { name: "desktop", width: 1440, height: 1000 },
              { name: "mobile", width: 390, height: 844 },
            ]) {
              const context = await browser.newContext({ viewport });
              const page = await context.newPage();
              const response = await page.goto(`${process.env.STOREFRONT_URL}/pages/free-creator-toolkit?live_verify=${Date.now()}-${viewport.name}`, {
                waitUntil: "domcontentloaded",
                timeout: 60000,
              });
              let waitError = "";
              try {
                await page.waitForFunction((build) => document.documentElement.dataset.mmgPageShell === build, process.env.PAGE_SHELL_BUILD, { timeout: 30000 });
                await page.waitForFunction(() => document.documentElement.dataset.mmgPageShellReady === "true", { timeout: 30000 });
              } catch (error) {
                waitError = error instanceof Error ? error.message : String(error);
              }
              await page.waitForTimeout(1000);
              const visibleH1 = (await page.locator("main h1:visible").allTextContents()).map((value) => value.replace(/\s+/g, " ").trim());
              const titleHidden = await page.locator("main .mmg-native-page-title-hidden").count();
              const miniNavigationHidden = await page.locator("main .mmg-page-mini-navigation-hidden").count();
              const build = await page.locator("html").getAttribute("data-mmg-page-shell");
              const ready = await page.locator("html").getAttribute("data-mmg-page-shell-ready");
              const overflow = await page.evaluate(() => ({
                viewport: document.documentElement.clientWidth,
                document: document.documentElement.scrollWidth,
                body: document.body.scrollWidth,
              }));
              const passed = Boolean(response?.ok()) &&
                build === process.env.PAGE_SHELL_BUILD &&
                ready === "true" &&
                visibleH1.length === 1 &&
                visibleH1[0] === "The Free Creator Toolkit." &&
                titleHidden === 1 &&
                miniNavigationHidden === 1 &&
                Math.max(overflow.document, overflow.body) <= overflow.viewport + 2;
              results.push({ viewport: viewport.name, http: response?.status() || 0, build, ready, visibleH1, titleHidden, miniNavigationHidden, overflow, waitError, passed });
              await page.screenshot({ path: `free-creator-toolkit-${viewport.name}.png`, fullPage: true });
              await context.close();
            }
          } finally {
            await browser.close();
          }
          const passed = results.every((item) => item.passed);
          fs.writeFileSync("toolkit-dom-result.json", JSON.stringify({ passed, results }, null, 2));
          console.log(JSON.stringify({ passed, results }, null, 2));
          if (!passed) process.exitCode = 1;
          JS
          node verify.mjs

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-creator-toolkit-live-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/toolkit-browser/toolkit-dom-result.json
            ${{ runner.temp }}/toolkit-browser/free-creator-toolkit-*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Report deployment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/toolkit-browser" 2>/dev/null || true
          node <<'NODE' > /tmp/toolkit-status.json
          const fs = require("node:fs");
          let result = { passed: false, results: [] };
          try { result = JSON.parse(fs.readFileSync("toolkit-dom-result.json", "utf8")); } catch {}
          const desktop = result.results.find((item) => item.viewport === "desktop") || {};
          const mobile = result.results.find((item) => item.viewport === "mobile") || {};
          const description = result.passed
            ? "Toolkit fixed: one H1 and legacy mini-nav removed"
            : `FAIL d:H1=${(desktop.visibleH1 || []).length},title=${desktop.titleHidden || 0},nav=${desktop.miniNavigationHidden || 0}; m:H1=${(mobile.visibleH1 || []).length},title=${mobile.titleHidden || 0},nav=${mobile.miniNavigationHidden || 0}`;
          process.stdout.write(JSON.stringify({
            state: result.passed ? "success" : "failure",
            context: process.env.STATUS_CONTEXT,
            description: description.slice(0, 140),
            target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          }));
          NODE
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data @/tmp/toolkit-status.json
          node -e 'const r=require("./toolkit-dom-result.json"); if(!r.passed) process.exit(1)'
