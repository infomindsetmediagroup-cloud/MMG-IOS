name: Publish Native Navigation and Landings

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/src/kairos-native-navigation-publisher-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-ecosystem-navigation-source-20260718.js"
      - "cloudflare/mmg-ios/src/kairos-*-landing-*.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js"
      - ".github/workflows/publish-native-navigation-and-landings.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: native-navigation-and-landings-production
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      STATUS_CONTEXT: kairos-native-navigation-production

    steps:
      - uses: actions/checkout@v4

      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",description:"Publishing cleaned native navigation and landing pages",context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Deploy Worker
        working-directory: cloudflare/mmg-ios
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          npx wrangler deploy --dry-run
          npx wrangler deploy

      - name: Verify exact deployed release
        run: |
          set -euo pipefail
          expected="$(node -e '
            const fs = require("node:fs");
            const source = fs.readFileSync("cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js", "utf8");
            const match = source.match(/const BUILD = "([^"]+)"/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ')"
          for attempt in $(seq 1 36); do
            observed="$(curl -fsSI "${KAIROS_URL}/api/health?navigation_release=${GITHUB_SHA}&attempt=${attempt}" | awk 'BEGIN{IGNORECASE=1} /^x-mmg-production-entry:/ {gsub(/\r/,""); sub(/^[^:]+:[[:space:]]*/,""); print; exit}')"
            if [ "${observed}" = "${expected}" ]; then
              echo "Verified Worker release: ${observed}"
              exit 0
            fi
            echo "Release gate ${attempt}/36: expected ${expected}; observed ${observed:-none}."
            sleep 5
          done
          echo "::error::Exact Worker release did not become available."
          exit 1

      - name: Publish ecosystem landing pages
        shell: bash
        run: |
          set -euo pipefail
          publish() {
            local path="$1"
            local staging="$2"
            local live="$3"
            curl --fail-with-body --silent --show-error --max-time 240 -X POST -H 'Content-Type: application/json' "${KAIROS_URL}${path}" --data "{\"confirmation\":\"${staging}\",\"mode\":\"build\",\"sourceCommit\":\"${GITHUB_SHA}\"}" > /tmp/staging.json
            node -e 'const b=require("/tmp/staging.json"); if(b.status!=="completed") { console.error(JSON.stringify(b)); process.exit(1); }'
            curl --fail-with-body --silent --show-error --max-time 240 -X POST -H 'Content-Type: application/json' "${KAIROS_URL}${path}" --data "{\"confirmation\":\"${live}\",\"mode\":\"publish\",\"sourceCommit\":\"${GITHUB_SHA}\"}" > /tmp/live.json
            node -e 'const b=require("/tmp/live.json"); if(b.status!=="completed") { console.error(JSON.stringify(b)); process.exit(1); }'
          }
          publish '/api/shopify/staging/knowledge-landing/build' 'BUILD_CANONICAL_MMG_KNOWLEDGE_STAGING' 'PUBLISH_CANONICAL_MMG_KNOWLEDGE_LIVE'
          publish '/api/shopify/staging/products-landing/build' 'BUILD_CANONICAL_MMG_PRODUCTS_STAGING' 'PUBLISH_CANONICAL_MMG_PRODUCTS_LIVE'
          publish '/api/shopify/staging/services-landing/build' 'BUILD_CANONICAL_MMG_SERVICES_STAGING' 'PUBLISH_CANONICAL_MMG_SERVICES_LIVE'
          publish '/api/shopify/staging/membership-landing/build' 'BUILD_CANONICAL_MMG_MEMBERSHIP_STAGING' 'PUBLISH_CANONICAL_MMG_MEMBERSHIP_LIVE'
          publish '/api/shopify/staging/kairos-landing/build' 'BUILD_CANONICAL_MMG_KAIROS_STAGING' 'PUBLISH_CANONICAL_MMG_KAIROS_LIVE'
          publish '/api/shopify/staging/customer-portal-landing/build' 'BUILD_CANONICAL_MMG_CUSTOMER_PORTAL_STAGING' 'PUBLISH_CANONICAL_MMG_CUSTOMER_PORTAL_LIVE'

      - name: Publish and verify Shopify native main navigation
        run: |
          set -euo pipefail
          expected_nav="$(node -e '
            const fs = require("node:fs");
            const source = fs.readFileSync("cloudflare/mmg-ios/src/kairos-native-navigation-publisher-20260718.js", "utf8");
            const match = source.match(/KAIROS_NATIVE_NAVIGATION_BUILD = "([^"]+)"/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ')"
          curl --fail-with-body --silent --show-error --max-time 240 \
            -X POST -H 'Content-Type: application/json' \
            "${KAIROS_URL}/api/shopify/navigation/publish" \
            --data '{"confirmation":"PUBLISH_MMG_NATIVE_MAIN_NAVIGATION"}' \
            --output /tmp/navigation.json
          EXPECTED_NAV="${expected_nav}" node -e '
            const b=require("/tmp/navigation.json");
            const ok = b.status === "completed"
              && b.build === process.env.EXPECTED_NAV
              && b.safeguards?.nativeShopifyMenuOnly === true
              && b.safeguards?.duplicateDestinationsRemoved === true
              && b.safeguards?.equivalentDestinationsMerged === true;
            if (!ok) { console.error(JSON.stringify(b)); process.exit(1); }
            console.log(JSON.stringify({status:b.status,build:b.build,navigation:b.navigation,cleanup:b.cleanup,pages:b.pages},null,2));
          '

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Native navigation cleaned, merged, published, and verified"
          else
            state="failure"
            description="Native navigation publication failed; inspect workflow"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
