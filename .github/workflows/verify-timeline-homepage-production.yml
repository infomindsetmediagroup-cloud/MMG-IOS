name: Verify Timeline and Homepage Production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-timeline-homepage-production.yml"
      - "cloudflare/mmg-ios/src/kairos-homepage-preserve-planner-v1.js"
      - "cloudflare/mmg-ios/src/kairos-rendered-homepage-text-planner-v1.js"
      - "cloudflare/mmg-ios/src/kairos-homepage-template-text-executor-v1.js"
      - "cloudflare/mmg-ios/src/kairos-homepage-liquid-text-fallback-v1.js"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v42.js"
      - "cloudflare/mmg-ios/production-baseline.json"
      - "cloudflare/mmg-ios/scripts/validate-frozen-production-standard.mjs"
      - "cloudflare/mmg-ios/wrangler.toml"
      - "web/kairos-dashboard/index.html"
      - "web/kairos-dashboard/scripts/homepage-quick-action.js"
      - "web/kairos-dashboard/scripts/workflow-runtime.js"
      - "web/kairos-dashboard/scripts/workspace-runtime.js"
      - "web/kairos-dashboard/styles/homepage-quick-action.css"
      - "web/kairos-dashboard/styles/workflow-runtime.css"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-timeline-homepage-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Verify live v42 health and dashboard assets
        shell: bash
        run: |
          set -euo pipefail
          nonce="${GITHUB_SHA}-$(date +%s)"
          for attempt in $(seq 1 20); do
            curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
              "${KAIROS_PRODUCTION_URL}/api/health?timeline-homepage=${nonce}-${attempt}" --output health.json || true
            if node -e "const fs=require('fs');try{const h=JSON.parse(fs.readFileSync('health.json','utf8'));process.exit(h.build==='kairos-production-entry-20260716-99'?0:1)}catch{process.exit(1)}"; then
              break
            fi
            if [ "${attempt}" = "20" ]; then
              echo "v42 did not become live within the verification window"
              cat health.json || true
              exit 1
            fi
            sleep 6
          done
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/center/content/website?timeline-homepage=${nonce}" --output website.html
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/scripts/homepage-quick-action.js?v=${nonce}" --output homepage-quick.js
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/scripts/workflow-runtime.js?v=${nonce}" --output workflow-runtime.js
          curl --fail --silent --show-error --location --max-time 45 -H 'Cache-Control: no-cache' \
            "${KAIROS_PRODUCTION_URL}/scripts/workspace-runtime.js?v=${nonce}" --output workspace-runtime.js
          node <<'NODE'
          const fs=require('fs');
          const health=JSON.parse(fs.readFileSync('health.json','utf8'));
          const website=fs.readFileSync('website.html','utf8');
          const quick=fs.readFileSync('homepage-quick.js','utf8');
          const work=fs.readFileSync('workflow-runtime.js','utf8');
          const workspace=fs.readFileSync('workspace-runtime.js','utf8');
          const preserve=health.homepagePreserveDesign||{};
          const sourceOrder=Array.isArray(preserve.sourceOrder)?preserve.sourceOrder:[];
          const checks={
            productionBuild:health.build==='kairos-production-entry-20260716-99',
            preserveRuntime:preserve.status==='operational',
            preserveContract:preserve.contract==='published-main-template-settings-then-node-preserving-liquid-text',
            preserveSource:preserve.sourceOfTruth==='published-main-theme',
            templateSettingsFirst:sourceOrder[0]==='active rendered template settings',
            liquidFallbackSecond:sourceOrder[1]==='homepage-specific literal Liquid text',
            liquidFallbackBuild:preserve.liquidFallbackBuild==='kairos-homepage-liquid-text-fallback-20260716-1',
            liquidFallbackMode:preserve.liquidFallback==='literal-text-nodes-only',
            liquidMarkupBlocked:preserve.liquidMarkupMutation==='prohibited',
            designMutationBlocked:preserve.CSSAssetClassDesignTokenMutation==='prohibited',
            canonicalFallbackBlocked:preserve.canonicalPackageInstallation==='prohibited-in-preserve-mode',
            oneButtonCapability:health.capabilities?.oneButtonHomepagePreview==='operational',
            liquidCapability:health.capabilities?.homepageLiquidLiteralTextFallback==='operational',
            visibleDeltaCapability:health.capabilities?.homepageVisibleTextDelta==='required',
            rebuildFallbackCapability:health.capabilities?.homepageCanonicalRebuildFallback==='prohibited',
            timelineCapability:health.capabilities?.completedWorkTimelineArchive==='operational',
            commandCenterBuild:website.includes('kairos-command-center-operational-20260716-18'),
            quickScriptBound:website.includes('/scripts/homepage-quick-action.js?v=operational-20260716-3'),
            quickStyleBound:website.includes('/styles/homepage-quick-action.css?v=operational-20260716-1'),
            quickAction:quick.includes('Keep my homepage. Change the words.')&&quick.includes('preserve-published-framework')&&quick.includes('published-main-template-text-settings-v1')&&quick.includes('published-main-liquid-visible-text-v1')&&quick.includes('literalLiquidTextFallbackAuthorized: true')&&quick.includes('/api/shopify/staging/visual-verification'),
            quickActionSafeBoundaries:quick.includes('canonicalPackageAuthorized: false')&&quick.includes('liquidStructureMutationAuthorized: false')&&quick.includes('assetMutationAuthorized: false'),
            stateMigration:quick.includes('kairos.homepage.quick-action.v4')&&quick.includes('kairos.homepage.quick-action.v3'),
            workTimeline:work.includes('Work Timeline')&&work.includes('Completed Timeline')&&work.includes('Recent days')&&work.includes('Previous weeks')&&work.includes('Earlier months'),
            completedExcluded:work.includes('!["completed","cancelled"].includes(item.state)'),
            clickableArchive:work.includes('data-open-workflow')&&work.includes('Open verified deliverable'),
            lazyRuntime:workspace.includes('kairos-workspace-runtime-20260716-3')&&workspace.includes('workflow-runtime.js'),
          };
          console.log(JSON.stringify({build:health.build,preserve,checks},null,2));
          if(Object.values(checks).some(value=>value!==true))process.exit(1);
          NODE

      - name: Verify dual-source planner routing without Shopify mutation
        shell: bash
        run: |
          set -euo pipefail
          http_code="$(curl --silent --show-error --location --max-time 45 \
            -D planner-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data '{"objective":"x","requestType":"homepage-preserve-design","homepageMode":"preserve-published-framework","sourceOfTruth":"published-main-theme","preserveExistingDesign":true,"preservePublishedFramework":true,"templateTextPreferred":true,"literalLiquidTextFallbackAuthorized":true,"canonicalPackageAuthorized":false}' \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output planner-body.json \
            --write-out '%{http_code}')"
          HTTP_CODE="${http_code}" node <<'NODE'
          const fs=require('fs');
          const body=JSON.parse(fs.readFileSync('planner-body.json','utf8'));
          const headers=fs.readFileSync('planner-headers.txt','utf8');
          const checks={
            safeValidation:Number(process.env.HTTP_CODE)===400,
            objectiveGuard:body?.error?.code==='objective_required',
            productionHeader:/x-kairos-production-entry:\s*kairos-production-entry-20260716-99/i.test(headers),
            preserveModeHeader:/x-kairos-homepage-mode:\s*preserve-published-framework/i.test(headers),
            publishedSourceHeader:/x-kairos-homepage-source:\s*published-main-theme/i.test(headers),
            liquidFallbackHeader:/x-kairos-homepage-liquid-fallback:\s*kairos-homepage-liquid-text-fallback-20260716-1/i.test(headers),
            fallbackBlockedHeader:/x-kairos-canonical-rebuild-fallback:\s*prohibited/i.test(headers),
          };
          console.log(JSON.stringify({httpStatus:Number(process.env.HTTP_CODE),body,checks},null,2));
          if(Object.values(checks).some(value=>value!==true))process.exit(1);
          NODE

      - name: Publish production verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="v42 template and Liquid homepage text checks passed"
          else
            state="failure"
            description="v42 homepage text or timeline verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-timeline-homepage-production",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
