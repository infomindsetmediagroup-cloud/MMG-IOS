name: Verify Kairos Command Center Recovery

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/verify-child-action-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-command-center-recovery
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - name: Check out canonical source
        uses: actions/checkout@v4

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate recovery Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy self-contained Command Center
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Wait for exact self-contained shell
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f headers.txt dashboard.html
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${APP_URL}?recovery=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/ ,"");sub(/^[^:]+:[[:space:]]*/,"");print}' headers.txt | tail -1)"

            if [ "${code}" = "200" ] \
              && [ "${route}" = "direct-assets-root-shell" ] \
              && [[ "${type}" == text/html* ]] \
              && grep -q 'kairos-command-center-inline-20260717-1' dashboard.html \
              && grep -q 'id="kairos-hub"' dashboard.html \
              && grep -q 'Website Retool' dashboard.html \
              && grep -q 'website-objective' dashboard.html; then
              echo "Exact self-contained Command Center shell is live."
              break
            fi

            if [ "${attempt}" = "48" ]; then
              echo "The self-contained Command Center shell did not become live." >&2
              printf 'http=%s route=%s type=%s\n' "${code:-}" "${route:-}" "${type:-}" >&2
              head -c 1600 dashboard.html >&2 || true
              exit 1
            fi
            sleep 5
          done

      - name: Install mobile browser harness
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Prove app opens and Website Retool accepts input
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              isMobile: true,
              hasTouch: true,
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Mobile/15E148',
            });
            const page = await context.newPage();
            const consoleErrors = [];
            const pageErrors = [];
            const failedRequests = [];

            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
            page.on('requestfailed', request => failedRequests.push({
              url: request.url(),
              error: request.failure()?.errorText || 'failed',
            }));

            const response = await page.goto(`${process.env.APP_URL}?browser-proof=${Date.now()}`, {
              waitUntil: 'domcontentloaded',
              timeout: 60000,
            });

            await page.waitForSelector('html[data-kairos-boot="ready"]', { timeout: 15000 });
            await page.waitForSelector('#website-objective', { state: 'visible', timeout: 15000 });

            const objective = 'Verify the functioning Website Retool input without submitting a Shopify mutation.';
            await page.fill('#website-objective', objective);

            const inputValue = await page.inputValue('#website-objective');
            const planningButton = page.locator('[data-website-plan]');
            const buttonVisible = await planningButton.isVisible();
            const buttonEnabled = await planningButton.isEnabled();
            const hubText = await page.locator('#kairos-hub').innerText();
            const build = await page.locator('#kairos-hub').getAttribute('data-self-contained-build');
            const header = page.locator('.app-header-image');
            const headerBox = await header.boundingBox();
            const bodyFont = await page.evaluate(() => getComputedStyle(document.body).fontFamily);

            const receipt = {
              httpStatus: response?.status() || 0,
              title: await page.title(),
              loadingScreenPresent: hubText.includes('Loading Kairos Command Center'),
              build,
              objectiveValue: inputValue,
              buttonVisible,
              buttonEnabled,
              headerWidth: headerBox?.width || 0,
              headerHeight: headerBox?.height || 0,
              bodyFont,
              consoleErrors,
              pageErrors,
              failedRequests: failedRequests.slice(0, 20),
            };

            console.log(`KAIROS_COMMAND_CENTER_BROWSER_RECEIPT=${JSON.stringify(receipt)}`);
            await page.screenshot({ path: 'kairos-command-center-recovery.png', fullPage: true });
            await browser.close();

            const passed = response?.ok()
              && receipt.loadingScreenPresent === false
              && build === 'kairos-command-center-inline-20260717-1'
              && inputValue === objective
              && buttonVisible
              && buttonEnabled
              && receipt.headerWidth > 0
              && receipt.headerWidth <= 390
              && receipt.headerHeight > 0
              && receipt.headerHeight <= 180
              && !/Times New Roman|serif/i.test(bodyFont || '')
              && pageErrors.length === 0;

            if (!passed) process.exit(1);
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload rendered mobile proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-command-center-mobile-proof
          path: kairos-command-center-recovery.png
          if-no-files-found: ignore

      - name: Publish Command Center recovery receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Command Center opened and Website Retool accepted input"
          else
            state="failure"
            description="Command Center mobile browser proof failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e '
            process.stdout.write(JSON.stringify({
              state: process.env.STATE,
              description: process.env.DESCRIPTION,
              context: "kairos-command-center-recovery",
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }));
          ')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
