name: Verify Kairos Command Center Recovery

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"
      - ".github/workflows/verify-child-action-production.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-command-center-recovery
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
    steps:
      - name: Check out canonical source
        uses: actions/checkout@v4

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate recovery Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy self-contained Command Center
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required." >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required." >&2; exit 1; }
          npx wrangler deploy

      - name: Fetch exact live self-contained shell
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f headers.txt dashboard.html
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${APP_URL}?recovery=${nonce}" \
              --output dashboard.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/,"");sub(/^[^:]+:[[:space:]]*/,"");print}' headers.txt | tail -1)"

            if [ "${code}" = "200" ] \
              && [ "${route}" = "direct-assets-root-shell" ] \
              && [[ "${type}" == text/html* ]] \
              && grep -q 'kairos-command-center-inline-20260717-1' dashboard.html \
              && grep -q 'id="kairos-hub"' dashboard.html \
              && grep -q 'id="website-objective"' dashboard.html \
              && grep -q 'data-website-plan' dashboard.html; then
              echo "Exact self-contained Command Center shell is live."
              exit 0
            fi

            if [ "${attempt}" = "48" ]; then
              echo "The exact self-contained Command Center shell did not become live." >&2
              printf 'http=%s route=%s type=%s\n' "${code:-}" "${route:-}" "${type:-}" >&2
              head -c 1600 dashboard.html >&2 || true
              exit 1
            fi
            sleep 5
          done

      - name: Install deterministic DOM harness
        run: npm install jsdom@26.1.0 --no-audit --no-fund --no-save

      - name: Execute live app and verify Website input
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const { JSDOM, VirtualConsole } = require('jsdom');

          const html = fs.readFileSync('dashboard.html', 'utf8');
          const errors = [];
          const virtualConsole = new VirtualConsole();
          virtualConsole.on('jsdomError', error => errors.push(String(error?.message || error)));
          virtualConsole.on('error', message => errors.push(String(message)));

          const dom = new JSDOM(html, {
            url: process.env.APP_URL,
            runScripts: 'dangerously',
            pretendToBeVisual: true,
            virtualConsole,
          });

          setTimeout(() => {
            const { document } = dom.window;
            const hub = document.querySelector('#kairos-hub');
            const objective = document.querySelector('#website-objective');
            const button = document.querySelector('[data-website-plan]');
            const testValue = 'Verify the functioning Website Retool input without submitting a Shopify mutation.';
            if (objective) {
              objective.value = testValue;
              objective.dispatchEvent(new dom.window.Event('input', { bubbles: true }));
            }

            const receipt = {
              status: 'completed',
              boot: document.documentElement.dataset.kairosBoot || null,
              build: hub?.dataset?.selfContainedBuild || null,
              loadingScreenPresent: Boolean(hub?.textContent?.includes('Loading Kairos Command Center')),
              commandViewPresent: Boolean(document.querySelector('#command-view')),
              websiteRetoolPresent: Boolean(hub?.textContent?.includes('Website Retool')),
              objectivePresent: Boolean(objective),
              objectiveValue: objective?.value || null,
              planningButtonPresent: Boolean(button),
              planningButtonEnabled: Boolean(button && !button.disabled),
              errors,
            };
            fs.writeFileSync('command-center-recovery-receipt.json', JSON.stringify(receipt, null, 2));
            console.log(`KAIROS_COMMAND_CENTER_RECOVERY_RECEIPT=${JSON.stringify(receipt)}`);

            const passed = receipt.boot === 'ready'
              && receipt.build === 'kairos-command-center-inline-20260717-1'
              && receipt.loadingScreenPresent === false
              && receipt.commandViewPresent
              && receipt.websiteRetoolPresent
              && receipt.objectivePresent
              && receipt.objectiveValue === testValue
              && receipt.planningButtonPresent
              && receipt.planningButtonEnabled;

            dom.window.close();
            process.exit(passed ? 0 : 1);
          }, 250);
          NODE

      - name: Upload recovery receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-command-center-recovery-receipt
          path: command-center-recovery-receipt.json
          if-no-files-found: ignore

      - name: Publish Command Center recovery status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Command Center opened and Website Retool accepted input"
          else
            state="failure"
            description="Command Center recovery DOM proof failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-command-center-recovery",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
