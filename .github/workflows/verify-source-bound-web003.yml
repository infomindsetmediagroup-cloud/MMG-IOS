name: Verify Source-Bound WEB-003

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-source-bound-web003.yml"
      - "cloudflare/mmg-ios/src/kairos-production-entry-v44.js"
      - "cloudflare/mmg-ios/src/kairos-web003-source-bound-composite-runtime-v1.js"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: kairos-source-bound-web003
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      KAIROS_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Prove combined request contains visible copy changes
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --location --max-time 300 \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data @- \
            "${KAIROS_URL}/api/shopify/staging/plan/jobs?source-bound=${GITHUB_SHA}-$(date +%s)" \
            --output source-bound-plan.json <<'JSON'
          {
            "objective": "Rewrite the existing published Mindset Media Group homepage customer-facing copy so visitors immediately understand the knowledge, publishing, creator education, and digital-product ecosystem. Preserve the existing homepage structure and design. Also prepare bounded native Shopify header and footer color options for explicit staging approval. Do not publish anything live.",
            "requestType": "full-retool",
            "intent": "full-retool",
            "fullRetoolConfirmed": true,
            "structuralMutationAuthorized": true,
            "styleMutationAuthorized": true,
            "contentOnlyLocked": false
          }
          JSON
          node <<'NODE'
          const fs = require('fs');
          const body = JSON.parse(fs.readFileSync('source-bound-plan.json', 'utf8'));
          const result = body.result || {};
          const plan = result.plan || {};
          const changes = Array.isArray(plan.changes)
            ? plan.changes.filter(change => !['no-change', 'native-theme-exception-candidate'].includes(change?.changeType))
            : [];
          const checks = {
            completed: body.status === 'completed',
            sourceBoundComposite: plan.sourceBoundCopyComposite === true,
            visibleCopyChanges: changes.length > 0,
            visibleTextEvidence: Number(result?.evidence?.visibleTextChangeCount || 0) > 0,
            canonicalPackageExcluded: plan.canonicalPackage === null,
            canonicalInstallationDisabled: plan?.compositePackage?.canonicalHomepageInstallation === false,
            nativeThemeInspectionPresent: Boolean(plan.websiteRetoolExceptions),
            stagingOnly: plan?.compositePackage?.stagingOnly === true,
          };
          console.log(JSON.stringify({ checks, changeCount: changes.length, changes: changes.slice(0, 8) }, null, 2));
          if (Object.values(checks).some(value => value !== true)) process.exit(1);
          NODE

      - name: Publish verification receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Combined website request produced real source-bound copy changes"
          else
            state="failure"
            description="Source-bound WEB-003 verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-source-bound-web003",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
