name: Final Canonical Homepage Verification
# Release lane includes bounded Shopify read-back retries for build and repair writes.

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/canonical-homepage-final-verification.yml"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js"
      - "cloudflare/mmg-ios/src/kairos-canonical-homepage-compatibility-v1.js"
      - "cloudflare/mmg-ios/scripts/validate-production-baseline.mjs"
      - ".github/scripts/run-canonical-homepage-release.mjs"
      - ".github/scripts/verify-canonical-homepage.mjs"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      KAIROS_SKIP_RELEASE_MATCH: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Download review source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p repository artifacts/canonical-homepage
          source_sha="${SOURCE_SHA:-${GITHUB_SHA}}"
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${source_sha}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          grep -q 'kairos-canonical-homepage-builder-20260717-2' repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js
          grep -q 'waitForCanonicalReadBack' repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js
          grep -q 'compatibilityCanonicalTextReadBack' repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-compatibility-v1.js

      - name: Validate canonical builder
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --no-package-lock --no-audit --no-fund >/dev/null 2>&1
          npm run validate:production
          npx wrangler deploy --dry-run

      - name: Resolve Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --show-error --silent \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e '
              const payload = JSON.parse(process.env.ACCOUNTS_JSON || "{}");
              const accounts = payload.success && Array.isArray(payload.result) ? payload.result : [];
              if (accounts.length !== 1) process.exit(1);
              process.stdout.write(accounts[0].id || "");
            ')"
            test -n "${account_id}"
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Deploy semantic read-back builder
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify deployed builder header
        shell: bash
        run: |
          set -euo pipefail
          expected="kairos-canonical-homepage-builder-20260717-2"
          for attempt in $(seq 1 24); do
            headers_file="$(mktemp)"
            if curl --fail --show-error --silent --location --max-time 30 \
              -D "${headers_file}" \
              "${KAIROS_PRODUCTION_URL}/api/health?canonical_builder=${attempt}" \
              --output /tmp/kairos-health.json; then
              observed="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-canonical-homepage:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if [ "${observed}" = "${expected}" ]; then
                rm -f "${headers_file}"
                echo "Canonical builder release is live: ${observed}"
                exit 0
              fi
              echo "Builder check ${attempt}/24: ${observed:-none}"
            fi
            rm -f "${headers_file}"
            sleep 5
          done
          echo "::error::Semantic canonical homepage builder did not become live."
          exit 1

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          echo "Playwright Chromium is ready."

      - name: Build, repair, and verify Shopify staging homepage
        shell: bash
        run: |
          set -o pipefail
          node repository/.github/scripts/run-canonical-homepage-release.mjs \
            2>&1 | tee artifacts/canonical-homepage/release.log
          status=${PIPESTATUS[0]}
          echo "--- FINAL CANONICAL HOMEPAGE RECEIPT ---"
          if [ -f artifacts/canonical-homepage/review-receipt.json ]; then
            node -e '
              const fs = require("node:fs");
              const r = JSON.parse(fs.readFileSync("artifacts/canonical-homepage/review-receipt.json", "utf8"));
              console.log(JSON.stringify({
                preview: r.preview?.url,
                buildStatus: r.buildStatus,
                firstPass: r.firstPass?.passed,
                repairPerformed: r.repairPerformed,
                finalPassed: r.verification?.passed,
                failures: r.verification?.failures || [],
                publishedThemeChanged: r.production?.publishedThemeChanged,
                files: r.files,
              }, null, 2));
            '
          else
            echo "Review receipt was not produced."
          fi
          exit "${status}"
