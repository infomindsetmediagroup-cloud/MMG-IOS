name: Emergency MMG Page Shell Publish

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: emergency-mmg-page-shell-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_BASE_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Checkout exact release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate page-shell release source
        run: |
          set -euo pipefail
          node --check cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q 'kairos-page-shell-publisher-v1.js' cloudflare/mmg-ios/src/kairos-production-entry-theme-menu-hotfix-v1.js
          grep -q 'kairos-page-shell-publisher-20260719-1' cloudflare/mmg-ios/src/kairos-page-shell-publisher-v1.js

      - name: Deploy Kairos Worker
        working-directory: cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install
          npx wrangler deploy \
            --var "DEPLOYMENT_SHA:${GITHUB_SHA}" \
            --var "DEPLOYED_AT:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Wait for page-shell Worker
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="${RUNNER_TEMP}/identity.json"
            headers="${RUNNER_TEMP}/identity.headers"
            status="$(curl --silent --show-error --max-time 30 -D "${headers}" \
              "${WORKER_BASE_URL}/api/deployment/identity?sha=${GITHUB_SHA}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q "\"deploymentSha\":\"${GITHUB_SHA}\"" "${body}" \
              && grep -qi 'x-mmg-page-shell: kairos-page-shell-publisher-20260719-1' "${headers}"; then
              exit 0
            fi
            sleep 5
          done
          cat "${RUNNER_TEMP}/identity.json" || true
          cat "${RUNNER_TEMP}/identity.headers" || true
          exit 1

      - name: Publish page-shell reconciliation to Shopify MAIN theme
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/page-shell-result.json"
          status="$(curl --silent --show-error --retry 4 --retry-delay 3 --max-time 180 \
            -X POST "${WORKER_BASE_URL}/api/shopify/page-shell/publish?sha=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"PUBLISH_MMG_PAGE_SHELL_RECONCILIATION"}' \
            -o "${result}" -w '%{http_code}' || true)"
          cat "${result}" || true
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
          grep -q '"build":"kairos-page-shell-publisher-20260719-1"' "${result}"
          grep -q '"exactThemeFileReadBack":true' "${result}"
          grep -q '"layoutInjectionPresent":true' "${result}"

      - name: Verify live page-shell assets
        run: |
          set -euo pipefail
          for path in /pages/free-creator-toolkit /pages/publishing-services; do
            passed=false
            for attempt in $(seq 1 20); do
              html="${RUNNER_TEMP}/$(echo "${path}" | tr '/' '-')-${attempt}.html"
              status="$(curl --location --silent --show-error --max-time 45 \
                -H 'Cache-Control: no-cache, no-store, must-revalidate' \
                "https://themindsetmediagroup.com${path}?mmg_page_shell=${GITHUB_SHA}&attempt=${attempt}" \
                -o "${html}" -w '%{http_code}' || true)"
              if [ "${status}" = "200" ] \
                && grep -q 'MMG_PAGE_SHELL_START' "${html}" \
                && grep -q 'mmg-page-shell.js' "${html}" \
                && grep -q 'mmg-page-shell.css' "${html}"; then
                passed=true
                break
              fi
              sleep 6
            done
            test "${passed}" = "true"
          done
