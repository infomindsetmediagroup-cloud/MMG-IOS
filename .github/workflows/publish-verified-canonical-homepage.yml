name: Publish Verified Canonical MMG Homepage

on:
  workflow_run:
    workflows:
      - Build and Verify Canonical MMG Homepage
    types:
      - completed
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: publish-canonical-mmg-homepage
  cancel-in-progress: false

jobs:
  publish-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      STATUS_CONTEXT: kairos-canonical-homepage-live

    steps:
      - name: Publish pending live-release status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",description:"Publishing verified canonical homepage to the live Shopify theme",context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            --data "${payload}"

      - name: Download release source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository artifacts/canonical-homepage-live
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${TARGET_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js
          test -f repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Wait for matching Cloudflare release
        shell: bash
        run: |
          set -euo pipefail
          expected_build="$(node -e '
            const fs = require("node:fs");
            const source = fs.readFileSync("repository/cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js", "utf8");
            const match = source.match(/const BUILD = "([^"]+)"/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ')"

          for attempt in $(seq 1 60); do
            headers_file="$(mktemp)"
            if curl --fail --show-error --silent --location --max-time 30 \
              -D "${headers_file}" \
              "${KAIROS_PRODUCTION_URL}/api/health?canonical_live_release=${TARGET_SHA}" \
              --output /tmp/kairos-health.json; then
              deployed_build="$(awk 'BEGIN{IGNORECASE=1} /^x-mmg-production-entry:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if [ "${deployed_build}" = "${expected_build}" ]; then
                rm -f "${headers_file}"
                echo "Matching Kairos release is live: ${deployed_build}"
                exit 0
              fi
              echo "Release gate ${attempt}/60: expected ${expected_build}; observed ${deployed_build:-none}."
            fi
            rm -f "${headers_file}"
            sleep 5
          done

          echo "::error::The matching homepage release did not become live on Cloudflare."
          exit 1

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Publish verified homepage bundle to live Shopify theme
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          payload="$(TARGET_SHA="${TARGET_SHA}" node -e 'process.stdout.write(JSON.stringify({confirmation:"PUBLISH_CANONICAL_MMG_HOMEPAGE_LIVE",mode:"publish",sourceCommit:process.env.TARGET_SHA}))')"
          curl --fail-with-body --show-error --silent --max-time 120 \
            -X POST \
            -H "Content-Type: application/json" \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/canonical-homepage/build" \
            --data "${payload}" \
            --output artifacts/canonical-homepage-live/publish-result.json

          LIVE_URL="$(node -e '
            const body=require("./artifacts/canonical-homepage-live/publish-result.json");
            if(body.status!=="completed" || body.mode!=="publish" || body.production?.publishedThemeChanged!==true || !body.production?.url){
              console.error(JSON.stringify(body));
              process.exit(1);
            }
            process.stdout.write(body.production.url);
          ')"
          echo "live_url=${LIVE_URL}" >> "${GITHUB_OUTPUT}"
          echo "MMG_PREVIEW_URL=${LIVE_URL}/?homepage_release=${TARGET_SHA}" >> "${GITHUB_ENV}"

      - name: Verify the live homepage on desktop and mobile
        id: live_verification
        shell: bash
        env:
          MMG_VERIFICATION_OUTPUT: artifacts/canonical-homepage-live/browser
          MMG_VERIFICATION_ATTEMPT: "3"
        run: |
          set -euo pipefail
          sleep 5
          node repository/.github/scripts/verify-canonical-homepage.mjs

      - name: Create live release receipt
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const publishPath = 'artifacts/canonical-homepage-live/publish-result.json';
          const verificationPath = 'artifacts/canonical-homepage-live/browser/verification-report.json';
          const publish = fs.existsSync(publishPath)
            ? JSON.parse(fs.readFileSync(publishPath, 'utf8'))
            : { status: 'not-produced', production: null, files: [] };
          const verification = fs.existsSync(verificationPath)
            ? JSON.parse(fs.readFileSync(verificationPath, 'utf8'))
            : { passed: false, failures: ['Live browser verification report was not produced.'] };
          const receipt = {
            sourceCommit: process.env.TARGET_SHA,
            publishedAt: publish.completedAt || null,
            production: publish.production,
            files: publish.files,
            verification,
            generatedAt: new Date().toISOString(),
          };
          fs.writeFileSync('artifacts/canonical-homepage-live/release-receipt.json', JSON.stringify(receipt, null, 2));
          const lines = [
            '# Canonical MMG Homepage Live Release',
            '',
            `- Source commit: ${receipt.sourceCommit}`,
            `- Live URL: ${receipt.production?.url || 'unavailable'}`,
            `- Published theme changed: ${receipt.production?.publishedThemeChanged === true ? 'YES' : 'NO'}`,
            `- Browser verification: ${verification.passed ? 'PASS' : 'FAIL'}`,
            '',
            '## Shopify source changes',
            '',
            ...(receipt.files || []).map((file) => `- ${file.filename}: ${file.beforeSha256 || 'new'} → ${file.afterSha256} (${file.afterBytes} bytes)`),
          ];
          fs.writeFileSync('artifacts/canonical-homepage-live/release-receipt.md', `${lines.join('\n')}\n`);
          NODE

      - name: Upload live release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-mmg-homepage-live-${{ env.TARGET_SHA }}
          path: artifacts/canonical-homepage-live
          if-no-files-found: error
          retention-days: 30

      - name: Publish final live-release status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LIVE_OUTCOME: ${{ steps.live_verification.outcome }}
        run: |
          set -euo pipefail
          if [ "${LIVE_OUTCOME}" = "success" ]; then
            state="success"
            description="Canonical MMG homepage is live and passed desktop/mobile verification"
          else
            state="failure"
            description="Canonical MMG homepage live verification failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:process.env.STATUS_CONTEXT,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            --data "${payload}"
