name: Kairos Actions Ping

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  ping:
    if: github.event.issue.title == '[Kairos Actions] Ping'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Actions execution
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ GitHub Actions ping executed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
