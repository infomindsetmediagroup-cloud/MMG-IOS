name: Validate Rendered Homepage Text

on:
  push:
    branches:
      - fix/rendered-homepage-text-guarantee
    paths:
      - ".github/workflows/validate-rendered-homepage-text.yml"
      - ".rendered-text-validation-trigger"
      - "cloudflare/mmg-ios/**"
      - "web/kairos-dashboard/**"

permissions:
  contents: write

concurrency:
  group: kairos-rendered-homepage-text-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download branch source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository

      - name: Install Cloudflare dependencies
        working-directory: repository/cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Check runtime syntax
        working-directory: repository
        run: |
          set -euo pipefail
          node --check cloudflare/mmg-ios/src/kairos-rendered-homepage-text-planner-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-v41.js
          node --check cloudflare/mmg-ios/src/kairos-homepage-preserve-planner-v1.js
          node --check cloudflare/mmg-ios/src/kairos-homepage-template-text-executor-v1.js

      - name: Verify rendered-text contract
        working-directory: repository
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const wrapper=fs.readFileSync('cloudflare/mmg-ios/src/kairos-rendered-homepage-text-planner-v1.js','utf8');
          const entry=fs.readFileSync('cloudflare/mmg-ios/src/kairos-production-entry-v41.js','utf8');
          const requiredWrapper=[
            'document?.order',
            'section.disabled === true',
            'section?.block_order',
            'block.disabled === true',
            'renderedPrimaryOperations.length > 0',
            'rendered_homepage_text_delta_missing',
            'hidden, disabled, unordered, or non-rendered text settings',
            'MAX_ATTEMPTS = 2'
          ];
          const requiredEntry=[
            './kairos-rendered-homepage-text-planner-v1.js',
            'homepageRenderedTextDelta: "required"',
            'homepageHiddenTextNoOp: "prohibited"',
            'X-Kairos-Rendered-Text-Delta-Required',
            'X-Kairos-Hidden-Text-Noop'
          ];
          for(const marker of requiredWrapper)if(!wrapper.includes(marker))throw new Error(`Rendered planner missing: ${marker}`);
          for(const marker of requiredEntry)if(!entry.includes(marker))throw new Error(`Production entry missing: ${marker}`);
          console.log(JSON.stringify({status:'passed',renderedTextGate:true,hiddenTextSuccess:'prohibited',activeOrderedPrimaryCopyDelta:'required'}));
          NODE

      - name: Validate production suite and bundle
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          node scripts/validate-production-suite.mjs
          node scripts/validate-frozen-production-standard.mjs
          npx wrangler deploy --dry-run

      - name: Write validation receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          receipt="$(JOB_STATUS="${JOB_STATUS}" node - <<'NODE'
          const status=process.env.JOB_STATUS==='success'?'passed':'failed';
          process.stdout.write(JSON.stringify({
            status,
            validatedCommit:process.env.GITHUB_SHA,
            branch:process.env.GITHUB_REF_NAME,
            workflowRunID:process.env.GITHUB_RUN_ID,
            workflowRunURL:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            checks:[
              'javascript-syntax',
              'active-ordered-section-filter',
              'active-ordered-block-filter',
              'rendered-primary-copy-delta',
              'hidden-text-noop-prohibited',
              'production-validation-suite',
              'frozen-production-standard',
              'wrangler-deploy-dry-run'
            ],
            completedAt:new Date().toISOString()
          },null,2));
          NODE
          )"
          encoded="$(printf '%s' "${receipt}" | base64 -w0)"
          api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/contents/.validation/rendered-homepage-text.json"
          existing="$(curl --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}?ref=${GITHUB_REF_NAME}")"
          existing_sha="$(printf '%s' "${existing}" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(JSON.parse(s).sha||"")}catch{}})')"
          payload="$(CONTENT="${encoded}" BRANCH="${GITHUB_REF_NAME}" SHA="${existing_sha}" node -e 'const p={message:"Record rendered homepage text validation",content:process.env.CONTENT,branch:process.env.BRANCH};if(process.env.SHA)p.sha=process.env.SHA;process.stdout.write(JSON.stringify(p))')"
          curl --fail --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${api_url}" \
            --data "${payload}"
