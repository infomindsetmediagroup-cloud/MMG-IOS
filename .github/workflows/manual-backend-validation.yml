name: Manual Kairos Backend Validation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to validate
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: manual-kairos-backend-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  validate-backend:
    name: Typecheck and test Kairos backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out requested ref without external actions
        env:
          VALIDATION_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          git init repository
          cd repository
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${VALIDATION_REF}"
          git checkout --detach FETCH_HEAD

      - name: Verify runner toolchain
        working-directory: repository
        run: |
          set -euo pipefail
          node --version
          npm --version
          node -e 'const major = Number(process.versions.node.split(".")[0]); if (major < 22) { console.error(`Node 22+ required; found ${process.versions.node}`); process.exit(1); }'

      - name: Install dependencies
        working-directory: repository
        run: npm install --no-audit --no-fund

      - name: Typecheck and test
        working-directory: repository
        run: npm run check
