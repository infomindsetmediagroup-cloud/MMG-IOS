name: Deploy Kairos Manuscript Runtime

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DEPLOY KAIROS MANUSCRIPT RUNTIME to authorize production deployment.'
        required: true
        type: string
      release_id:
        description: 'Human-readable production release identifier.'
        required: true
        type: string

permissions:
  contents: read
  statuses: write

concurrency:
  group: deploy-kairos-manuscript-runtime-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirmation == 'DEPLOY KAIROS MANUSCRIPT RUNTIME' }}
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      KAIROS_RELEASE_ID: ${{ inputs.release_id }}

    steps:
      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Validating governed production release ${KAIROS_RELEASE_ID}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install validation dependencies
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate production runtime syntax
        run: |
          node --check cloudflare/mmg-ios/src/kairos-production-entry-local-inference-v1.js
          node --check cloudflare/mmg-ios/src/kairos-local-inference-v1.js
          node --check cloudflare/mmg-ios/src/kairos-manuscript-operation-boundary-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-manuscript-online-v1.js
          node --check cloudflare/mmg-ios/src/kairos-manuscript-project-setup-v1.js
          node --check cloudflare/mmg-ios/src/kairos-manuscript-auto-pipeline-v1.js
          node --check cloudflare/mmg-ios/src/kairos-product-publication-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-registry-v1.js
          node --check web/kairos-dashboard/scripts/manuscript-project-setup.js
          node --check web/kairos-dashboard/scripts/manuscript-editorial-workbench.js
          node --check web/kairos-dashboard/scripts/kairos-local-inference.js
          node --check web/kairos-dashboard/scripts/manuscript-auto-pipeline.js

      - name: Validate governance contracts
        run: |
          npm run validate:kairos-shopify
          npm run validate:manuscript-activation
          npm run validate:shopify
          npm run validate:service-product

      - name: Test publication metadata and operation boundaries
        run: |
          npx vitest run backend-tests/kairos-manuscript-auto-pipeline.test.js -t "extracts the AI Image Mastery publication record without a catalog form"
          npx vitest run backend-tests/kairos-manuscript-auto-pipeline.test.js -t "uses the durable project setup as the authoritative title and author"
          npx vitest run backend-tests/kairos-manuscript-auto-pipeline.test.js -t "routes non-AI publications to the canonical MMG book-product template"
          npx vitest run backend-tests/kairos-manuscript-operation-boundary.test.js
          npx vitest run backend-tests/kairos-scope-firewall.test.js

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit > /dev/null

      - name: Tap manuscript, vault, and release controls in mobile WebKit
        run: npm run test:manuscript-ui

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-audit --no-fund > /dev/null

      - name: Validate manuscript setup transaction
        working-directory: cloudflare/mmg-ios
        run: node --test test/kairos-manuscript-project-setup-v3.test.js test/kairos-manuscript-project-setup-ui-v2.test.js

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy manuscript Worker
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify manuscript runtime online
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            body="${RUNNER_TEMP}/manuscript-status.json"
            status="$(curl --silent --show-error --max-time 20 \
              "${WORKER_URL}/api/kairos/manuscripts/status?release=${KAIROS_RELEASE_ID}&attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q '"ready":true' "${body}" \
              && grep -q '"automaticProductionPackage":true' "${body}" \
              && grep -q '"adminAssetVault":true' "${body}" \
              && grep -q '"manualCatalogEntryRequired":false' "${body}" \
              && grep -q '"shopifyDraftApprovalRequired":true' "${body}" \
              && grep -q '"liveProductPublicationApprovalRequired":true' "${body}" \
              && grep -q '"websiteMutationAuthorized":false' "${body}"; then
              cat "${body}"
              break
            fi
            if [ "${attempt}" = "30" ]; then
              cat "${body}" || true
              exit 1
            fi
            sleep 5
          done

      - name: Verify current production controllers deployed
        run: |
          set -euo pipefail
          root="${RUNNER_TEMP}/root.html"
          setup="${RUNNER_TEMP}/manuscript-project-setup.js"
          editorial="${RUNNER_TEMP}/manuscript-editorial-workbench.js"
          inference="${RUNNER_TEMP}/kairos-local-inference.js"
          automatic="${RUNNER_TEMP}/manuscript-auto-pipeline.js"
          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error --max-time 20 "${WORKER_URL}/?verify=${GITHUB_SHA}&attempt=${attempt}" -o "${root}" || true
            curl --fail --silent --show-error --max-time 20 "${WORKER_URL}/scripts/manuscript-project-setup.js?verify=${GITHUB_SHA}&attempt=${attempt}" -o "${setup}" || true
            curl --fail --silent --show-error --max-time 20 "${WORKER_URL}/scripts/manuscript-editorial-workbench.js?verify=${GITHUB_SHA}&attempt=${attempt}" -o "${editorial}" || true
            curl --fail --silent --show-error --max-time 20 "${WORKER_URL}/scripts/kairos-local-inference.js?verify=${GITHUB_SHA}&attempt=${attempt}" -o "${inference}" || true
            curl --fail --silent --show-error --max-time 20 "${WORKER_URL}/scripts/manuscript-auto-pipeline.js?verify=${GITHUB_SHA}&attempt=${attempt}" -o "${automatic}" || true
            if grep -Eq '<meta name="mmg-build" content="kairos-command-hub-[^"]+">' "${root}" \
              && grep -Eq 'manuscript-project-setup\.js\?v=[^"]+' "${root}" \
              && grep -Eq 'kairos-local-inference\.js\?v=[^"]+' "${root}" \
              && grep -Eq 'manuscript-auto-pipeline\.js\?v=[^"]+' "${root}" \
              && ! grep -q 'publication-catalog.js' "${root}" \
              && grep -q 'KairosManuscriptSetupController' "${setup}" \
              && grep -q 'KairosEditorialWorkbenchController' "${editorial}" \
              && grep -q 'KairosLocalInference' "${inference}" \
              && grep -q 'KairosManuscriptAutoPipelineController' "${automatic}" \
              && grep -q 'CREATE SHOPIFY PRODUCT DRAFT' "${automatic}" \
              && grep -q 'PUBLISH PRODUCT LIVE' "${automatic}"; then
              node - "${root}" <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync(process.argv[2], 'utf8');
          const inference = html.indexOf('./scripts/kairos-local-inference.js?v=');
          const pipeline = html.indexOf('./scripts/manuscript-auto-pipeline.js?v=');
          if (inference < 0 || pipeline <= inference) process.exit(1);
          NODE
              break
            fi
            if [ "${attempt}" = "30" ]; then
              echo "Current production controllers did not propagate completely."
              exit 1
            fi
            sleep 5
          done

      - name: Tap deployed Manuscript Studio in mobile WebKit
        id: live_webkit
        continue-on-error: true
        env:
          KAIROS_LIVE_URL: ${{ env.WORKER_URL }}
        run: npx playwright test browser-tests/manuscript-live-smoke.spec.mjs --project=webkit

      - name: Upload live WebKit failure evidence
        if: ${{ steps.live_webkit.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: live-manuscript-webkit-failure
          path: test-results
          if-no-files-found: warn
          retention-days: 7

      - name: Verify direct website mutation firewall
        run: |
          set -euo pipefail
          body="${RUNNER_TEMP}/shopify-denial.json"
          status="$(curl --silent --show-error --max-time 20 \
            -X POST "${WORKER_URL}/api/shopify/page-shell/publish" \
            -H 'Content-Type: application/json' \
            --data '{}' \
            -o "${body}" -w '%{http_code}' || true)"
          cat "${body}"
          test "${status}" = "403"
          grep -q '"code":"WEBSITE_MUTATION_DENIED"' "${body}"

      - name: Enforce live WebKit result
        run: test "${{ steps.live_webkit.outcome }}" = "success"

      - name: Report deployment success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Production release ${KAIROS_RELEASE_ID} passed all gates\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Report deployment failure
        if: ${{ failure() || cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"failure\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Production release ${KAIROS_RELEASE_ID} failed validation\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
