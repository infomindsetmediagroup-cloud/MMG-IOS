name: Deploy Kairos Manuscript Runtime

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/mmg-ios/src/kairos-production-entry-manuscript-online-v1.js'
      - 'cloudflare/mmg-ios/src/kairos-manuscript-operation-boundary-v1.js'
      - 'cloudflare/mmg-ios/src/kairos-manuscript-*.js'
      - 'cloudflare/mmg-ios/src/kairos-production-registry-v1.js'
      - 'cloudflare/mmg-ios/test/kairos-manuscript-*.test.js'
      - 'cloudflare/mmg-ios/wrangler.toml'
      - 'web/kairos-dashboard/index.html'
      - 'web/kairos-dashboard/scripts/manuscript-*.js'
      - 'web/kairos-dashboard/styles/manuscript-*.css'
      - 'browser-tests/manuscript-*.spec.mjs'
      - 'playwright.config.mjs'
      - 'package.json'
      - 'governance/kairos-builder-plugin-registry-v1.json'
      - 'scripts/validate-kairos-manuscript-activation.mjs'
      - '.github/workflows/deploy-kairos-manuscript-runtime.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: deploy-kairos-manuscript-runtime
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev

    steps:
      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Testing manuscript buttons before deployment\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install validation dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate manuscript activation boundary
        run: |
          node --check cloudflare/mmg-ios/src/kairos-manuscript-operation-boundary-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-entry-manuscript-online-v1.js
          node --check cloudflare/mmg-ios/src/kairos-manuscript-project-setup-v1.js
          node --check cloudflare/mmg-ios/src/kairos-production-registry-v1.js
          node --check web/kairos-dashboard/scripts/manuscript-project-setup.js
          node scripts/validate-kairos-manuscript-activation.mjs
          npx vitest run backend-tests/kairos-manuscript-operation-boundary.test.js backend-tests/kairos-scope-firewall.test.js

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit

      - name: Tap manuscript setup buttons in mobile WebKit
        run: npm run test:manuscript-ui

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate manuscript setup transaction
        working-directory: cloudflare/mmg-ios
        run: node --test test/kairos-manuscript-project-setup-v3.test.js test/kairos-manuscript-project-setup-ui-v2.test.js

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy manuscript Worker
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify manuscript runtime online
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            body="${RUNNER_TEMP}/manuscript-status.json"
            status="$(curl --silent --show-error --max-time 20 \
              "${WORKER_URL}/api/kairos/manuscripts/status?attempt=${attempt}" \
              -o "${body}" -w '%{http_code}' || true)"
            if [ "${status}" = "200" ] \
              && grep -q '"ready":true' "${body}" \
              && grep -q '"mode":"manuscript-only"' "${body}" \
              && grep -q '"shopifyAccess":"none"' "${body}"; then
              cat "${body}"
              break
            fi
            if [ "${attempt}" = "30" ]; then
              cat "${body}" || true
              exit 1
            fi
            sleep 5
          done

      - name: Verify complete controller source deployed
        run: |
          set -euo pipefail
          root="${RUNNER_TEMP}/root.html"
          client="${RUNNER_TEMP}/manuscript-project-setup.js"
          curl --fail --silent --show-error --max-time 20 \
            "${WORKER_URL}/?verify=${GITHUB_SHA}" -o "${root}"
          curl --fail --silent --show-error --max-time 20 \
            "${WORKER_URL}/scripts/manuscript-project-setup.js?verify=${GITHUB_SHA}" -o "${client}"
          grep -q 'manuscript-controller-20260722-3' "${root}"
          grep -q 'kairos-manuscript-project-setup-ui-20260722-3' "${client}"
          grep -q 'KairosManuscriptSetupController' "${client}"
          grep -q 'function activeProjectId' "${client}"
          grep -q 'function currentTitle' "${client}"
          grep -q 'function esc' "${client}"
          grep -q 'document.addEventListener("click", handleClick, true)' "${client}"
          grep -q 'init();' "${client}"

      - name: Tap deployed Manuscript Studio in mobile WebKit
        env:
          KAIROS_LIVE_URL: ${{ env.WORKER_URL }}
        run: npx playwright test browser-tests/manuscript-live-smoke.spec.mjs --project=webkit

      - name: Verify website mutation firewall
        run: |
          set -euo pipefail
          body="${RUNNER_TEMP}/shopify-denial.json"
          status="$(curl --silent --show-error --max-time 20 \
            -X POST "${WORKER_URL}/api/shopify/page-shell/publish" \
            -H 'Content-Type: application/json' \
            --data '{}' \
            -o "${body}" -w '%{http_code}' || true)"
          cat "${body}"
          test "${status}" = "403"
          grep -q '"code":"WEBSITE_MUTATION_DENIED"' "${body}"

      - name: Report deployment success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Mobile WebKit buttons passed; Shopify denied\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Report deployment failure
        if: ${{ failure() || cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"failure\",\"context\":\"kairos-manuscript-runtime\",\"description\":\"Manuscript button validation or deployment failed\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
