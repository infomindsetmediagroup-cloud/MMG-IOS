name: Validate Shopify Governance

on:
  workflow_dispatch: {}
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "shopify/**"
      - "registry/shopify-product-contracts.json"
      - "scripts/validate-shopify-governance.mjs"
      - "package.json"
      - ".github/workflows/validate-shopify-governance.yml"
  push:
    branches:
      - main
    paths:
      - "shopify/**"
      - "registry/shopify-product-contracts.json"
      - "scripts/validate-shopify-governance.mjs"
      - "package.json"
      - ".github/workflows/validate-shopify-governance.yml"

permissions:
  contents: read

concurrency:
  group: shopify-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate registry and controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Download repository source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p repository
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 90 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${SOURCE_SHA}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository

      - name: Validate Shopify governance
        shell: bash
        working-directory: repository
        run: |
          set -euo pipefail
          node --version
          node scripts/validate-shopify-governance.mjs
