name: Validate Shopify Governance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "shopify/**"
      - "registry/shopify-product-contracts.json"
      - "scripts/validate-shopify-governance.mjs"
      - "package.json"
      - ".github/workflows/validate-shopify-governance.yml"
  push:
    branches:
      - main
    paths:
      - "shopify/**"
      - "registry/shopify-product-contracts.json"
      - "scripts/validate-shopify-governance.mjs"
      - "package.json"
      - ".github/workflows/validate-shopify-governance.yml"

permissions:
  contents: read

concurrency:
  group: shopify-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate registry and controls
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Shopify governance
        run: npm run validate:shopify
