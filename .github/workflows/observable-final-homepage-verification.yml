name: Observable Final Homepage Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/observable-final-homepage-verification.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
      KAIROS_SKIP_RELEASE_MATCH: "false"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Download exact review source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p repository artifacts/canonical-homepage
          source_sha="${SOURCE_SHA:-${GITHUB_SHA}}"
          curl --fail --show-error --silent --location \
            --connect-timeout 15 \
            --max-time 60 \
            --retry 2 \
            --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tarball/${source_sha}" \
            --output repository.tar.gz
          tar -xzf repository.tar.gz --strip-components=1 -C repository
          test -f repository/cloudflare/mmg-ios/wrangler.toml
          grep -q 'kairos-production-entry-immutable-20260717-8' repository/cloudflare/mmg-ios/src/kairos-production-entry-immutable-v1.js
          grep -q 'waitForCanonicalReadBack' repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-builder-v1.js
          grep -q 'waitForCompatibleScript' repository/cloudflare/mmg-ios/src/kairos-canonical-homepage-compatibility-v1.js

      - name: Validate complete production source
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: |
          set -euo pipefail
          npm install --no-package-lock --no-audit --no-fund >/dev/null 2>&1
          npm run validate:production
          npx wrangler deploy --dry-run

      - name: Resolve Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            accounts_json="$(curl --fail --show-error --silent \
              --connect-timeout 15 \
              --max-time 30 \
              --retry 2 \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=50")"
            account_id="$(ACCOUNTS_JSON="${accounts_json}" node -e '
              const payload = JSON.parse(process.env.ACCOUNTS_JSON || "{}");
              const accounts = payload.success && Array.isArray(payload.result) ? payload.result : [];
              if (accounts.length !== 1) process.exit(1);
              process.stdout.write(accounts[0].id || "");
            ')"
            test -n "${account_id}"
            echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"
          fi

      - name: Deploy exact reviewed Worker
        shell: bash
        working-directory: repository/cloudflare/mmg-ios
        run: npx wrangler deploy

      - name: Verify exact live release
        shell: bash
        run: |
          set -euo pipefail
          expected_entry="kairos-production-entry-immutable-20260717-8"
          expected_builder="kairos-canonical-homepage-builder-20260717-2"
          for attempt in $(seq 1 30); do
            headers_file="$(mktemp)"
            if curl --fail --show-error --silent --location --max-time 30 \
              -D "${headers_file}" \
              "${KAIROS_PRODUCTION_URL}/api/health?observable_release=${GITHUB_SHA}&attempt=${attempt}" \
              --output /tmp/kairos-health.json; then
              entry="$(awk 'BEGIN{IGNORECASE=1} /^x-mmg-production-entry:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              builder="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-canonical-homepage:/ {gsub(/\r/, ""); sub(/^[^:]+:[[:space:]]*/, ""); print; exit}' "${headers_file}")"
              if [ "${entry}" = "${expected_entry}" ] && [ "${builder}" = "${expected_builder}" ]; then
                rm -f "${headers_file}"
                echo "Exact release verified: ${entry}; ${builder}"
                exit 0
              fi
              echo "Release check ${attempt}/30: entry=${entry:-none}; builder=${builder:-none}"
            fi
            rm -f "${headers_file}"
            sleep 5
          done
          echo "::error::The exact reviewed Worker release did not become live."
          exit 1

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          echo "Playwright Chromium is ready."

      - name: Build, repair, and verify Shopify staging homepage
        shell: bash
        run: |
          set -o pipefail
          node repository/.github/scripts/run-canonical-homepage-release.mjs \
            2>&1 | tee artifacts/canonical-homepage/release.log
          status=${PIPESTATUS[0]}
          echo "--- CANONICAL HOMEPAGE REVIEW RECEIPT ---"
          if [ -f artifacts/canonical-homepage/review-receipt.json ]; then
            cat artifacts/canonical-homepage/review-receipt.json
          else
            echo "Review receipt was not produced."
          fi
          echo "--- VERIFICATION REPORTS ---"
          find artifacts/canonical-homepage -name 'verification-report.json' -print -exec cat {} \;
          exit "${status}"
