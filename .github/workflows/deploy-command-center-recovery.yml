name: Deploy Command Center Recovery

on:
  push:
    branches: [main]
    paths:
      - "web/kairos-dashboard/**"
      - "cloudflare/mmg-ios/**"
      - ".github/workflows/deploy-command-center-recovery.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

concurrency:
  group: command-center-recovery
  cancel-in-progress: true

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Worker dependencies
        working-directory: cloudflare/mmg-ios
        run: npm install --ignore-scripts --no-package-lock --no-audit --no-fund

      - name: Validate Worker bundle
        working-directory: cloudflare/mmg-ios
        run: npx wrangler deploy --dry-run

      - name: Deploy recovery shell
        working-directory: cloudflare/mmg-ios
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          npx wrangler deploy

      - name: Wait for self-contained shell
        env:
          APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            nonce="${GITHUB_SHA}-${attempt}-$(date +%s)"
            rm -f app.html headers.txt
            code="$(curl --silent --show-error --location --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -D headers.txt \
              "${APP_URL}?recovery=${nonce}" \
              --output app.html \
              --write-out '%{http_code}' || true)"
            route="$(awk 'BEGIN{IGNORECASE=1} /^x-kairos-command-center-route:/{gsub(/\r/,"",$2);print $2}' headers.txt | tail -1)"
            if [ "${code}" = "200" ] \
              && [ "${route}" = "direct-assets-root-shell" ] \
              && grep -q 'kairos-command-center-inline-20260717-1' app.html \
              && grep -q 'id="kairos-hub"' app.html; then
              echo "Self-contained shell is live."
              exit 0
            fi
            sleep 5
          done
          echo "Self-contained shell did not become live." >&2
          exit 1

      - name: Install Chromium harness
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Prove live app opens and accepts input
        env:
          APP_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev/center/content/website
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true });
            const consoleErrors = [];
            const pageErrors = [];
            page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
            const response = await page.goto(`${process.env.APP_URL}?playwright=${Date.now()}`, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForSelector('html[data-kairos-boot="ready"]', { timeout: 15000 });
            await page.waitForSelector('#website-objective', { state: 'visible', timeout: 15000 });
            const objective = 'Verify the functioning Website Retool input without submitting a Shopify mutation.';
            await page.fill('#website-objective', objective);
            const value = await page.inputValue('#website-objective');
            const button = page.locator('[data-website-plan]');
            const buttonVisible = await button.isVisible();
            const buttonEnabled = await button.isEnabled();
            const loading = (await page.locator('#kairos-hub').innerText()).includes('Loading Kairos Command Center');
            const build = await page.locator('#kairos-hub').getAttribute('data-self-contained-build');
            const title = await page.title();
            const receipt = {
              httpStatus: response?.status() || 0,
              title,
              loading,
              build,
              objectiveValue: value,
              buttonVisible,
              buttonEnabled,
              consoleErrors,
              pageErrors,
            };
            console.log(`KAIROS_RECOVERY_BROWSER_RECEIPT=${JSON.stringify(receipt)}`);
            await page.screenshot({ path: 'command-center-recovery.png', fullPage: true });
            await browser.close();
            const passed = response?.ok()
              && !loading
              && build === 'kairos-command-center-inline-20260717-1'
              && value === objective
              && buttonVisible
              && buttonEnabled
              && pageErrors.length === 0;
            if (!passed) process.exit(1);
          })().catch(error => { console.error(error); process.exit(1); });
          NODE

      - name: Upload recovery browser proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-recovery-browser-proof
          path: command-center-recovery.png
          if-no-files-found: ignore

      - name: Publish recovery receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${JOB_STATUS}" = "success" ]; then
            state="success"
            description="Command Center opened and accepted Website input"
          else
            state="failure"
            description="Command Center recovery browser proof failed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-command-center-recovery",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
