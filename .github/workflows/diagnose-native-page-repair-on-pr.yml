name: Diagnose Native MMG Page Repair on PR

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      WORKER_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Call native page repair endpoint
        run: |
          set -euo pipefail
          result="${RUNNER_TEMP}/repair.json"
          status="$(curl --silent --show-error --max-time 180 \
            -X POST "${WORKER_URL}/api/shopify/pages/repair?diagnostic=${GITHUB_SHA}" \
            -H 'Content-Type: application/json' \
            --data '{"confirmation":"REPAIR_MMG_AUDITED_PAGES_NOW"}' \
            -o "${result}" -w '%{http_code}' || true)"
          echo "HTTP ${status}"
          cat "${result}"
          echo
          test "${status}" = "200"
          grep -q '"status":"completed"' "${result}"
