name: Verify Audited MMG Page Shell on PR

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STOREFRONT_URL: https://themindsetmediagroup.com
      PAGE_SHELL_BUILD: kairos-page-shell-publisher-20260719-1
    steps:
      - name: Install browser verifier
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/page-shell-browser"
          cd "${RUNNER_TEMP}/page-shell-browser"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium

      - name: Verify Toolkit and Publishing Services
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/page-shell-browser"
          cat > verify.mjs <<'JS'
          import { chromium } from "playwright";

          const definitions = [
            {
              key: "free-creator-toolkit",
              path: "/pages/free-creator-toolkit",
              hero: "The Free Creator Toolkit.",
              hiddenSelector: "main .mmg-page-mini-navigation-hidden",
            },
            {
              key: "publishing-services",
              path: "/pages/publishing-services",
              hero: "Turn your knowledge into a published book.",
              hiddenSelector: "main .mmg-page-directory-hidden",
              publishing: true,
            },
          ];

          const browser = await chromium.launch({ headless: true });
          const results = [];
          try {
            for (const definition of definitions) {
              for (const viewport of [
                { name: "desktop", width: 1440, height: 1000 },
                { name: "mobile", width: 390, height: 844 },
              ]) {
                const context = await browser.newContext({ viewport });
                const page = await context.newPage();
                const response = await page.goto(`${process.env.STOREFRONT_URL}${definition.path}?shell_verify=${Date.now()}-${viewport.name}`, {
                  waitUntil: "domcontentloaded",
                  timeout: 60000,
                });
                let waitError = "";
                try {
                  await page.waitForFunction((build) => document.documentElement.dataset.mmgPageShell === build, process.env.PAGE_SHELL_BUILD, { timeout: 30000 });
                  await page.waitForFunction(() => document.documentElement.dataset.mmgPageShellReady === "true", { timeout: 30000 });
                } catch (error) {
                  waitError = error instanceof Error ? error.message : String(error);
                }
                await page.waitForTimeout(1000);

                const visibleH1 = (await page.locator("main h1:visible").allTextContents()).map((value) => value.replace(/\s+/g, " ").trim());
                const nativeTitleHidden = await page.locator("main .mmg-native-page-title-hidden").count();
                const normalizedBlock = await page.locator(definition.hiddenSelector).count();
                const build = await page.locator("html").getAttribute("data-mmg-page-shell");
                const ready = await page.locator("html").getAttribute("data-mmg-page-shell-ready");
                const projectGuideLinks = definition.publishing ? await page.locator('main a[href*="/pages/project-guide"]:visible').count() : 0;
                const repairedLinks = definition.publishing ? await page.locator('main a[data-mmg-link-repaired="true"]').count() : 0;
                const processTarget = definition.publishing ? await page.locator("#publishing-process").count() : 1;
                const overflow = await page.evaluate(() => ({
                  viewport: document.documentElement.clientWidth,
                  document: document.documentElement.scrollWidth,
                  body: document.body.scrollWidth,
                }));
                const passed = Boolean(response?.ok()) &&
                  build === process.env.PAGE_SHELL_BUILD &&
                  ready === "true" &&
                  visibleH1.length === 1 &&
                  visibleH1[0] === definition.hero &&
                  nativeTitleHidden === 1 &&
                  normalizedBlock === 1 &&
                  projectGuideLinks === 0 &&
                  processTarget === 1 &&
                  (!definition.publishing || repairedLinks >= 1) &&
                  Math.max(overflow.document, overflow.body) <= overflow.viewport + 2;

                results.push({
                  page: definition.key,
                  viewport: viewport.name,
                  http: response?.status() || 0,
                  build,
                  ready,
                  visibleH1,
                  nativeTitleHidden,
                  normalizedBlock,
                  projectGuideLinks,
                  repairedLinks,
                  processTarget,
                  overflow,
                  waitError,
                  passed,
                });
                await context.close();
              }
            }
          } finally {
            await browser.close();
          }

          console.log(JSON.stringify({ passed: results.every((item) => item.passed), results }, null, 2));
          if (!results.every((item) => item.passed)) process.exit(1);
          JS
          node verify.mjs
