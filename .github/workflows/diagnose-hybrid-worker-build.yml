name: Diagnose Hybrid Worker Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-hybrid-worker-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out hybrid integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/tuesday-shell-friday-functionality-20260717

      - name: Resolve hybrid SHA
        id: hybrid
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Run exact hybrid build checks
        id: build
        continue-on-error: true
        working-directory: cloudflare/mmg-ios
        shell: bash
        run: |
          set -euxo pipefail
          npm install --no-package-lock --no-audit --no-fund
          npm run validate:loading
          npm run validate:production
          npx wrangler deploy --dry-run --outdir /tmp/kairos-hybrid-dry-run
          find /tmp/kairos-hybrid-dry-run -maxdepth 2 -type f -printf '%p %s bytes\n' | sort

      - name: Publish diagnostic receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          HYBRID_SHA: ${{ steps.hybrid.outputs.sha }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${BUILD_OUTCOME}" = "success" ]; then
            state="success"
            description="Hybrid validators and Wrangler dry-run passed"
          else
            state="failure"
            description="Hybrid build diagnostic failed; inspect run logs"
          fi
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(STATE="${state}" DESCRIPTION="${description}" TARGET_URL="${target_url}" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,description:process.env.DESCRIPTION,context:"kairos-hybrid-build-diagnostic",target_url:process.env.TARGET_URL}))')"
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${HYBRID_SHA}" \
            --data "${payload}"
          test "${BUILD_OUTCOME}" = "success"
