name: Validate Kairos Publishing Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare/mmg-ios/src/kairos-*publishing*'
      - 'cloudflare/mmg-ios/src/kairos-*manuscript*'
      - 'cloudflare/mmg-ios/src/kairos-*deliverable*'
      - 'cloudflare/mmg-ios/src/kairos-*package*'
      - 'cloudflare/mmg-ios/src/kairos-*cover*'
      - 'cloudflare/mmg-ios/src/kairos-*shopify-staging*'
      - 'cloudflare/mmg-ios/test/kairos-*'
      - 'server/kairos/publishing/**'
      - 'backend-tests/kairos-publishing-*'
      - 'web/kairos-dashboard/scripts/publishing-operations-center.js'
      - 'web/kairos-dashboard/styles/publishing-operations-center.css'
      - '.github/workflows/validate-kairos-publishing-pipeline.yml'
  workflow_dispatch:

concurrency:
  group: kairos-publishing-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publishing-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cloudflare/mmg-ios

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Worker dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate manuscript pipeline
        run: node --test test/kairos-*manuscript*.test.js

      - name: Validate publishing orchestration
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(printf '%s\n' test/kairos-*publishing*.test.js test/kairos-publishing-operational-fixture-v1.test.js | sort -u)
          for test_file in "${tests[@]}"; do
            echo "Testing ${test_file}"
            if ! node --test "${test_file}" > "${RUNNER_TEMP}/one-publishing-test.log" 2>&1; then
              echo "FAILED: ${test_file}"
              cat "${RUNNER_TEMP}/one-publishing-test.log"
              exit 1
            fi
            echo "PASSED: ${test_file}"
          done

      - name: Validate deliverable pipeline
        run: node --test test/kairos-*deliverable*.test.js

      - name: Validate publishing packages
        run: node --test test/kairos-*package*.test.js

      - name: Validate cover production
        run: node --test test/kairos-*cover*.test.js

      - name: Validate Shopify staging boundary
        run: node --test test/kairos-*shopify*.test.js

      - name: Validate Worker configuration
        run: npm run validate:production

      - name: Build deployment bundle
        run: npx wrangler deploy --dry-run
