name: Diagnose Homepage Plan

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-homepage-plan.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KAIROS_PRODUCTION_URL: https://mmg-ios.info-mindsetmediagroup.workers.dev
    steps:
      - name: Capture read-only planning response
        shell: bash
        run: |
          set +e
          cat > planning-request.json <<'JSON'
          {
            "objective": "Keep the currently published homepage framework exactly as it is. Rewrite the existing visible customer-facing copy so visitors clearly understand that Mindset Media Group helps creators, entrepreneurs, authors, educators, and small businesses turn knowledge, experience, and ideas into professional digital products, publishing assets, educational resources, business assets, and revenue-generating intellectual property. Do not change sections, blocks, images, buttons, links, navigation, colors, typography, spacing, styling, animation, layout, mobile behavior, Liquid logic, CSS, or assets.",
            "requestType": "homepage-preserve-design",
            "intent": "homepage-preserve-design",
            "homepageMode": "preserve-published-framework",
            "sourceOfTruth": "published-main-theme",
            "preserveExistingDesign": true,
            "preservePublishedFramework": true,
            "renderedTextRequired": true,
            "activeOrderedSectionsOnly": true,
            "activeOrderedBlocksOnly": true,
            "templateTextPreferred": true,
            "literalLiquidTextFallbackAuthorized": true,
            "structuralMutationAuthorized": false,
            "styleMutationAuthorized": false,
            "liquidStructureMutationAuthorized": false,
            "assetMutationAuthorized": false,
            "canonicalPackageAuthorized": false
          }
          JSON
          curl --silent --show-error --location --max-time 180 \
            -D response-headers.txt \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache' \
            --data-binary @planning-request.json \
            "${KAIROS_PRODUCTION_URL}/api/shopify/staging/plan/jobs" \
            --output response-body.json \
            --write-out '%{http_code}' > http-status.txt
          exit 0

      - name: Upload diagnostic response
        uses: actions/upload-artifact@v4
        with:
          name: homepage-plan-diagnostic
          path: |
            planning-request.json
            response-headers.txt
            response-body.json
            http-status.txt
          retention-days: 1

      - name: Publish diagnostic receipt
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(node -e 'process.stdout.write(JSON.stringify({state:"success",description:"Homepage plan diagnostic captured",context:"kairos-homepage-plan-diagnostic",target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`}))')"
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
