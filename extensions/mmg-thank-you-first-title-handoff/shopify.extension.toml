api_version = "2026-07"

[[extensions]]
type = "ui_extension"
name = "MMG First Title Handoff"
handle = "mmg-first-title-handoff"

[[extensions.targeting]]
target = "purchase.thank-you.block.render"
module = "./src/ThankYou.tsx"
default_placement = "ORDER_STATUS1"

[extensions.capabilities]
network_access = true

[extensions.settings]

[[extensions.settings.fields]]
key = "handoff_api_url"
type = "single_line_text_field"
name = "Kairos handoff API URL"
description = "Absolute HTTPS URL for POST /api/checkout/thank-you/subscription-handoff."

[[extensions.settings.fields]]
key = "customer_portal_url"
type = "single_line_text_field"
name = "Customer Portal URL"
description = "Fallback URL used when the secure handoff service is still preparing the membership."

[[extensions.settings.fields]]
key = "knowledge_library_url"
type = "single_line_text_field"
name = "Knowledge Library URL"
description = "Fallback URL for the first-title selection surface."
