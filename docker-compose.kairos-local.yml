services:
  kairos-model:
    image: ollama/ollama:latest
    container_name: kairos-model
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - kairos_ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  kairos-model-init:
    image: ollama/ollama:latest
    depends_on:
      kairos-model:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://kairos-model:11434
    entrypoint: ["/bin/sh", "-lc"]
    command: ["ollama pull qwen2.5:7b-instruct"]
    restart: "no"

volumes:
  kairos_ollama:
