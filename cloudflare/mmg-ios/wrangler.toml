name = "mmg-ios"
main = "src/kairos-production-entry-v23.js"
# Validated delegation ancestry (comments only; never active):
# main = "src/kairos-production-entry-v22.js"
# main = "src/kairos-production-entry-v21.js"
# main = "src/kairos-production-entry-v20.js"
# main = "src/kairos-production-entry-v19.js"
# main = "src/kairos-production-entry-v18.js"
# main = "src/kairos-production-entry-v17.js"
# main = "src/kairos-production-entry-v16.js"
# main = "src/kairos-production-entry-v15.js"
# main = "src/kairos-production-entry-v14.js"
# main = "src/kairos-production-entry-v13.js"
compatibility_date = "2026-07-11"
workers_dev = true
keep_vars = true

[assets]
directory = "../../web/kairos-dashboard"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[triggers]
crons = ["0 15 * * *", "0 2 * * *"]

[[durable_objects.bindings]]
name = "KAIROS_PROJECTS"
class_name = "KairosProject"

[[migrations]]
tag = "native-publishing-v1"
new_sqlite_classes = ["KairosProject"]

[vars]
SHOPIFY_STORE_DOMAIN = "07kd8e-qw.myshopify.com"
SHOPIFY_API_VERSION = "2026-07"
MMG_STOREFRONT_ORIGIN = "https://themindsetmediagroup.com"