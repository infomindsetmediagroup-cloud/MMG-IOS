name = "mmg-ios"
main = "src/kairos-production-entry-publishing-readiness-v1.js"
compatibility_date = "2026-07-11"
workers_dev = true
keep_vars = true

[assets]
directory = "../../web/kairos-dashboard"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[ai]
binding = "AI"

[images]
binding = "IMAGES"

[triggers]
crons = ["* * * * *", "0 15 * * *", "0 2 * * *"]

[[durable_objects.bindings]]
name = "KAIROS_PROJECTS"
class_name = "KairosProject"

[[migrations]]
tag = "native-publishing-v1"
new_sqlite_classes = ["KairosProject"]

# Required before production activation:
# `wrangler secret put KAIROS_API_TOKEN`
# `wrangler secret put KAIROS_MEDIA_SIGNING_SECRET`
# `wrangler secret put SHOPIFY_CLIENT_ID`
# `wrangler secret put SHOPIFY_CLIENT_SECRET`
# Optional legacy fallback: `wrangler secret put SHOPIFY_ADMIN_ACCESS_TOKEN`
# These secrets protect project routes, signed staging media, and Shopify DRAFT staging.

[vars]
SHOPIFY_STORE_DOMAIN = "07kd8e-qw.myshopify.com"
SHOPIFY_API_VERSION = "2026-07"
MMG_STOREFRONT_ORIGIN = "https://themindsetmediagroup.com"
KAIROS_WORKERS_AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
