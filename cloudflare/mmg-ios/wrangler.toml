name = "mmg-ios"
main = "src/kairos-production-entry-customer-delivery-v2.js"
compatibility_date = "2026-07-11"
workers_dev = true
keep_vars = true

[assets]
directory = "../../web/kairos-dashboard"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[images]
binding = "IMAGES"

[triggers]
crons = ["0 15 * * *", "0 2 * * *"]

[[durable_objects.bindings]]
name = "KAIROS_PROJECTS"
class_name = "KairosProject"

[[migrations]]
tag = "native-publishing-v1"
new_sqlite_classes = ["KairosProject"]

# Existing production secrets are retained by keep_vars=true.
# Manuscript production remains isolated from direct Shopify, theme, page, and navigation routes.
# Product DRAFT creation and live publication are available only through the exact auto-pipeline routes,
# after vault integrity verification and explicit user actions in Manuscript Studio.
# Digital Asset Edition V2 is mandatory for manuscript manufacturing and customer release packaging.
# Customer delivery attachment is mandatory before a Shopify digital-product draft is considered complete.
# Canonical approvals: Start Production Job, Approve Package, Approve & Publish Product.
# Cloudflare Workers AI is intentionally not bound and consumes zero neurons.
# Paid OpenAI API usage is disabled by default. It may be enabled only when verified free credits are explicitly authorized.
# Default manuscript processing is source-preserving, deterministic, and no-cost.
# Project setup reconciles a uniquely matching stored manuscript when intake refresh changes the active project ID.

[vars]
SHOPIFY_STORE_DOMAIN = "07kd8e-qw.myshopify.com"
SHOPIFY_API_VERSION = "2026-07"
MMG_STOREFRONT_ORIGIN = "https://themindsetmediagroup.com"
KAIROS_OPENAI_MODEL = "gpt-5"
KAIROS_OPENAI_FREE_CREDITS_ENABLED = "false"
KAIROS_NO_COST_MODE = "true"
KAIROS_CLOUDFLARE_NEURONS_ENABLED = "false"
KAIROS_MANUSCRIPT_RUNTIME_ENABLED = "true"
KAIROS_DIGITAL_ASSET_V2_REQUIRED = "true"
KAIROS_SHOPIFY_WRITES_ENABLED = "true"
KAIROS_SHOPIFY_LIVE_PUBLISH_ENABLED = "true"
