  <style>
    html{scroll-behavior:auto!important;overflow-anchor:none!important}
    body,#kairos-hub,.command-view,.parent-grid{overflow-anchor:none!important}
    .parent-card,.parent-card:hover,.parent-card:focus-visible{transform:none!important;transition:none!important}
    .mini-meter span,.readiness-overall span,.readiness-child-meter span{transition:none!important}
    .parent-card[data-route-center=knowledge] .parent-icon:before{content:"🧠"!important}

    .parent-card[data-route-center=business] .parent-icon:before{content:"💼"!important}

    .shopify-summary{margin:14px 0 26px;padding:18px;border:1px solid var(--line);border-radius:20px;background:rgba(10,16,23,.9)}
    .shopify-summary-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:14px}.shopify-summary-head h2{margin:0;font-size:20px}.shopify-summary-head small{color:var(--muted)}
    .shopify-summary-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.shopify-summary-controls>div{display:flex;gap:6px;flex-wrap:wrap}.shopify-summary-controls button{padding:8px 10px;border:1px solid #28465a;border-radius:10px;background:#0d1821;color:#cfe8f5;cursor:pointer}.shopify-summary-controls button[aria-pressed=true]{border-color:#27b5ff;background:#102c3d}
    .shopify-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.shopify-summary-grid article{min-width:0;padding:14px;border:1px solid #1c3040;border-radius:14px;background:#09121a}.shopify-summary-grid span,.shopify-summary-grid small{display:block;color:var(--muted);font-size:11px}.shopify-summary-grid strong{display:block;margin:7px 0 3px;font-size:22px;overflow-wrap:anywhere}
    @media(max-width:760px){.shopify-summary-head{flex-direction:column}.shopify-summary-controls{width:100%}.shopify-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
