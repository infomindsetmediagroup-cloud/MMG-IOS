<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kairos Operations Dashboard</title>
  <link rel="stylesheet" href="./styles/dashboard.css">
  <link rel="stylesheet" href="./styles/auth-shell.css">
</head>
<body>
  <div id="app" class="kairos-app">
    <aside class="sidebar" aria-label="Kairos navigation">
      <div class="brand-mark">
        <div class="brand-symbol">K</div>
        <div>
          <p class="eyebrow">MMG</p>
          <h1>Kairos</h1>
        </div>
      </div>
      <nav id="module-nav" class="module-nav"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Operations Command Center</p>
          <h2 id="page-title">Dashboard</h2>
        </div>
        <div class="operator-card">
          <span class="status-dot"></span>
          <div>
            <p class="eyebrow">Mode</p>
            <strong id="runtime-mode">Build</strong>
          </div>
        </div>
      </header>

      <section id="dashboard-view" class="dashboard-grid" aria-live="polite"></section>
    </main>
  </div>

  <script type="module" src="./scripts/auth-shell.js"></script>
  <script type="module" src="./scripts/dashboard.js"></script>
</body>
</html>
