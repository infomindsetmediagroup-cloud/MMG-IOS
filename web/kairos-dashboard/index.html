<body>
  <script>
    (() => {
      const marker = "kairos.command-center.reconciled.v44";
      try {
        if (!localStorage.getItem(marker)) {
          ["kairos.executive.command-center.v7","kairos.executive.command-center.v6","kairos.executive.command-center.v5","kairos.executive.command-center.v4","kairos.executive.command-center.v3","kairos.executive.command-center.v2","kairos.executive.command-center.v1"].forEach(key => localStorage.removeItem(key));
          localStorage.setItem(marker, new Date().toISOString());
        }
      } catch {}
    })();
  </script>
  <section id="kairos-startup-shell" class="auth-shell" aria-live="polite">
    <div class="auth-card">
      <div class="brand-symbol auth-symbol">K</div>
      <p class="eyebrow">Kairos Secure Access</p>
      <h2>Opening Command Center</h2>
      <p class="muted">Loading the secure operator session…</p>
      <p class="muted auth-note">If this message remains on screen, tap Retry to reload the application shell.</p>
      <button class="action-button" type="button" onclick="window.location.reload()">Retry</button>
    </div>
  </section>
  <div id="app" class="kairos-app">
    <header class="brand-header" aria-label="Kairos brand header">
      <img class="brand-strip" src="https://cdn.shopify.com/s/files/1/0754/4337/2186/files/kairos-app-header.png?v=1783815598" alt="Kairos Operating System — Mindset Media Group">
    </header>
    <aside class="sidebar" aria-label="Kairos navigation"><nav id="module-nav" class="module-nav"></nav></aside>
    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow">Operations Command Center</p><h2 id="page-title">Dashboard</h2><small aria-label="Command Center build">Build command-center-reconciled-baseline-20260711-44</small></div>
        <div class="operator-card"><span class="status-dot"></span><div><p class="eyebrow">Mode</p><strong id="runtime-mode">Operation</strong></div></div>
      </header>
      <section id="dashboard-view" class="dashboard-grid" aria-live="polite"></section>
    </main>
  </div>
