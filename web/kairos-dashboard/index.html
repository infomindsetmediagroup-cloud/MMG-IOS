  <script type="module" src="/scripts/executive-checkpoints.js?v=routed-20260715-3"></script>
  <script>
  (()=>{
    const ONLINE=new Set(["ready","ok","operational"]);
    let timer=0;
    let running=false;
    let lastKnownOnline=true;
    const headerFind=(selector)=>document.querySelector(`#kairos-runtime-header ${selector}`);
    const appFind=(selector)=>document.querySelector(`#kairos-hub ${selector}`);
    const updateClock=()=>{const clock=headerFind("[data-runtime-time]");if(clock)clock.textContent=new Date().toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});};
    const paint=(online,latency)=>{
      updateClock();
      const dot=headerFind("[data-runtime-dot]");
      const label=headerFind("[data-runtime-label]");
      const signal=appFind("[data-runtime-signal]");
      const card=appFind("[data-runtime-card]");
      const value=appFind("[data-runtime-value]");
      const detail=appFind("[data-runtime-detail]");
      const wave=appFind("[data-runtime-wave]");
      if(dot)dot.className=`state-dot ${online?"":"offline"}`.trim();
      if(label)label.textContent=online?"Online":"Offline";
      if(signal)signal.textContent=online?"Live":"Runtime unavailable";
      if(card)card.dataset.state=online?"live":"limited";
      if(value)value.textContent=online?"Online":"Unavailable";
      if(detail)detail.textContent=latency?`${latency} ms response`:online?"Cloudflare edge connected":"No health response";
      if(wave)wave.classList.toggle("active",online);
    };
    const schedule=(delay)=>{clearTimeout(timer);timer=setTimeout(probe,delay);};
    async function probe(){
      if(running)return;
      running=true;
      updateClock();
      const started=performance.now();
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),7000);
      try{
        const response=await fetch(`/api/health?header-inline=${Date.now()}`,{cache:"no-store",credentials:"same-origin",headers:{"Cache-Control":"no-cache"},signal:controller.signal});
        const body=await response.json();
        const online=response.ok&&ONLINE.has(String(body&&body.status||"").toLowerCase());
        lastKnownOnline=online;
        paint(online,Math.max(1,Math.round(performance.now()-started)));
        schedule(online?30000:5000);
      }catch(error){
        paint(lastKnownOnline,null);
        schedule(lastKnownOnline?15000:3000);
      }finally{
        clearTimeout(timeout);
        running=false;
      }
    }
    const boot=()=>{
      paint(true,null);
      probe();
      window.addEventListener("online",probe);
      window.addEventListener("focus",probe);
      window.addEventListener("pageshow",probe);
      document.addEventListener("visibilitychange",()=>{if(!document.hidden)probe();});
    };
    if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  })();
  </script>
