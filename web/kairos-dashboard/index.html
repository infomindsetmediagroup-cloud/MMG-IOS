px}.wave i{display:block;flex:1;min-width:3px;height:var(--h);border-radius:5px;background:linear-gradient(to top,rgba(39,181,255,.12),rgba(39,181,255,.8));transform-origin:bottom;animation:signal 1.8s ease-in-out infinite;animation-delay:var(--d)}@keyframes signal{0%,100%{transform:scaleY(.45);opacity:.45}50%{transform:scaleY(1);opacity:1}}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}.metric{min-height:104px;padding:17px;border:1px solid var(--line);border-radius:18px;background:rgba(10,16,23,.86)}.metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;margin:8px 0 2px;font-size:24px}.metric small{color:#718292}.metric[data-state=live] strong{color:#dff9ed}.metric[data-state=limited] strong{color:#ffe1a6}.section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin:30px 0 14px}.section-head h2{margin:0;font-size:22px}.parent-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.parent-card{position:relative;min-height:230px;padding:19px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(155deg,rgba(15,24,34,.98),rgba(7,11,16,.98));overflow:hidden;cursor:pointer;text-align:left;color:inherit}.parent-card:hover,.parent-card:focus-visible{border-color:#2e7196;outline:none}.card-top{display:flex;justify-content:space-between;gap:12px}.parent-icon{display:grid;place-items:center;width:50px;height:50px;border:1px solid #2d5e7d;border-radius:15px;background:radial-gradient(circle at 35% 25%,#183447,#0a151f 62%,#05090d);font-size:27px}.card-signal{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:10px}.card-signal i{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green)}.parent-card h3{margin:24px 0 6px;font-size:19px}.parent-card>p{margin:0;color:var(--muted);font-size:12px;min-height:54px}.mini-meter{height:3px;margin:23px 0 10px;border-radius:4px;background:#14212c;overflow:hidden}.mini-meter span{display:block;width:100%;height:100%;background:linear-gradient(90deg,#187bad,var(--cyan))}.card-foot{display:flex;justify-content:space-between;color:#7790a2;font-size:10px}.card-foot b{color:#b7c9d5}.route-breadcrumb{display:flex;align-items:center;gap:8px;margin:18px 0 24px;color:var(--muted);font-size:12px}.route-breadcrumb button,.back{border:0;background:transparent;color:var(--cyan);cursor:pointer;padding:7px}.route-hero{padding:16px 0 22px}.children{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.child-card{padding:19px;border:1px solid #1b2a37;border-radius:18px;background:#0b1219}.child-readiness{display:flex;align-items:center;justify-content:space-between;gap:10px}.child-readiness span{color:#9fc7dc;font-size:10px;font-weight:800}.child-card h3{margin:8px 0 7px;font-size:16px}.child-card p{min-height:44px;margin:0 0 18px;color:var(--muted);font-size:12px}.child-action{width:100%;padding:11px 14px;border:1px solid #285a76;border-radius:12px;background:#102331;color:#dff6ff;font-weight:700;cursor:pointer}.workspace-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;padding:20px 0;border-bottom:1px solid var(--line)}.workspace-head h1{font-size:clamp(30px,4vw,50px)}.job{margin-top:18px;padding:24px;border:1px solid #24506a;border-radius:20px;background:linear-gradient(145deg,#0d1923,#091017)}.objective-label{display:block;margin:16px 0 7px;color:#c9d9e5;font-size:12px;font-weight:700}.objective,.website-scope-select,.native-select{display:block;width:100%;border:1px solid #263b4c;border-radius:14px;background:#070c11;color:var(--text);outline:none}.objective{min-height:150px;resize:vertical;padding:16px}.website-scope-select,.native-select{padding:12px}.objective:focus,.website-scope-select:focus,.native-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(39,181,255,.1)}.job-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:1 :16px 0}.website-preview-links a,.website-live-link{display:inline-flex;padding:11px 14px;border:1px solid #2f789f;border-radius:12px;background:#0e2230;color:#dff6ff;text-decoration:none}.website-checks{display:grid;gap:8px}.website-check{display:flex;gap:10px;padding:12px;border:1px solid #1d3546;border-radius:12px;background:#08131b}.website-check.passed b{color:var(--green)}.website-check small{display:block;color:var(--muted)}.status-line{display:flex;align-items:center;gap:9px;color:#a9b8c4}.spinner{width:14px;height:14px;border:2px solid #23475d;border-top-color:var(--cyan);border-radius:50%;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.deliverable{margin-top:18px;padding:19px;border:1px solid #23644f;border-radius:16px;background:linear-gradient(145deg,#0d211b,#091510)}.error{color:#ffadb7}.startup-failure{max-width:760px;margin:40px auto;padding:24px;border:1px solid #7a3540;border-radius:18px;background:#1b0c10}.startup-failure h1{margin-top:0}

<body>
  <header id="kairos-runtime-header" class="app-header">
    <img class="app-header-image" src="https://cdn.shopify.com/s/files/1/0754/4337/2186/files/kairos-app-header.png?v=1783815598" alt="Kairos Operating System — Mindset Media Group">
    <div class="app-header-status"><span data-runtime-time></span><span class="live-state"><i class="state-dot" data-runtime-dot></i><span data-runtime-label>Connecting</span></span></div>
  </header>
  <div id="kairos-hub" class="hub-shell" data-self-contained-build="kairos-command-center-inline-20260717-1"><main class="command-view"><p class="status-line"><i class="spinner"></i>Loading Kairos Command Center.</p></main></div>
  <script>
  (()=>{
    "use strict";
    const BUILD="kairos-command-center-inline-20260717-1";
    const WEBSITE_KEY="kairos.website.inline-flow.v1";
    const root=document.querySelector("#kairos-hub");
    const clock=document.querySelector("[data-runtime-time]");
    const runtimeLabel=document.querySelector("[data-runtime-label]");
    const runtimeDot=document.querySelector("[data-runtime-dot]");
    const centers=[
      {id:"knowledge",icon:"🧠",title:"Knowledge",description:"Doctrine, research, decisions, and reusable intelligence.",children:[["Knowledge Library","Search authoritative MMG knowledge.","Open Library","knowledge-library"],["Research Brief","Build a structured evidence-ready brief.","Start Research","research-brief"],["Decision Record","Preserve an approved decision and its impact.","Record Decision","decision-record"],["Doctrine Vault","Review canonical MMG and Kairos operating doctrine.","Open Doctrine","doctrine-vault"],["Intelligence Synthesis","Combine verified knowledge into an actionable executive synthesis.","Build Synthesis","intelligence-synthesis"]]},
      {id:"content",icon:"🎬",title:"Content",description:"Website, publishing, social, visual assets, and production.",children:[["Website Retool","Plan, approve, execute, and verify staging website changes.","Start Website Retool","website"],["Manuscript Studio","Upload, preserve, and advance manuscripts into production.","Open Manuscript Studio","manuscript-studio"],["Social Production","Build governed social content packages.","Open Social Production","social-production"],["Publishing Studio","Create publication production packages.","Create Publication","publishing-studio"],["Creative Studio","Create governed creative production briefs.","Create Asset","creative-studio"]]},
      {id:"business",icon:"💼",title:"Business",description:"Products, revenue, growth, offers, and campaigns.",children:[["Product Launch","Build a complete launch package.","Start Product Launch","product-launch"],["Revenue Intelligence","Review verified commerce performance.","Run Revenue Review","revenue-intelligence"],["Growth Plan","Build a measurable MMG growth plan.","Build Growth Plan","growth-plan"],["Offer Builder","Shape an offer, value proposition, and delivery model.","Build Offer","offer-builder"],["Campaign Operations","Coordinate campaign objectives, assets, timing, and measurement.","Open Campaign","campaign-operations"]]},
      {id:"customers",icon:"👥",title:"Customers",description:"Visitor activity, customer journeys, support, and delivery.",children:[["Visitor Activity","Inspect verified visitor evidence.","Review Activity","visitor-activity"],["Customer Portal","Open customer projects and approvals.","Open Customer Hub","customer-portal"],["Deliverables","Inspect completed customer work.","View Deliverables","deliverables"],["Customer Journey","Review the end-to-end customer experience.","Open Journey","customer-journey"],["Support Intelligence","Organize support needs, recurring issues, and resolutions.","Review Support","support-intelligence"]]},
      {id:"operations",icon:"⚙️",title:"Operations",description:"Runtime, queues, approvals, releases, and system control.",children:[["Runtime Health","Inspect live runtime and capabilities.","Refresh Health","health"],["Work Queue","Inspect active and completed work.","View Queue","work-queue"],["Release Control","Inspect approvals, verification, and rollback.","Open Releases","release-control"],["Executive Briefing","Review approval-ready work and governed decisions.","Open Briefing","executive-briefing"],["System Registry","Inspect canonical services, routes, assets, and ownership.","Open Registry","system-registry"]]}
    ];
    const state={route:parseRoute(location.pathname),working:false,error:"",result:null,health:null,website:loadWebsite()};
    window.KairosCommandHub={build:BUILD,home:()=>navigate({level:"home",centerID:null,actionID:null}),openCenter:centerID=>navigate({level:"center",centerID,actionID:null}),openWorkspace:(centerID,actionID)=>navigate({level:"workspace",centerID,actionID})};
    window.addEventListener("popstate",()=>{state.route=parseRoute(location.pathname);state.error="";state.result=null;render();});
    window.addEventListener("pageshow",()=>{paintClock();probeHealth();});
    window.addEventListener("online",probeHealth);
    try{render();document.documentElement.dataset.kairosBoot="ready";paintClock();probeHealth();setInterval(()=>{paintClock();probeHealth();},30000);}catch(error){showStartupFailure(error);}

    function render(){
      if(state.route.level==="workspace")renderWorkspace();
      else if(state.route.level==="center")renderCenter();
      else renderHome();
      bind();
      document.documentElement.dataset.kairosBoot="ready";
      root.dataset.selfContainedBuild=BUILD;
    }
    function renderHome(){
      root.innerHTML=`<main id="command-view" class="command-view"><section class="hero"><div><p class="eyebrow">Executive Command Center</p><h1>One objective.<br>Coordinated execution.</h1><p class="hero-copy">Five operating centers. Twenty-five permanent workspaces. Every tool opens through one stable command surface.</p></div><aside class="pulse-panel"><div class="pulse-head"><strong>Operating signal</strong><span class="quiet" data-runtime-signal>Connecting</span></div><div class="wave" data-runtime-wave>${Array.from({length:16},(_,i)=>`<i style="--h:${35+((i*19)%58)}%;--d:-${i*.09}s"></i>`).join("")}</div></aside></section><section class="metrics"><article class="metric" data-runtime-card><span>Runtime</span><strong data-runtime-value>Checking</strong><small data-runtime-detail>Connecting to Cloudflare</small></article><article class="metric" data-state="live"><span>Parent centers</span><strong>5</strong><small>Canonical operating centers</small></article><article class="metric" data-state="live"><span>Child workspaces</span><strong>25</strong><small>Permanent operational entry points</small></article><article class="metric" data-state="live"><span>App shell</span><strong>Ready</strong><small>${BUILD}</small></article></section><div class="section-head"><div><p class="eyebrow">Operating Centers</p><h2>Choose where Kairos should work</h2></div></div><section class="parent-grid">${centers.map(parentCard).join("")}</section></main>`;
      paintHealth();
    }
    function renderCenter(){
      const center=currentCenter();if(!center){state.route={level:"home",centerID:null,actionID:null};return renderHome();}
      root.innerHTML=`<main id="command-view" class="command-view"><section class="route-page center-page"><nav class="route-breadcrumb"><button type="button" data-home>Command Center</button><span>›</span><strong>${esc(center.title)} Center</strong></nav><header class="route-hero"><div><p class="eyebrow">${esc(center.title)} Center · 5 workspaces</p><h1>${esc(center.title)}</h1><p>${esc(center.description)}</p></div></header><div class="section-head"><div><p class="eyebrow">Child Workspaces</p><h2>Choose the directive to execute</h2></div><button class="back" type="button" data-home>Return to Command Center</button></div><section class="children">${center.children.map(child=>childCard(center,child)).join("")}</section></section></main>`;
    }
    function renderWorkspace(){
      const center=currentCenter(),child=currentChild();if(!center||!child){state.route={level:"home",centerID:null,actionID:null};return renderHome();}
      const actionID=child[3];
      root.innerHTML=`<main id="command-view" class="command-view"><section class="route-page child-workspace-page"><nav class="route-breadcrumb"><button type="button" data-home>Command Center</button><span>›</span><button type="button" data-center="${attr(center.id)}">${esc(center.title)} Center</button><span>›</span><strong>${esc(child[0])}</strong></nav><header class="workspace-head"><div><p class="eyebrow">${esc(center.title)} Center</p><h1>${esc(child[0])}</h1><p>${esc(child[1])}</p></div><button class="back" type="button" data-center="${attr(center.id)}">Return to ${esc(center.title)} Center</button></header><section class="job">${actionID==="website"?websiteBody():genericBody(child)}</section></section></main>`;
    }
    function parentCard(center){return `<button class="parent-card" type="button" data-center="${attr(center.id)}"><div class="card-top"><span class="parent-icon">${center.icon}</span><span class="card-signal"><i></i>READY</span></div><h3>${esc(center.title)}</h3><p>${esc(center.description)}</p><div class="mini-meter"><span></span></div><div class="card-foot"><b>Operational</b><span>Open center →</span></div></button>`;}
    function childCard(center,child){return `<article class="child-card"><div class="child-readiness"><p class="eyebrow">${esc(center.title)}</p><span>READY</span></div><h3>${esc(child[0])}</h3><p>${esc(child[1])}</p><button class="child-action" type="button" data-workspace="${attr(child[3])}">${esc(child[2])}</button></article>`;}
    function genericBody(child){
      if(state.working)return `<p class="status-line"><i class="spinner"></i>Kairos is executing this directive.</p>`;
      if(state.result)return resultPanel(state.result);
      return `<p>${esc(child[1])}</p><label class="objective-label" for="directive-objective">Objective</label><textarea class="objective" id="directive-objective" maxlength="12000" placeholder="Describe what Kairos should do in this workspace."></textarea>${state.error?`<p class="error">${esc(state.error)}</p>`:""}<div class="job-actions"><button class="primary" type="button" data-run-directive>${esc(child[2])}</button></div>`;
    }
    function websiteBody(){
      const w=state.website;
      if(w.mode==="working")return `${stages("plan")}<p class="status-line"><i class="spinner"></i>Inspecting Shopify staging and preparing the governed execution package.</p>`;
      if(w.mode==="executing")return `${stages("stage")}<p class="status-line"><i class="spinner"></i>Building and verifying the approved non-live Shopify preview.</p>`;
      if(w.mode==="previewing")return `${stages("preview")}<p class="status-line"><i class="spinner"></i>Probing the staging storefront and preparing preview links.</p>`;
      if(w.mode==="publishing")return `${stages("publish")}<p class="status-line"><i class="spinner"></i>Applying and verifying the approved live release.</p>`;
      if(w.mode==="review")return planReview(w);
      if(w.mode==="preview")return previewView(w);
      if(w.mode==="release")return releaseView(w);
      if(w.mode==="complete")return completionView(w);
      const full=w.requestType==="full-retool";
      return `${stages("objective")}<p>Describe the website outcome. Kairos will inspect the real Shopify source, create a non-live staging proposal, and stop for approval.</p><label class="objective-label" for="website-request-type">Change scope</label><select class="website-scope-select" id="website-request-type"><option value="content-only"${full?"":" selected"}>Content only — preserve structure and styling</option><option value="full-retool"${full?" selected":""}>Homepage copy + approved native header/footer changes</option></select><label class="website-confirm"><input type="checkbox" data-full-confirm><span>I authorize bounded structure and styling changes on the non-live Kairos Staging theme only.</span></label><label class="objective-label" for="website-objective">Website objective</label><textarea class="objective" id="website-objective" maxlength="12000" placeholder="Describe the homepage changes Kairos should prepare.">${esc(w.objective)}</textarea>${state.error?`<p class="error">${esc(state.error)}</p>`:""}<div class="job-actions"><button class="primary" type="button" data-website-plan>Inspect &amp; Prepare Proposal</button></div>`;
    }
    function stages(active){const rows=[["objective","1 · Objective"],["plan","2 · Proposal"],["stage","3 · Build Preview"],["preview","4 · Review"],["publish","5 · Apply & Verify"]],index=Math.max(0,rows.findIndex(([id])=>id===active));return `<div class="website-stage-row">${rows.map(([id,label],i)=>`<span class="website-stage ${i<index?"done":i===index?"active":""}">${label}</span>`).join("")}</div>`;}
    function planReview(w){
      const plan=w.plan||{},changes=extractChanges(plan),candidates=nativeCandidates(plan);
      return `${stages("plan")}<div class="website-status-banner"><span>Staging proposal</span><strong>${esc(plan.summary||"Execution package prepared")}</strong></div><p>${esc(plan?.plan?.strategy||plan?.plan?.summary||"Kairos prepared a bounded, reversible staging change.")}</p><div class="website-review-grid"><article><h4>Verified changes</h4>${changes.length?`<ul>${changes.slice(0,12).map(item=>`<li><strong>${esc(item.filename||item.location||"Homepage")}</strong> — ${esc(item.purpose||item.reason||item.expectedOutcome||"Approved visible change")}</li>`).join("")}</ul>`:"<p>No executable changes were returned.</p>"}</article><article><h4>Protected boundary</h4><p>Kairos Staging only</p><small>Live theme remains unchanged until final approval.</small></article></div>${w.requestType==="full-retool"?nativeReview(candidates):""}${state.error?`<p class="error">${esc(state.error)}</p>`:""}<div class="job-actions"><button class="primary" type="button" data-website-execute ${changes.length?"":"disabled"}>Approve &amp; Build Preview</button><button class="secondary" type="button" data-website-revise>Revise Request</button></div>`;
    }
    function nativeReview(candidates){return `<section class="native-grid"><div><p class="eyebrow">Native Shopify header and footer</p><h3>Choose exact verified settings</h3></div>${candidates.map((candidate,index)=>nativeOption(candidate,index)).join("")||"<p>No native setting candidates were returned. The current header and footer will remain unchanged.</p>"}<label class="website-confirm"><input type="checkbox" data-native-keep><span>Keep the current native Shopify header and footer unchanged.</span></label></section>`;}
    function nativeOption(candidate,index){const options=Array.isArray(candidate.allowedValues)?candidate.allowedValues:[],needsValue=candidate.proposedValue===null||candidate.proposedValue===undefined;return `<label class="native-option"><input type="checkbox" data-native-change="${index}"><span><strong>${esc(candidate.authorizedChange||candidate.key||candidate.category||"Theme setting")}</strong><small>${esc(candidate.filename||"Theme settings")} · current: ${esc(candidate.currentValuePreview??candidate.currentValue??"not set")}</small>${options.length?`<select class="native-select" data-native-value="${index}"><option value="">Choose verified value</option>${options.map(option=>`<option value="${attr(option.value)}">${esc(option.value)}${option.background?` · ${esc(option.background)}`:""}</option>`).join("")}</select>`:needsValue?"<em>Exact value requires review.</em>":`<em>Proposed: ${esc(candidate.proposedValue)}</em>`}<em>${esc(candidate.rationale||"")}</em></span></label>`;}
    function previewView(w){const review=w.verification||{},preview=review.preview||{},checks=Array.isArray(review.automatedChecks)?review.automatedChecks:[];return `${stages("preview")}<div class="website-status-banner"><span>Non-live preview ready</span><strong>${esc(preview.targetThemeName||"Kairos Staging")}</strong></div><div class="website-preview-links"><a href="${attr(preview.mobileURL||preview.url||"#")}" target="_blank" rel="noopener">Open Mobile Preview ↗</a><a href="${attr(preview.desktopURL||preview.url||"#")}" target="_blank" rel="noopener">Open Desktop Preview ↗</a></div><div class="website-checks">${checks.map(item=>`<div class="website-check ${item.passed?"passed":"review"}"><b>${item.passed?"✓":"!"}</b><span><strong>${esc(item.id||"Check")}</strong><small>${esc(item.detail||"")}</small></span></div>`).join("")||"<p>Preview is ready for executive review.</p>"}</div><label class="website-confirm"><input type="checkbox" data-preview-reviewed><span>I reviewed the staging preview and approve this exact result for live release preparation.</span></label>${state.error?`<p class="error">${esc(state.error)}</p>`:""}<div class="job-actions"><button class="primary" type="button" data-preview-approve>Approve Preview &amp; Continue</button><button class="secondary" type="button" data-preview-refresh>Refresh Preview Checks</button><button class="secondary" type="button" data-website-revise>Request Revision</button></div>`;}
    function releaseView(w){const release=w.release||{};return `${stages("publish")}<div class="website-status-banner"><span>Preview approved</span><strong>Ready to apply and verify</strong></div><div class="website-review-grid"><article><h4>Live target</h4><p>${esc(release.liveTheme?.name||"Verified Shopify MAIN theme")}</p></article><article><h4>Release package</h4><p>${esc(release.releaseID||"Prepared")}</p></article></div><label class="website-confirm"><input type="checkbox" data-live-approved><span>I authorize Kairos to apply this approved preview to the live website and verify the result.</span></label>${state.error?`<p class="error">${esc(state.error)}</p>`:""}<div class="job-actions"><button class="primary" type="button" data-website-publish>Apply &amp; Save Website</button><button class="secondary" type="button" data-back-preview>Back to Preview</button></div>`;}
    function completionView(w){const release=w.release||{},probe=release.publication?.liveProbe||release.rollback?.liveProbe||{};return `${stages("publish")}<div class="website-status-banner"><span>${esc(release.status||"completed")}</span><strong>Website transaction complete</strong></div><div class="website-review-grid"><article><h4>Live verification</h4><p>HTTP ${esc(probe.status??"—")} · ${esc(probe.title||"Storefront verification recorded")}</p></article><article><h4>Release receipt</h4><p>${esc(release.releaseID||"Recorded")}</p></article></div>${probe.finalURL?`<a class="website-live-link" href="${attr(probe.finalURL)}" target="_blank" rel="noopener">Open Live Website ↗</a>`:""}<div class="job-actions"><button class="primary" type="button" data-website-new>Start Another Website Job</button></div>`;}
    function resultPanel(result){const sections=Array.isArray(result?.sections)?result.sections:[];return `<div class="deliverable"><strong>${esc(result?.summary||"Directive completed.")}</strong><p>Status: ${esc(result?.status||"completed")}</p>${sections.map(section=>`<section><h4>${esc(section.name||"Result")}</h4><p>${esc(section.content||section.summary||"")}</p></section>`).join("")}</div><div class="job-actions"><button class="secondary" type="button" data-reset>Start Again</button></div>`;}
    function bind(){
      root.querySelectorAll("[data-home]").forEach(button=>button.addEventListener("click",()=>navigate({level:"home",centerID:null,actionID:null})));
      root.querySelectorAll("[data-center]").forEach(button=>button.addEventListener("click",()=>navigate({level:"center",centerID:button.dataset.center,actionID:null})));
      root.querySelectorAll("[data-workspace]").forEach(button=>button.addEventListener("click",()=>navigate({level:"workspace",centerID:state.route.centerID,actionID:button.dataset.workspace})));
      root.querySelector("[data-run-directive]")?.addEventListener("click",runDirective);
      root.querySelector("[data-reset]")?.addEventListener("click",()=>{state.result=null;state.error="";render();});
      root.querySelector("[data-website-plan]")?.addEventListener("click",preparePlan);
      root.querySelector("[data-website-execute]")?.addEventListener("click",executePlan);
      root.querySelector("[data-preview-approve]")?.addEventListener("click",approvePreview);
      root.querySelector("[data-preview-refresh]")?.addEventListener("click",preparePreview);
      root.querySelector("[data-website-publish]")?.addEventListener("click",publishRelease);
      root.querySelector("[data-back-preview]")?.addEventListener("click",()=>{state.website.mode="preview";saveWebsite();render();});
      root.querySelector("[data-website-new]")?.addEventListener("click",resetWebsite);
      root.querySelectorAll("[data-website-revise]").forEach(button=>button.addEventListener("click",resetWebsite));
      const keep=root.querySelector("[data-native-keep]");const choices=[...root.querySelectorAll("[data-native-change]")];
      keep?.addEventListener("change",()=>{if(keep.checked)choices.forEach(choice=>choice.checked=false);});
      choices.forEach(choice=>choice.addEventListener("change",()=>{if(choice.checked&&keep)keep.checked=false;}));
    }
    async function runDirective(){
      if(state.working)return;const objective=root.querySelector("#directive-objective")?.value.trim()||"Review the current authoritative state and return the next actionable result.";
      state.working=true;state.error="";render();
      try{const{response,body}=await fetchJSON("/api/hub/run",{method:"POST",headers:{"Content-Type":"application/json","X-MMG-Client-Build":BUILD},credentials:"include",body:JSON.stringify({action:state.route.actionID,objective})});if(!response.ok)throw new Error(body?.error?.message||body?.summary||`Kairos returned ${response.status}.`);state.result=body;}catch(error){state.error=error.message||"Kairos could not complete this directive.";}finally{state.working=false;render();}
    }
    async function preparePlan(){
      const objective=root.querySelector("#website-objective")?.value.trim()||"",requestType=root.querySelector("#website-request-type")?.value==="full-retool"?"full-retool":"content-only";
      if(objective.length<3){state.error="Describe the website outcome before Kairos begins.";render();return;}
      if(requestType==="full-retool"&&!root.querySelector("[data-full-confirm]")?.checked){state.error="Confirm the staging-only authorization before preparing the combined retool.";render();return;}
      state.website={...state.website,mode:"working",objective,requestType};state.error="";saveWebsite();render();
      try{const submitted=await submitJob("/api/shopify/staging/plan/jobs",{objective,requestType,intent:requestType,fullRetoolConfirmed:requestType==="full-retool",structuralMutationAuthorized:requestType==="full-retool",styleMutationAuthorized:requestType==="full-retool",contentOnlyLocked:requestType!=="full-retool"});state.website.plan=await pollJob(submitted,"plan");state.website.mode="review";}catch(error){state.error=error.message||"Kairos could not prepare the staging proposal.";state.website.mode="input";}saveWebsite();render();
    }
    function collectNativeDecision(plan){
      if(state.website.requestType!=="full-retool")return undefined;
      const candidates=nativeCandidates(plan),selected=[];
      root.querySelectorAll("[data-native-change]:checked").forEach(input=>{const index=Number(input.dataset.nativeChange),candidate=candidates[index];if(!candidate)return;let proposedValue=candidate.proposedValue;if(proposedValue===null||proposedValue===undefined){proposedValue=root.querySelector(`[data-native-value="${index}"]`)?.value||"";if(!proposedValue)throw new Error(`Choose the verified value for ${candidate.key||candidate.category||"the selected theme setting"}.`);}selected.push({...candidate,proposedValue,executiveDecision:"approved"});});
      const keep=root.querySelector("[data-native-keep]")?.checked===true;if(!selected.length&&!keep)throw new Error("Select at least one verified header/footer setting or explicitly keep the current native theme settings.");
      return{nativeThemeDecision:selected.length?"approved-selection":"keep-current",selectedChanges:selected};
    }
    async function executePlan(){
      const plan=state.website.plan;if(!plan)return;let websiteRetool;
      try{websiteRetool=collectNativeDecision(plan);}catch(error){state.error=error.message;render();return;}
      state.website.mode="executing";state.error="";saveWebsite();render();
      try{const approval={status:"approved",approvedAt:new Date().toISOString(),build:BUILD,planID:plan.planID,actionID:plan.actionID,targetThemeID:plan?.plan?.targetTheme?.gid||"",sourceHashes:plan?.plan?.sourceHashes||{},objective:plan.objective||state.website.objective};const submitted=await submitJob("/api/shopify/staging/execute/jobs",{plan,approval,websiteRetool});state.website.execution=await pollJob(submitted,"execute");await preparePreview();}catch(error){state.error=error.message||"Kairos could not build the staging preview.";state.website.mode="review";saveWebsite();render();}
    }
    async function preparePreview(){
      const execution=state.website.execution;if(!execution){state.error="The staging execution receipt is missing.";state.website.mode="review";saveWebsite();render();return;}
      state.website.mode="previewing";state.error="";saveWebsite();render();
      try{state.website.verification=await requestJSON("/api/shopify/staging/visual-verification",{execution:execution.execution,result:execution,requestType:"homepage",path:"/"});state.website.mode="preview";}catch(error){state.error=error.message||"Kairos could not prepare the rendered preview.";state.website.mode="preview";}saveWebsite();render();
    }
    async function approvePreview(){
      if(!root.querySelector("[data-preview-reviewed]")?.checked){state.error="Confirm that you reviewed the staging preview before continuing.";render();return;}
      const review=state.website.verification;if(!review?.reviewID){state.error="The staging review receipt is missing.";render();return;}
      try{state.website.verification=await requestJSON("/api/shopify/staging/visual-approval",{reviewID:review.reviewID,decision:"approved",actor:"Executive",notes:"Rendered staging preview reviewed and approved."});state.website.release=await requestJSON("/api/shopify/homepage-release/prepare",{reviewID:review.reviewID});state.website.mode="release";state.error="";}catch(error){state.error=error.message||"Kairos could not prepare the live release.";}saveWebsite();render();
    }
    async function publishRelease(){
      if(!root.querySelector("[data-live-approved]")?.checked){state.error="Confirm the final live authorization before continuing.";render();return;}
      const release=state.website.release;if(!release?.releaseID){state.error="The approved release package is missing.";render();return;}
      state.website.mode="publishing";state.error="";saveWebsite();render();
      try{state.website.release=await requestJSON("/api/shopify/homepage-release/publish",{releaseID:release.releaseID,confirmation:"APPLY APPROVED HOMEPAGE",actor:"Executive"});state.website.mode="complete";}catch(error){state.error=error.message||"Kairos could not apply and verify the approved homepage.";state.website.mode="release";}saveWebsite();render();
    }
    function resetWebsite(){state.website=freshWebsite();state.error="";try{sessionStorage.removeItem(WEBSITE_KEY);}catch{}render();}
    function navigate(route){state.route=route;state.error="";state.result=null;history.pushState(route,"",routePath(route));render();}
    function parseRoute(path){const parts=String(path||"/").split("/").filter(Boolean);if(parts[0]==="center"&&parts[1])return parts[2]?{level:"workspace",centerID:parts[1],actionID:parts[2]}:{level:"center",centerID:parts[1],actionID:null};return{level:"home",centerID:null,actionID:null};}
    function routePath(route){if(route.level==="workspace")return `/center/${encodeURIComponent(route.centerID)}/${encodeURIComponent(route.actionID)}`;if(route.level==="center")return `/center/${encodeURIComponent(route.centerID)}`;return "/";}
    function currentCenter(){return centers.find(center=>center.id===state.route.centerID)||null;}function currentChild(){return currentCenter()?.children.find(child=>child[3]===state.route.actionID)||null;}
    function extractChanges(plan){const direct=Array.isArray(plan?.plan?.changes)?plan.plan.changes.filter(item=>item.changeType!=="no-change"&&item.changeType!=="native-theme-exception-candidate"):[];const liquid=(Array.isArray(plan?.plan?.liquidTextPatches)?plan.plan.liquidTextPatches:[]).flatMap(patch=>(patch.replacements||[]).map(replacement=>({filename:patch.filename,reason:replacement.reason,location:replacement.id})));const template=Array.isArray(plan?.plan?.templateTextPatch?.operations)?plan.plan.templateTextPatch.operations:[];return[...direct,...liquid,...template];}
    function nativeCandidates(plan){const exceptions=plan?.plan?.websiteRetoolExceptions||{};return[...(Array.isArray(exceptions.highConfidence)?exceptions.highConfidence:[]),...(Array.isArray(exceptions.executiveReview)?exceptions.executiveReview:[])];}
    async function submitJob(url,payload){const{response,body}=await fetchJSON(url,{method:"POST",headers:{"Content-Type":"application/json","X-MMG-Client-Build":BUILD},credentials:"include",body:JSON.stringify(payload)});if(!response.ok||!body?.jobID)throw new Error(body?.error?.message||body?.summary||`Kairos returned ${response.status}.`);return body;}
    async function pollJob(submitted,type){if(submitted?.status==="completed"&&submitted?.result)return submitted.result;const deadline=Date.now()+600000;while(Date.now()<deadline){await new Promise(resolve=>setTimeout(resolve,750));const{response,body}=await fetchJSON(submitted.pollURL||`/api/shopify/staging/${type}/jobs/${submitted.jobID}`,{credentials:"include"});if(body?.status==="completed"&&body?.result)return body.result;if(["needs-attention","failed","cancelled","blocked"].includes(body?.status)||(!response.ok&&response.status!==202))throw new Error(body?.error?.message||body?.summary||`${type} did not complete.`);}throw new Error("Kairos is still working. Reopen Website Retool to continue monitoring the preserved job.");}
    async function requestJSON(url,payload){const{response,body}=await fetchJSON(url,{method:"POST",headers:{"Content-Type":"application/json","X-MMG-Client-Build":BUILD},credentials:"include",body:JSON.stringify(payload)});if(!response.ok)throw new Error(body?.error?.message||body?.summary||`Kairos returned ${response.status}.`);return body;}
    async function fetchJSON(url,init={}){const response=await fetch(url,{cache:"no-store",...init});const text=await response.text();let body={};try{body=text?JSON.parse(text):{};}catch{body={summary:text};}return{response,body};}
    function freshWebsite(){return{mode:"input",objective:"",requestType:"content-only",plan:null,execution:null,verification:null,release:null};}
    function loadWebsite(){try{const value=JSON.parse(sessionStorage.getItem(WEBSITE_KEY)||"null");return value&&typeof value==="object"?{...freshWebsite(),...value}:freshWebsite();}catch{return freshWebsite();}}
    function saveWebsite(){try{sessionStorage.setItem(WEBSITE_KEY,JSON.stringify(state.website));}catch{}}
    function paintClock(){if(clock)clock.textContent=new Date().toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}
    async function probeHealth(){try{const{response,body}=await fetchJSON(`/api/health?inline-shell=${Date.now()}`);state.health=response.ok?body:{status:"unavailable"};}catch{state.health={status:"unavailable"};}paintHealth();}
    function paintHealth(){const online=["ready","ok","operational"].includes(String(state.health?.status||"").toLowerCase());if(runtimeLabel)runtimeLabel.textContent=online?"Online":"Offline";if(runtimeDot)runtimeDot.className=`state-dot ${online?"":"offline"}`.trim();const signal=root.querySelector("[data-runtime-signal]");const card=root.querySelector("[data-runtime-card]");const value=root.querySelector("[data-runtime-value]");const detail=root.querySelector("[data-runtime-detail]");if(signal)signal.textContent=online?"Live":"Runtime unavailable";if(card)card.dataset.state=online?"live":"limited";if(value)value.textContent=online?"Online":"Unavailable";if(detail)detail.textContent=online?"Cloudflare edge connected":"Health endpoint unavailable";}
    function showStartupFailure(error){document.documentElement.dataset.kairosBoot="failed";if(root)root.innerHTML=`<main class="command-view"><section class="startup-failure"><p class="eyebrow">Startup recovery</p><h1>Kairos could not finish opening.</h1><p class="error">${esc(error?.message||String(error||"Unknown startup failure"))}</p><button class="primary" type="button" onclick="location.reload()">Reload Kairos</button></section></main>`;}
    function esc(value){return String(value??"").replace(/[&<>'"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[char]);}function attr(value){return esc(value).replace(/`/g,"&#96;");}
  })();
  </script>
