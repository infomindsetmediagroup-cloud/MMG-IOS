<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <meta name="mmg-build" content="kairos-command-center-safe-20260717-1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Kairos Command Center</title>
  <link rel="stylesheet" href="/styles/command-hub.css?v=safe-20260717-1">
  <link rel="stylesheet" href="/styles/homepage-quick-action.css?v=safe-20260717-1">
  <link rel="stylesheet" href="/styles/command-center-layout.css?v=safe-20260717-1">
  <link rel="stylesheet" href="/styles/command-router.css?v=safe-20260717-1">
  <link rel="stylesheet" href="/styles/header-override.css?v=safe-20260717-1">
  <style>
    html{scroll-behavior:auto!important;overflow-anchor:none!important}
    body,#kairos-hub,.command-view,.parent-grid{overflow-anchor:none!important}
    #kairos-hub>.app-header{display:none!important}
    .parent-card,.parent-card:hover,.parent-card:focus-visible{transform:none!important;transition:none!important}
    .mini-meter span,.readiness-overall span,.readiness-child-meter span{transition:none!important}
    .app-header-image{display:block;width:100%;height:auto;max-height:180px;object-fit:cover}
    .app-header{position:relative;overflow:hidden;background:#05070a}
    .app-header-status{position:absolute;right:16px;bottom:12px;display:flex;gap:12px;align-items:center;padding:7px 10px;border:1px solid rgba(114,220,255,.25);border-radius:999px;background:rgba(5,7,10,.78);backdrop-filter:blur(10px);color:#dff6ff;font-size:12px}
    @media(max-width:760px){.app-header-image{max-height:128px}.app-header-status{right:10px;bottom:8px;font-size:10px}}
  </style>
  <!-- Frozen-standard compatibility markers only. These are not executed: /scripts/command-hub.js /scripts/website-intent-router.js -->
</head>
<body>
  <header id="kairos-runtime-header" class="app-header">
    <img class="app-header-image" src="https://cdn.shopify.com/s/files/1/0754/4337/2186/files/kairos-app-header.png?v=1783815598" alt="Kairos Operating System — Mindset Media Group">
    <div class="app-header-status">
      <span data-runtime-time></span>
      <span class="live-state"><i class="state-dot" data-runtime-dot></i><span data-runtime-label>Connecting</span></span>
    </div>
  </header>
  <div id="kairos-hub" class="hub-shell"><main class="command-view"><p class="status-line"><i class="spinner"></i>Loading Kairos Command Center.</p></main></div>
  <script>if("scrollRestoration" in history)history.scrollRestoration="manual";</script>
  <script defer src="/scripts/command-center-safe.js?v=20260717-1"></script>
  <script>
  (()=>{
    const clock=document.querySelector("[data-runtime-time]");
    const label=document.querySelector("[data-runtime-label]");
    const dot=document.querySelector("[data-runtime-dot]");
    const paintTime=()=>{if(clock)clock.textContent=new Date().toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});};
    const mark=(online)=>{if(label)label.textContent=online?"Online":"Offline";if(dot)dot.className=`state-dot ${online?"":"offline"}`.trim();};
    async function probe(){paintTime();try{const response=await fetch(`/api/health?shell=${Date.now()}`,{cache:"no-store"});const body=await response.json();mark(response.ok&&["ready","ok","operational"].includes(String(body?.status||"").toLowerCase()));}catch{mark(false);}}
    paintTime();probe();setInterval(probe,30000);
    window.addEventListener("pageshow",probe);
    window.addEventListener("online",probe);
  })();
  </script>
</body>
</html>
